  if (!e) { go("home"); return; }
  setHeader("Edit Settings", "event/" + eventId, eventId, "overview");
  const v = (val, fallback = "") => val != null ? val : fallback;
  main.innerHTML = `
    <form id="edit-settings-form" class="card">
      <div class="field-row">
        <div>
          <label>Event name</label>
          <input name="name" type="text" required value="${escapeHtml(e.name)}">
        </div>
        <div>
          <label>Type</label>
          <select name="eventType">
            <option value="tournament" ${e.eventType !== "league" ? "selected" : ""}>Tournament</option>
            <option value="league" ${e.eventType === "league" ? "selected" : ""}>League (weekly)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Date</label>
        <input name="date" type="date" value="${escapeHtml(e.date || "")}">
      </div>
      ${e.status !== "open" ? `<div class="alert warning">Brackets have been formed. Changing fees or prizes will affect payouts on future nights but not already-finalized rounds.</div>` : ""}
      <h3>Bracket Fees</h3>
      <div class="field-row">
        <div>
          <label>Entry fee ($)</label>
          <input name="bracketEntryFee" type="number" min="0" step="0.5" value="${e.bracketEntryFee}" id="s-entryFee">
        </div>
        <div>
          <label>House cut ($ per bracket of 8)</label>
          <input name="bracketHouseCutDollar" type="number" min="0" step="0.25" value="${e.bracketHouseCutDollar}" id="s-houseCut">
        </div>
      </div>
      <div class="field-row">
        <div>
          <label>1st place prize ($)</label>
          <input name="bracketFirstPlace" type="number" min="0" step="0.5" value="${e.bracketFirstPlace}" id="s-firstPrize">
        </div>
        <div>
          <label>2nd place prize ($)</label>
          <input name="bracketSecondPlace" type="number" min="0" step="0.5" value="${e.bracketSecondPlace}" id="s-secondPrize">
        </div>
      </div>
      <div id="s-prize-validate" class="alert info"></div>
      <div class="field-row">
        <div>
          <label>Max scratch entries / bowler</label>
          <input name="maxScratchEntriesPerBowler" type="number" min="0" max="99" value="${e.maxScratchEntriesPerBowler}">
        </div>
        <div>
          <label>Max handicap entries / bowler</label>
          <input name="maxHandicapEntriesPerBowler" type="number" min="0" max="99" value="${e.maxHandicapEntriesPerBowler}">
        </div>
      </div>
      <h3>Sidepots</h3>
      <div class="field-row">
        <div><label>Scratch high-game fee/game</label>
          <input name="scratchSidepotFee" type="number" min="0" step="0.5" value="${v(e.scratchSidepotFee, 0)}" placeholder="0 = none"></div>
        <div><label>Handicap high-game fee/game</label>
          <input name="handicapSidepotFee" type="number" min="0" step="0.5" value="${v(e.handicapSidepotFee, 0)}" placeholder="0 = none"></div>
      </div>
      <div class="field-row">
        <div><label>Scratch high-series buy-in</label>
          <input name="scratchHighSeriesFee" type="number" min="0" step="0.5" value="${v(e.scratchHighSeriesFee, 0)}" placeholder="0 = none"></div>
        <div><label>Handicap high-series buy-in</label>
          <input name="handicapHighSeriesFee" type="number" min="0" step="0.5" value="${v(e.handicapHighSeriesFee, 0)}" placeholder="0 = none"></div>
      </div>
      <h3>Handicap Formula</h3>
      <div class="field-row">
        <div><label>Base score</label>
          <input name="handicapBase" type="number" min="100" max="300" value="${e.handicapBase}"></div>
        <div><label>Percentage (0–1)</label>
          <input name="handicapPct" type="number" min="0" max="1" step="0.05" value="${e.handicapPct}"></div>
      </div>
      <div class="btn-row">
        <button type="submit" class="btn primary">Save Settings</button>
        <a href="#event/${eventId}" class="btn secondary">Cancel</a>
      </div>
    </form>`;

  function recalc() {
    const fee = Number(document.getElementById("s-entryFee").value) || 0;
    const cut = Number(document.getElementById("s-houseCut").value) || 0;
    const first = Number(document.getElementById("s-firstPrize").value) || 0;
    const second = Number(document.getElementById("s-secondPrize").value) || 0;
    const pool = 8 * fee - cut;
    const total = first + second;
    const ok = Math.abs(total - pool) < 0.01;
    const el = document.getElementById("s-prize-validate");
    el.className = "alert " + (ok ? "success" : "error");
    el.innerHTML = `8 × ${fmtMoney(fee)} − ${fmtMoney(cut)} house = <strong>${fmtMoney(pool)}</strong> per bracket. 1st + 2nd = ${fmtMoney(total)}. ${ok ? "✓ Balanced" : "✗ Must equal " + fmtMoney(pool)}`;
  }
  document.getElementById("edit-settings-form").addEventListener("input", recalc);
  recalc();

  document.getElementById("edit-settings-form").addEventListener("submit", ev => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const d = Object.fromEntries(fd);
    const fee = Number(d.bracketEntryFee), cut = Number(d.bracketHouseCutDollar);
    const first = Number(d.bracketFirstPlace), second = Number(d.bracketSecondPlace);
    const pool = 8 * fee - cut;
    if (Math.abs(first + second - pool) > 0.01) {
      alert("1st + 2nd must equal " + fmtMoney(pool) + " (the per-bracket prize pool)."); return;
    }
    Object.assign(e, {
      name: d.name,
      date: d.date || "",
      eventType: d.eventType || "tournament",
      bracketEntryFee: fee,
      bracketHouseCutDollar: cut,
      bracketFirstPlace: first,
      bracketSecondPlace: second,
      maxScratchEntriesPerBowler: Number(d.maxScratchEntriesPerBowler) || 3,
      maxHandicapEntriesPerBowler: Number(d.maxHandicapEntriesPerBowler) || 3,
      scratchSidepotFee: Number(d.scratchSidepotFee) > 0 ? Number(d.scratchSidepotFee) : null,
      handicapSidepotFee: Number(d.handicapSidepotFee) > 0 ? Number(d.handicapSidepotFee) : null,
      scratchHighSeriesFee: Number(d.scratchHighSeriesFee) > 0 ? Number(d.scratchHighSeriesFee) : null,
      handicapHighSeriesFee: Number(d.handicapHighSeriesFee) > 0 ? Number(d.handicapHighSeriesFee) : null,
      handicapBase: Number(d.handicapBase) || 220,
      handicapPct: Number(d.handicapPct) || 0.9
    });
    saveState();
    go("event/" + eventId);
  });
}

// ---------- League reset ----------
function resetLeagueWeek(eventId) {
  const e = getEvent(eventId);
  if (!e) return;

  // Snapshot the completed week before wiping
  if (e.status === "finalized") {
    if (!e.weekHistory) e.weekHistory = [];
    e.weekHistory.push({
      weekNum: e.weekHistory.length + 1,
      date: e.date || "",
      payouts: JSON.parse(JSON.stringify(e.payouts)),
      deferredPayouts: JSON.parse(JSON.stringify(e.deferredPayouts || [])),
      refunds: JSON.parse(JSON.stringify(e.refunds)),
      finalizedAt: Date.now()
    });
  }

  // Advance date by 7 days
  if (e.date) {
    const d = new Date(e.date + "T12:00:00");
    d.setDate(d.getDate() + 7);
    e.date = d.toISOString().slice(0, 10);
  }

  Object.values(e.bowlers || {}).forEach(b => {
    b.scratchBrackets = 0; b.handicapBrackets = 0;
    b.sidepotScratch = false; b.sidepotHandicap = false;
    b.highSeriesScratch = false; b.highSeriesHandicap = false;
    b.paid = false;
  });
  e.bracketPools = {};
  e.scores = {};
  e.payouts = [];
  e.refunds = [];
  // deferredPayouts PERSIST into the new week so they can be paid out at the alley
  // They are only cleared when explicitly confirmed paid or on the next reset
  e.status = "open";
  e.currentGame = 1;
  saveState();
}

// ---------- Router ----------
function go(hash) { location.hash = hash; }
function getRoute() {
  const h = location.hash.replace(/^#/, "");
  if (!h || h === "home") return { name: "home" };
  const parts = h.split("/");
  if (parts[0] === "event" && parts[1]) {
    const eventId = parts[1];
    if (!parts[2]) return { name: "event", eventId };
    return { name: parts[2], eventId, extra: parts[3] };
  }
  if (parts[0] === "new") return { name: "new" };
  return { name: "home" };
}

// ---------- Renderers ----------
const main = document.getElementById("main");
const titleEl = document.getElementById("title");
const backBtn = document.getElementById("back-btn");
const btnAdmin  = document.getElementById("btn-admin");
const btnBowler = document.getElementById("btn-bowler");
const eventSubnav = document.getElementById("event-subnav");

function setHeader(title, back, eventId, activeTab) {
  titleEl.textContent = title;
  backBtn.style.display = back ? "block" : "none";
  backBtn.onclick = back ? () => { location.hash = back; } : null;
  btnAdmin.classList.toggle("active",  state.viewMode === "admin");
  btnBowler.classList.toggle("active", state.viewMode === "bowler");

  // Event subnav — shown in admin mode for full tabs, bowler mode for read-only tabs
  if (state.viewMode === "bowler" && eventId) {
    const e = getEvent(eventId);
    // Tab order: Brackets, Alive, Sidepot, Scores, Results (conditional), Payouts, History (conditional)
    const bowlerShowResults = e && (e.status === "finalized" || (e.status === "scoring" && (e.currentGame || 1) > 1));
    const tabList = [
      { id: "brackets",          label: "Brackets" },
      { id: "alive",             label: "Alive" },
      { id: "sidepot-standings", label: "Sidepot" },
      { id: "scores",            label: "Scores" },
    ];
    if (bowlerShowResults) tabList.push({ id: "results", label: "Results" });
    tabList.push({ id: "payouts", label: "Payouts" });
    if (e && e.eventType === "league") tabList.push({ id: "history", label: "History" });
    eventSubnav.style.display = "flex";
    eventSubnav.innerHTML = tabList.map(t =>
      `<a class="bowler-subnav-tab${activeTab === t.id ? " active" : ""}" data-tab="${t.id}" href="javascript:void(0)">${t.label}</a>`
    ).join("");
  } else if (state.viewMode === "admin" && eventId) {
    const e = getEvent(eventId);
    const s = e ? e.status : "open";
    const isLeague = e && e.eventType === "league";
    const canBrackets = s !== "open" && s !== "draft";
    const canScoring  = s === "scoring" || s === "ready" || s === "finalized";
    const canAlive    = canBrackets;
    const canFinal    = s === "finalized";
    // Once Game 1 has been submitted, per-game sidepots are resolved and
    // payable, so Results and Payouts open up mid-scoring.
    const gamesSubmitted = !!(e && s === "scoring" && (e.currentGame || 1) > 1);
    // Payouts stays reachable whenever money is still owed (carried-forward brackets)
    const hasUnpaidLedger = !!(e && (e.ledger || []).some(l => !l.paid));
    const tabs = [
      { label: "Overview",  href: `#event/${eventId}`,           id: "overview",  on: true },
      { label: e && e.status === "scoring" ? `Scoring · G${e.currentGame || 1}` : "Scoring",
                             href: `#event/${eventId}/scoring`,   id: "scoring",   on: canScoring },
      { label: "Brackets",  href: `#event/${eventId}/brackets`,  id: "brackets",  on: canBrackets },
      { label: "Alive",     href: `#event/${eventId}/alive`,     id: "alive",     on: canAlive },
      { label: "Sidepots",  href: `#event/${eventId}/sidepots`,  id: "sidepots",  on: canBrackets },
      { label: "Results",   href: `#event/${eventId}/results`,   id: "results",   on: canFinal || gamesSubmitted },
      { label: "Payouts",   href: `#event/${eventId}/payouts`,   id: "payouts",   on: canFinal || hasUnpaidLedger || gamesSubmitted },
      ...(isLeague ? [{ label: "History", href: `#event/${eventId}/history`, id: "history", on: true }] : []),
      { label: "Usage", href: `#event/${eventId}/usage`, id: "usage", on: true },
    ];
    eventSubnav.style.display = "flex";
    eventSubnav.innerHTML = tabs.map(t =>
      `<a href="${t.href}" class="${!t.on ? "disabled" : ""}${activeTab === t.id ? " active" : ""}">${t.label}</a>`
    ).join("");
  } else {
    eventSubnav.style.display = "none";
    eventSubnav.innerHTML = "";
  }
}

// Attach click listeners to bowler subnav tabs after setHeader renders them.
// Called from renderBowlerEvent; e is the current event object.
function attachBowlerSubnavListeners(e) {
  eventSubnav.querySelectorAll(".bowler-subnav-tab").forEach(a => {
    a.addEventListener("click", () => {
      bowlerActiveTab = a.dataset.tab;
      eventSubnav.querySelectorAll(".bowler-subnav-tab").forEach(x =>
        x.classList.toggle("active", x.dataset.tab === bowlerActiveTab));
      const content = document.getElementById("bowler-tab-content");
      if (content) {
        content.innerHTML = renderBowlerTabContent(e, bowlerActiveTab);
        attachSidepotSortHandlers(e);
      }
    });
  });
}

function statusPill(status) { return `<span class="pill ${status}">${status}</span>`; }

function renderHome() {
  if (state.viewMode === "bowler") { renderBowlerHome(); return; }

  const events = Object.values(state.events).sort((a, b) => b.createdAt - a.createdAt);
  setHeader("Bowling Brackets", null);
  let html = "";

  // Admin password management
  const pwSet = !!state.adminPassword;
  html += `<div class="card" style="margin-bottom:8px;padding:10px 16px">
    <div class="row between">
      <span style="font-size:13px;color:var(--grey-700)">🔒 Admin Password: <strong style="color:${pwSet ? "var(--green)" : "var(--red)"};">${pwSet ? "Set" : "Not set"}</strong></span>
      <button class="btn small secondary" id="set-pw-btn">${pwSet ? "Change" : "Set Password"}</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:8px;padding:10px 16px">
    <div class="row between" style="flex-wrap:wrap;gap:8px">
      <span style="font-size:13px;color:var(--grey-700)">💾 Backup &amp; Restore</span>
      <div style="display:flex;gap:6px">
        <button class="btn small secondary" id="download-backup-btn">⬇ Download Backup</button>

    html += `<div class="empty">
      <h3>No events yet</h3>
      <p class="muted">Create your first event to start tracking brackets and sidepots.</p>
      <a class="btn primary" href="#new">+ New Event</a>
    </div>`;
  } else {
    html += `<div class="row between mb-2">
      <h2 class="mt-0">Events</h2>
      <a class="btn primary" href="#new">+ New</a>
    </div><div class="stack">`;
    events.forEach(e => {
      const t = eventTotals(e);
      const typeLabel = e.eventType === "league" ? "League" : "Tournament";
      html += `<div class="card" style="position:relative">
        <a style="text-decoration:none;color:inherit;display:block;padding-right:40px" href="#event/${e.id}">
          <div class="row between">
            <div>
              <strong>${escapeHtml(e.name)}</strong>
              <span class="tiny" style="margin-left:6px;color:var(--grey-500)">${typeLabel}</span>
              <div class="tiny">${escapeHtml(e.date || "")}</div>
            </div>
            ${statusPill(e.status)}
          </div>
          <div class="row gap-lg mt-1 tiny" style="color:var(--grey-700)">
            <span>${t.bowlerCount} bowler${t.bowlerCount !== 1 ? "s" : ""}</span>
            <span>${fmtMoney(t.paid)} collected</span>
            <span>${fmtMoney(t.owed - t.paid)} owed</span>
          </div>
        </a>
        <button class="btn small danger home-delete-btn" data-eid="${e.id}" style="position:absolute;top:12px;right:12px;padding:4px 8px;min-height:28px;font-size:12px">✕</button>
      </div>`;
    });
    html += `</div>`;
  }
  main.innerHTML = html;

  // Set / Change password button
  document.getElementById("set-pw-btn").addEventListener("click", () => {
    showSetPasswordModal();
  });

  // Backup & Restore
  document.getElementById("download-backup-btn").addEventListener("click", downloadBackup);
  document.getElementById("restore-backup-btn").addEventListener("click", () => {
    document.getElementById("restore-backup-input").click();
  });
  document.getElementById("restore-backup-input").addEventListener("change", ev => {
    const f = ev.target.files[0];
    if (f) restoreFromBackup(f);
    ev.target.value = ""; // reset so same file can be re-selected
  });

  document.querySelectorAll(".home-delete-btn").forEach(btn => {
    btn.addEventListener("click", ev => {
      ev.preventDefault(); ev.stopPropagation();
      const eid = btn.dataset.eid;
      const ev2 = getEvent(eid);
      if (confirm(`Delete "${ev2?.name}"? This cannot be undone.`)) { deleteEvent(eid); renderHome(); }
    });
  });
}

// ---------- Admin password modal ----------
function showSetPasswordModal() {
  const overlay = document.createElement("div");
  overlay.className = "pw-overlay";
  overlay.innerHTML = `
    <div class="pw-modal">
      <h3>Set Admin Password</h3>
      <p>Bowlers will not be able to switch to Admin view without this password.</p>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="pw-new" placeholder="Enter password" autocomplete="new-password">
      </div>
      <div class="field" style="margin-top:10px">
        <label>Confirm Password</label>
        <input type="password" id="pw-confirm" placeholder="Confirm password">
      </div>
      <div id="pw-error" style="color:var(--red);font-size:13px;margin-top:6px;display:none"></div>
      <div class="btn-row">
        <button class="btn primary" id="pw-save-btn">Save</button>
        <button class="btn secondary" id="pw-cancel-btn">Cancel</button>
        ${state.adminPassword ? `<button class="btn danger" id="pw-clear-btn" style="margin-left:auto">Remove Password</button>` : ""}
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelector("#pw-cancel-btn").addEventListener("click", () => overlay.remove());
  const clearBtn = overlay.querySelector("#pw-clear-btn");
  if (clearBtn) clearBtn.addEventListener("click", () => {
    if (confirm("Remove admin password? Anyone will be able to switch to Admin view.")) {
      state.adminPassword = "";
      state.adminPasswordHashed = false;
      saveState();
      overlay.remove();
      renderHome();
    }
  });
  overlay.querySelector("#pw-save-btn").addEventListener("click", () => {
    const np = overlay.querySelector("#pw-new").value;
    const cp = overlay.querySelector("#pw-confirm").value;
    const err = overlay.querySelector("#pw-error");
    if (!np) { err.textContent = "Password cannot be empty."; err.style.display = "block"; return; }
    if (np !== cp) { err.textContent = "Passwords do not match."; err.style.display = "block"; return; }
    hashPassword(np).then(hash => {
      state.adminPassword = hash;
      state.adminPasswordHashed = true;
      saveState();
      overlay.remove();
      renderHome();
    });
  });
}

function showAdminPasswordPrompt(onSuccess) {
  const overlay = document.createElement("div");
  overlay.className = "pw-overlay";
  overlay.innerHTML = `
    <div class="pw-modal">
      <h3>Admin Access</h3>
      <p>Enter the admin password to switch to Admin view.</p>
      <div class="field">
        <label>Password</label>
        <input type="password" id="pw-entry" placeholder="Admin password" autocomplete="current-password">
      </div>
      <div id="pw-entry-error" style="color:var(--red);font-size:13px;margin-top:6px;display:none">Incorrect password.</div>
      <div class="btn-row">
        <button class="btn primary" id="pw-enter-btn">Enter</button>
        <button class="btn secondary" id="pw-entry-cancel-btn">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const inp = overlay.querySelector("#pw-entry");
  inp.focus();
  overlay.querySelector("#pw-entry-cancel-btn").addEventListener("click", () => overlay.remove());
  const showError = () => {
    overlay.querySelector("#pw-entry-error").style.display = "block";
    inp.value = "";
    inp.focus();
  };
  const tryPw = () => {
    const entered = inp.value;
    if (!entered) return;
    if (state.adminPasswordHashed) {
      // Compare SHA-256 hashes (new format)
      hashPassword(entered).then(hash => {
        if (hash === state.adminPassword) { overlay.remove(); onSuccess(); }
        else showError();
      });
    } else {
      // Legacy plaintext comparison — works until admin resets the password
      if (entered === state.adminPassword) { overlay.remove(); onSuccess(); }
      else showError();
    }
  };
  overlay.querySelector("#pw-enter-btn").addEventListener("click", tryPw);
  inp.addEventListener("keydown", ev => { if (ev.key === "Enter") tryPw(); });
}

// ---------- Bowler home — entry gate ----------
function renderBowlerHome() {
  setHeader("Bowling Brackets", null);
  main.innerHTML = `
    <div class="entry-gate">
      <div class="gate-logo">🎳</div>
      <h2>Find Your Event</h2>
      <p>Type part of your League or Tournament name to search.</p>
      <div class="card gate-form">
        <div class="field">
          <label>League / Tournament Name</label>
          <input type="text" id="gate-input" placeholder="e.g. Wednesday Night" autocomplete="off">
        </div>
        <div id="gate-error" class="gate-error" style="display:none">No event found matching that name.</div>
        <div id="gate-picker" style="margin-top:4px"></div>
        <button class="btn primary full mt-1" id="gate-btn">Search</button>
      </div>
    </div>`;

  const inp = document.getElementById("gate-input");
  const btn = document.getElementById("gate-btn");
  const err = document.getElementById("gate-error");
  const picker = document.getElementById("gate-picker");
  inp.focus();

  function buildPicker(matches, showNoResult) {
    err.style.display = "none";
    picker.innerHTML = "";
    if (showNoResult && matches.length === 0) {
      err.style.display = "block";
      return;
    }
    if (matches.length === 0) return;
    const label = matches.length === 1
      ? `<p style="font-size:13px;color:var(--grey-700);margin-bottom:8px">1 event found:</p>`
      : `<p style="font-size:13px;color:var(--grey-700);margin-bottom:8px">${matches.length} events found — select one:</p>`;
    let html = label;
    matches.forEach(ev => {
      const typeLabel = ev.eventType === "league" ? "League" : "Tournament";
      // Highlight matching portion of name
      const q = inp.value.trim();
      const rawName = ev.name;
      let displayName = escapeHtml(rawName);
      if (q) {
        const idx = rawName.toLowerCase().indexOf(q.toLowerCase());
        if (idx !== -1) {
          displayName = escapeHtml(rawName.slice(0, idx))
            + `<mark style="background:rgba(46,116,181,0.18);border-radius:2px;padding:0 1px">${escapeHtml(rawName.slice(idx, idx + q.length))}</mark>`
            + escapeHtml(rawName.slice(idx + q.length));
        }
      }
      html += `<button class="gate-pick-btn" data-eid="${ev.id}" style="
        width:100%;text-align:left;background:var(--white);
        border:1px solid var(--grey-300);border-radius:6px;
        padding:10px 12px;margin-bottom:8px;cursor:pointer;
        display:flex;justify-content:space-between;align-items:center;
        font-family:inherit;font-size:14px;">
        <div>
          <div style="font-weight:600;color:var(--navy)">${displayName}</div>
          <div style="font-size:12px;color:var(--grey-700);margin-top:2px">
            ${typeLabel}${ev.date ? " &middot; " + escapeHtml(ev.date) : ""}
          </div>
        </div>
        <span class="pill ${ev.status}">${ev.status}</span>
      </button>`;
    });
    picker.innerHTML = html;
    picker.querySelectorAll(".gate-pick-btn").forEach(b => {
      b.addEventListener("click", () => { location.hash = "event/" + b.dataset.eid; });
      b.addEventListener("mouseenter", () => { b.style.borderColor = "var(--blue)"; b.style.background = "var(--light-blue)"; });
      b.addEventListener("mouseleave", () => { b.style.borderColor = "var(--grey-300)"; b.style.background = "var(--white)"; });
    });
    // Auto-navigate if exact single match and user pressed Search
  }

  function getMatches(query) {
    if (!query) return [];
    return Object.values(state.events)
      .filter(e => e.name.trim().toLowerCase().includes(query.toLowerCase()))
      .sort((a, b) => {
        // Exact matches first, then prefix matches, then substring
        const aLow = a.name.toLowerCase(), bLow = b.name.toLowerCase(), q = query.toLowerCase();
        const aExact = aLow === q, bExact = bLow === q;
        if (aExact && !bExact) return -1;
        if (!aExact && bExact) return 1;
        const aPrefix = aLow.startsWith(q), bPrefix = bLow.startsWith(q);
        if (aPrefix && !bPrefix) return -1;
        if (!aPrefix && bPrefix) return 1;
        return (b.date || "").localeCompare(a.date || "") || b.createdAt - a.createdAt;
      });
  }

  const doSearch = (showNoResult = true) => {
    const query = inp.value.trim();
    if (!query) { picker.innerHTML = ""; err.style.display = "none"; return; }
    const matches = getMatches(query);
    if (matches.length === 1 && showNoResult) {
      // Single result — navigate directly
      location.hash = "event/" + matches[0].id;
      return;
    }
    buildPicker(matches, showNoResult);
  };

  btn.addEventListener("click", () => doSearch(true));
  inp.addEventListener("keydown", ev => { if (ev.key === "Enter") doSearch(true); });
  // Live suggestions as user types
  inp.addEventListener("input", () => {
    err.style.display = "none";
    const query = inp.value.trim();
    if (!query) { picker.innerHTML = ""; return; }
    const matches = getMatches(query);
    buildPicker(matches, false); // don't show "no result" until explicit search
  });
}

// ---------- Bowler event view — tabbed read-only ----------
let bowlerActiveTab = "brackets";

function renderBowlerEvent(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }

  // Ensure bracket results are computed for display
  if (e.status === "scoring" || e.status === "finalized" || e.status === "ready") {
    computeBracketResults(e);
  }

  // Guard: if the active tab no longer exists for this event, fall back.
  const validTabs = ["brackets","scores","alive","sidepot-standings","payouts","history","results"];
  if (!validTabs.includes(bowlerActiveTab)) bowlerActiveTab = "brackets";

  // setHeader renders the bowler subnav tabs via the bowler branch
  setHeader(e.name, null, eventId, bowlerActiveTab);

  // Back button sends bowler to entry gate
  backBtn.style.display = "block";
  backBtn.onclick = () => { location.hash = ""; };

  // Attach click listeners to the subnav tabs just rendered by setHeader
  attachBowlerSubnavListeners(e);

  // Tab content only — tabs now live in the sticky subnav
  let html = `<div class="readonly-banner">👁 Read-only Bowler View &mdash; ${escapeHtml(e.name)}</div>`;
  html += `<div id="bowler-tab-content">`;
  html += renderBowlerTabContent(e, bowlerActiveTab);
  html += `</div>`;

  main.innerHTML = html;
  attachSidepotSortHandlers(e);
}

// Inline onclick handler for sidepot sort buttons — works in both bowler and admin views.
function onSidepotSort(eid, sptype, game) {
  sidepotSort = { sptype, game };
  const bowlerContent = document.getElementById("bowler-tab-content");
  if (bowlerContent) {
    const ev = getEvent(eid);
    if (ev) bowlerContent.innerHTML = renderBowlerTabContent(ev, bowlerActiveTab);
  } else {
    renderSidepots(eid);
  }
}
// Kept as no-op so existing call sites don't error.
function attachSidepotSortHandlers() {}

function renderBowlerTabContent(e, tab) {
  if (tab === "brackets")         return renderBowlerBrackets(e);
  if (tab === "scores")           return renderBowlerScores(e);
  if (tab === "alive")            return renderBowlerAlive(e);
  if (tab === "sidepot-standings") return renderBowlerSidepotStandings(e);
  if (tab === "payouts")          return renderBowlerPayouts(e);
  if (tab === "history")          return renderBowlerHistory(e);
  if (tab === "results")          return renderBowlerResults(e);
  return "";
}

function renderBowlerResults(e) {
  computeBracketResults(e);
  const pools = Object.values(e.bracketPools || {}).sort((a, b) =>
    a.competitionType.localeCompare(b.competitionType) || a.poolNumber - b.poolNumber);
  const isLive = e.status !== "finalized";

  let html = `<div class="card">
    <div class="row between">
      <div>
        <h2 class="mt-0">${isLive ? "Live Results" : "Final Results"}</h2>
        <div class="tiny">${escapeHtml(e.date || "")} · ${pools.length} bracket${pools.length !== 1 ? "s" : ""}</div>
      </div>
      ${statusPill(e.status)}
    </div>
  </div>`;

  // Sidepot & high series results — table layout, shown before bracket winners
  const spOut = sidepotPerGameResults(e);
  const hs = highSeriesResults(e);
  const anySpResults = Object.values(spOut).some(sp => sp.totalEntrants > 0);
  const anyHsResults = Object.values(hs).some(r => r.totalEntrants > 0);

  if (anySpResults || anyHsResults) {
    let spRows = "";
    Object.entries(spOut).forEach(([, sp]) => {
      if (sp.totalEntrants === 0) return;
      for (let g = 1; g <= e.gamesPerSession; g++) {
        const r = sp.games[g];
        if (!r || !r.allEntered) {
          spRows += `<tr>
            <td><strong>${escapeHtml(sp.label)}</strong></td>
            <td class="center">G${g}</td>
            <td colspan="3" class="muted">Not finalized</td>
          </tr>`;
        } else {
          const names = r.winners.map(bid => escapeHtml(e.bowlers[bid]?.name || "?")).join(", ");
          spRows += `<tr>
            <td><strong>${escapeHtml(sp.label)}</strong></td>
            <td class="center">G${g}</td>
            <td>${names}${r.winners.length > 1 ? ' <span class="muted">(tie)</span>' : ""}</td>
            <td class="num">${r.topScore}</td>
            <td class="num">${fmtMoney(r.payout)}${r.winners.length > 1 ? " ea" : ""}</td>
          </tr>`;
        }
      }
    });
    Object.values(hs).forEach(r => {
      if (r.totalEntrants === 0) return;
      if (r.locked) {
        spRows += `<tr>
          <td><strong>${escapeHtml(r.label)}</strong></td>
          <td class="center">Series</td>
          <td colspan="3" class="muted">Not finalized</td>
        </tr>`;
      } else {
        const names = r.winners.map(bid => escapeHtml(e.bowlers[bid]?.name || "?")).join(", ");
        spRows += `<tr>
          <td><strong>${escapeHtml(r.label)}</strong></td>
          <td class="center">Series</td>
          <td>${names}${r.winners.length > 1 ? ' <span class="muted">(tie)</span>' : ""}</td>
          <td class="num">${r.top}</td>
          <td class="num">${fmtMoney(r.payout)}${r.winners.length > 1 ? " ea" : ""}</td>
        </tr>`;
      }
    });
    html += `<div class="card">
      <h3 class="mt-0">Sidepot &amp; Series Results</h3>
      <div class="scrollable-x"><table>
        <thead><tr><th>Sidepot</th><th class="center">Game</th><th>Winner(s)</th><th class="num">Score</th><th class="num">Payout</th></tr></thead>
        <tbody>${spRows}</tbody>
      </table></div>
    </div>`;
  }

  // Bracket Winners summary
  html += `<div class="card">
    <h3 class="mt-0">Bracket Winners</h3>
    <div class="scrollable-x"><table>
      <thead><tr><th>Bracket</th><th>1st Place</th><th class="num">Prize</th><th>2nd Place</th><th class="num">Prize</th></tr></thead>
      <tbody>`;
  pools.forEach(p => {
    const firstNames = p.firstPlace.map(bid => e.bowlers[bid]?.name).filter(Boolean).join(", ");
    const secondNames = p.secondPlace.map(bid => e.bowlers[bid]?.name).filter(Boolean).join(", ");
    const firstAmt = p.firstPlace.length === 1 ? e.bracketFirstPlace
      : p.firstPlace.length > 1 ? (e.bracketFirstPlace + e.bracketSecondPlace) / p.firstPlace.length : 0;
    const secondAmt = p.firstPlace.length === 1 && p.secondPlace.length > 0
      ? e.bracketSecondPlace / p.secondPlace.length : 0;
    const typeLabel = p.competitionType[0].toUpperCase() + p.competitionType.slice(1);
    html += `<tr>
      <td><strong>${typeLabel} #${p.poolNumber}</strong></td>
      <td>${escapeHtml(firstNames) || '<span class="muted">—</span>'}</td>
      <td class="num">${firstNames ? fmtMoney(firstAmt) + (p.firstPlace.length > 1 ? " ea" : "") : "—"}</td>
      <td>${escapeHtml(secondNames) || '<span class="muted">—</span>'}</td>
      <td class="num">${secondNames ? fmtMoney(secondAmt) + (p.secondPlace.length > 1 ? " ea" : "") : "—"}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  return html;
}

function renderBowlerBrackets(e) {
  const pools = Object.values(e.bracketPools || {}).sort((a, b) =>
    a.competitionType.localeCompare(b.competitionType) || a.poolNumber - b.poolNumber);
  if (pools.length === 0) return `<div class="empty"><h3>No Brackets Yet</h3><p class="muted">Brackets haven't been formed for this event.</p></div>`;
  let html = `<div class="card">
    <div class="row between mb-1">
      <h2 class="mt-0">${pools.length} Bracket${pools.length !== 1 ? "s" : ""}</h2>
      <div style="display:flex;gap:6px;align-items:center">
        ${statusPill(e.status)}
        <button class="btn small secondary bowler-display-mode-btn" title="Maximize for tablet/TV">${bracketDisplayMode ? "⛶ Exit Display" : "📺 Display Mode"}</button>
      </div>
    </div>
  </div>`;
  pools.forEach(p => { html += renderBracketCard(e, p); });
  // Attach display mode listener after content is injected into DOM
  setTimeout(() => {
    document.querySelectorAll(".bowler-display-mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        setDisplayMode(!bracketDisplayMode);
        const content = document.getElementById("bowler-tab-content");
        if (content) {
          content.innerHTML = renderBowlerTabContent(e, bowlerActiveTab);
          attachSidepotSortHandlers(e);
        }
      });
    });
  }, 0);
  return html;
}

// eid tracks which event the sort belongs to; resets to last-submitted-game on event change.
let sidepotSort = { eid: null, sptype: "handicap", game: 1 };

function lastSubmittedGame(e) {
  return Object.values(e.bowlers || {}).reduce((m, b) => {
    const s = e.scores[b.id] || {};
    const last = Object.keys(s).map(Number).filter(g => s[g] != null).reduce((a, g) => Math.max(a, g), 0);
    return Math.max(m, last);
  }, 0);
}

function renderBowlerSidepotStandings(e) {
  const scratchBowlers = Object.values(e.bowlers || {}).filter(b => b.paid && b.sidepotScratch);
  const handicapBowlers = Object.values(e.bowlers || {}).filter(b => b.paid && b.sidepotHandicap);

  if (scratchBowlers.length === 0 && handicapBowlers.length === 0) {
    return `<div class="empty"><h3>No Sidepot Entries</h3><p class="muted">No bowlers are entered in a sidepot for this event.</p></div>`;
  }

  // Max game with any score entered across all bowlers
  const maxGame = lastSubmittedGame(e);
  const games = Math.max(maxGame, 1);

  // Auto-default to last submitted game when first viewing this event (or when event changes).
  if (sidepotSort.eid !== e.id) {
    sidepotSort = { eid: e.id, sptype: "handicap", game: maxGame || 1 };
  }

  const buildSection = (title, bowlers, sptype) => {
    if (bowlers.length === 0) return "";
    const sortGame = sidepotSort.sptype === sptype ? sidepotSort.game : 0;

    const rows = bowlers.map(b => {
      const gamScores = [];
      for (let g = 1; g <= games; g++) {
        gamScores.push(getGameScore(e, b.id, g, sptype));
      }
      const total = gamScores.reduce((s, v) => s + (v || 0), 0);
      return { b, gamScores, total };
    }).sort((a, b) => {
      if (sortGame === 0) return b.total - a.total;
      const aVal = a.gamScores[sortGame - 1] ?? -1;
      const bVal = b.gamScores[sortGame - 1] ?? -1;
      return bVal - aVal;
    });

    const hdrCols = [...Array(games).keys()].map(i => {
      const g = i + 1;
      const active = sidepotSort.sptype === sptype && sidepotSort.game === g;
      return `<th class="num" data-sp-eid="${e.id}" data-sp-type="${sptype}" data-sp-game="${g}"
        style="padding:8px 6px;font-size:12px;cursor:pointer;user-select:none;
        color:${active ? "var(--blue)" : "var(--grey-700)"};white-space:nowrap">
        G${g}${active ? " ▼" : ""}
      </th>`;
    }).join("");

    const totalActive = sidepotSort.sptype === sptype && sidepotSort.game === 0;
    const totalHdr = `<th class="num" data-sp-eid="${e.id}" data-sp-type="${sptype}" data-sp-game="0"
      style="padding:8px 6px;font-size:12px;cursor:pointer;user-select:none;font-weight:700;
      color:${totalActive ? "var(--blue)" : "var(--grey-700)"};white-space:nowrap;
      border-left:1px solid var(--grey-200)">
      Total${totalActive ? " ▼" : ""}
    </th>`;

    const bodyRows = rows.map((row, i) => {
      const isTotalActive = sidepotSort.sptype === sptype && sidepotSort.game === 0;
      const hasAnyScore = row.gamScores.some(v => v != null);
      const cells = row.gamScores.map((v, gi) => {
        const active = sidepotSort.sptype === sptype && sidepotSort.game === gi + 1;
        return `<td class="num" style="padding:7px 6px;font-size:13px;
          font-weight:${v != null ? "600" : "400"};
          color:${v == null ? "var(--grey-500)" : active ? "var(--blue)" : "inherit"}">
          ${v != null ? v : "—"}
        </td>`;
      }).join("");
      const totalCell = `<td class="num" style="padding:7px 6px;font-size:13px;font-weight:700;
        color:${isTotalActive ? "var(--blue)" : "inherit"};
        border-left:1px solid var(--grey-200)">
        ${hasAnyScore ? row.total : "—"}
      </td>`;
      return `<tr style="border-bottom:1px solid var(--grey-100)">
        <td style="padding:7px 6px;font-size:13px">
          <span style="color:var(--grey-500);font-size:11px;margin-right:5px">${i + 1}.</span>
          ${escapeHtml(row.b.name)}
          ${row.b.lane ? `<span class="tiny muted"> · lane ${escapeHtml(row.b.lane)}</span>` : ""}
        </td>
        ${cells}
        ${totalCell}
      </tr>`;
    }).join("");

    return `<div class="card">
      <h3 class="mt-0" style="margin-bottom:10px">${title}</h3>
      <p class="tiny muted" style="margin-bottom:8px">${sptype === "handicap" ? "Scores include handicap adjustment." : "Scratch scores only."} Tap a column header to sort.</p>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid var(--grey-300)">
          <th style="text-align:left;padding:8px 6px;font-size:12px;color:var(--grey-700)">Bowler</th>
          ${hdrCols}
          ${totalHdr}
        </tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
  };

  let html = buildSection("Handicap Sidepot", handicapBowlers, "handicap");
  html += buildSection("Scratch Sidepot", scratchBowlers, "scratch");

  if (!html) html = `<div class="card"><p class="muted">No scores entered yet.</p></div>`;
  return html;
}

function renderBowlerScores(e) {
  const allIds = new Set();
  Object.values(e.bracketPools || {}).forEach(p => (p.seats || []).forEach(id => allIds.add(id)));
  Object.values(e.bowlers || {}).forEach(b => {
    if (b.paid && (b.sidepotScratch || b.sidepotHandicap || b.highSeriesScratch || b.highSeriesHandicap)) allIds.add(b.id);
  });
  const bowlers = Array.from(allIds).map(id => e.bowlers[id]).filter(Boolean)
    .sort((a, b) => (a.lane || "").localeCompare(b.lane || "") || a.name.localeCompare(b.name));

  if (bowlers.length === 0) return `<div class="empty"><h3>No Scores Yet</h3><p class="muted">Scores will appear here once the event is in progress.</p></div>`;

  const maxGame = bowlers.reduce((m, b) => {
    const s = e.scores[b.id] || {};
    const last = Object.keys(s).map(Number).filter(g => s[g] != null).reduce((a, g) => Math.max(a, g), 0);
    return Math.max(m, last);
  }, 0);

  if (maxGame === 0) return `<div class="card"><div class="empty"><p class="muted">No scores entered yet.</p></div></div>`;

  const cols = Math.min(maxGame, 3);
  const gridStyle = `grid-template-columns: 1fr ${Array(cols).fill("64px").join(" ")}`;

  let html = `<div class="card">
    <h2 class="mt-0" style="margin-bottom:12px">Game Scores</h2>
    <div class="score-grid grid-header" style="${gridStyle}">
      <div>Bowler / Lane</div>
      ${[...Array(cols).keys()].map(i => `<div class="num">G${i+1}</div>`).join("")}
    </div>`;

  bowlers.forEach(b => {
    const s = e.scores[b.id] || {};
    const hcp = calculateHandicap(b.average, e.handicapBase, e.handicapPct);
    html += `<div class="score-grid" style="${gridStyle}">
      <div class="name">${escapeHtml(b.name)}
        <div class="hcp">${b.lane ? "lane " + escapeHtml(b.lane) + " &middot; " : ""}avg ${b.average ?? "—"} &middot; hcp ${hcp}</div>
      </div>
      ${[...Array(cols).keys()].map(i => {
        const g = i + 1;
        const val = s[g];
        return `<div class="num" style="padding:7px 4px;font-size:14px;font-weight:${val != null ? "600" : "400"};${val == null ? "color:var(--grey-500)" : ""}">${val != null ? val : "—"}</div>`;
      }).join("")}
    </div>`;
  });
  html += `</div>`;

  return html;
}

function renderBowlerAlive(e) {
  if (e.status === "draft" || e.status === "open") {
    return `<div class="empty"><h3>Not Started</h3><p class="muted">Standings will appear here once the event begins.</p></div>`;
  }
  const rows = aliveListData(e);
  const totalAlive = rows.filter(r => r.status === "alive" || r.status === "winner").length;
  const totalElim  = rows.filter(r => r.status === "eliminated").length;

  const byBowler = {};
  rows.forEach(r => {
    if (!byBowler[r.bowlerId]) byBowler[r.bowlerId] = { name: r.name, lane: r.lane, team: r.team, alive: [], eliminated: [] };
    if (r.status === "alive" || r.status === "winner") byBowler[r.bowlerId].alive.push(r);
    else byBowler[r.bowlerId].eliminated.push(r);
  });

  // Alive section: bowlers with at least 1 alive bracket (only alive brackets shown here)
  const aliveBowlers = Object.entries(byBowler)
    .filter(([, g]) => g.alive.length > 0)
    .sort(([, a], [, b]) => a.name.localeCompare(b.name) || String(a.lane).localeCompare(String(b.lane)));

  // Eliminated section: ALL bowlers with any eliminated brackets (includes partially-alive bowlers)
  const elimBowlers = Object.entries(byBowler)
    .filter(([, g]) => g.eliminated.length > 0)
    .sort(([, a], [, b]) => a.name.localeCompare(b.name) || String(a.lane).localeCompare(String(b.lane)));

  // Single-line bracket entry: "SCR #1 · Game 2 · vs Jane · Ln 5 · Hcp 12"
  const renderEntry = r => {
    const statusText = r.status === "winner"
      ? `<strong style="color:var(--green)">${escapeHtml(r.finalPosition)}</strong>`
      : r.status === "eliminated"
        ? `<span style="color:var(--red)">Out &middot; Game ${r.eliminatedRound}</span>`
        : `Game ${r.currentRound}`;
    const tieNote = (r.status === "alive" && r.tieGames && r.tieGames.length)
      ? ` &middot; <span style="color:var(--amber);font-weight:600">Tied Game${r.tieGames.length > 1 ? "s" : ""} ${r.tieGames.join(", ")}</span>`
      : "";
    const oppText = (r.opponents || []).map(o =>
      `vs ${escapeHtml(o.name)}${o.lane ? " &middot; Ln " + escapeHtml(String(o.lane)) : ""} &middot; Hcp ${o.hcp}`
    ).join(", ");
    return `<div style="margin:4px 0;font-size:12px;color:var(--grey-700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
      <span style="color:var(--blue);font-weight:500">${r.bracketLabel}</span>
      &middot; ${statusText}${tieNote}${oppText ? " &middot; " + oppText : ""}
    </div>`;
  };

  let html = `<div class="card">
    <div class="row between mb-1">
      <h2 class="mt-0">Alive &mdash; ${totalAlive}</h2>
    </div>
    <p class="tiny">${rows.length} bracket entries &middot; ${totalAlive} alive &middot; ${totalElim} eliminated</p>`;

  if (aliveBowlers.length === 0) {
    html += `<div class="empty"><p>No bowlers alive yet.</p></div>`;
  } else {
    aliveBowlers.forEach(([, g]) => {
      html += `<div style="border-bottom:1px solid var(--grey-300);padding:10px 6px">
        <div class="row between">
          <div style="display:flex;align-items:center;gap:8px">
            ${g.lane ? `<span class="lane-badge">${escapeHtml(g.lane)}</span>` : ""}
            <strong>${escapeHtml(g.name)}</strong>${g.team ? ` <span class="tiny">team ${escapeHtml(g.team)}</span>` : ""}
          </div>
          <span class="pill alive">Alive in ${g.alive.length}</span>
        </div>`;
      // Only alive brackets shown in alive section
      g.alive.forEach(r => { html += renderEntry(r); });
      html += `</div>`;
    });
  }
  html += `</div>`;

  html += `<div class="card"><h2 class="mt-0">Eliminated &mdash; ${elimBowlers.length}</h2>`;
  if (elimBowlers.length === 0) {
    html += `<div class="empty"><p>No bowlers eliminated yet.</p></div>`;
  } else {
    elimBowlers.forEach(([, g]) => {
      const pillLabel = g.alive.length > 0 ? `Out in ${g.eliminated.length}` : "Eliminated";
      const pillStyle = g.alive.length > 0
        ? `style="margin-left:auto;background:var(--orange,#e07b00);color:#fff"`
        : `style="margin-left:auto"`;
      html += `<div style="border-bottom:1px solid var(--grey-100);padding:8px 6px">
        <div style="display:flex;align-items:center;gap:8px">
          ${g.lane ? `<span class="lane-badge" style="background:var(--grey-500)">${escapeHtml(g.lane)}</span>` : ""}
          <span style="font-weight:500">${escapeHtml(g.name)}</span>
          <span class="pill eliminated" ${pillStyle}>${pillLabel}</span>
        </div>
        ${g.eliminated.map(r => renderEntry(r)).join("")}
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}

function renderBowlerPayouts(e) {
  // Active settlement view: the current week's payouts (paid or not) plus
  // still-open deferred items from earlier weeks. Fully-paid earlier weeks
  // live in the History tab.
  const ledger = e.ledger || [];
  const curWeek = currentWeekNum(e);
  const visible = ledger.filter(l => (Number(l.weekNum) || 0) === curWeek || !l.paid);
  if (visible.length === 0 && (!e.refunds || e.refunds.length === 0)) {
    return `<div class="empty"><h3>No Payouts Yet</h3><p class="muted">Bracket and sidepot winnings appear here once the admin finalizes the event.</p></div>`;
  }
  const t = eventTotals(e);
  const totalWinnings = visible.reduce((s, l) => s + l.amount, 0);
  const paidWinnings  = visible.filter(l => l.paid).reduce((s, l) => s + l.amount, 0);

  let html = `<div class="card">
    <h2 class="mt-0">Payouts</h2>
    <div class="summary-grid">
      <div class="summary-card"><div class="label">Prize Pool</div><div class="value">${fmtMoney(t.totalPrizePoolGenerated)}</div></div>
      <div class="summary-card"><div class="label">Winnings</div><div class="value green">${fmtMoney(totalWinnings)}</div></div>
      <div class="summary-card"><div class="label">Paid Out</div><div class="value">${fmtMoney(paidWinnings)}</div></div>
    </div>
  </div>`;

  const statusPillFor = g => g.allPaid
    ? `<span class="pill paid">paid</span>`
    : g.anyPaid ? `<span class="pill tie">partial</span>`
                : `<span class="pill unpaid">unpaid</span>`;

  // Grouped by week first (current week on top, deferred earlier weeks below),
  // then bracket / sidepot within each week.
  const weeks = {};
  visible.forEach(l => {
    if (!weeks[l.weekNum]) weeks[l.weekNum] =
      { weekNum: l.weekNum, weekLabel: l.weekLabel, cats: { bracket: [], sidepot: [] } };
    (weeks[l.weekNum].cats[l.category] || (weeks[l.weekNum].cats[l.category] = [])).push(l);
  });
  const weekList = Object.values(weeks).sort((a, b) => b.weekNum - a.weekNum);

  const catTitles = { bracket: "Bracket Payouts", sidepot: "Sidepot Payouts" };

  function catSection(cat, entries) {
    if (!entries || entries.length === 0) return "";
    const byBowler = {};
    entries.forEach(l => {
      if (!byBowler[l.bowlerId]) byBowler[l.bowlerId] =
        { name: l.bowlerName, items: [], total: 0, allPaid: true, anyPaid: false };
      const g = byBowler[l.bowlerId];
      g.items.push(l);
      g.total += l.amount;
      if (l.paid) g.anyPaid = true; else g.allPaid = false;
    });
    const rows = Object.values(byBowler).sort((a, b) =>
      b.total - a.total || a.name.localeCompare(b.name));
    const secTotal = rows.reduce((x, r) => x + r.total, 0);
    let s = `<div class="row between mb-1" style="margin-top:14px">
      <h4 style="margin:0;color:var(--navy)">${catTitles[cat]}</h4>
      <span class="tiny" style="font-weight:700;color:var(--green)">${fmtMoney(secTotal)}</span>
    </div>
    <div class="scrollable-x"><table>
      <thead><tr><th>Bowler</th><th>Winnings</th><th class="num">Amount</th><th class="center">Status</th></tr></thead><tbody>`;
    rows.forEach(r => {
      const itemsHtml = r.items.map(i => `<div class="tiny">${escapeHtml(i.label)}</div>`).join("");
      s += `<tr>
        <td><strong>${escapeHtml(r.name)}</strong></td>
        <td>${itemsHtml}</td>
        <td class="num green bold">${fmtMoney(r.total)}</td>
        <td class="center">${statusPillFor(r)}</td>
      </tr>`;
    });
    s += `</tbody></table></div>`;
    return s;
  }

  weekList.forEach(wk => {
    const wkTotal = [...wk.cats.bracket, ...wk.cats.sidepot].reduce((x, l) => x + l.amount, 0);
    const deferred = wk.weekNum < curWeek;
    html += `<div class="card">
      <div class="row between mb-1">
        <h3 class="mt-0" style="color:var(--navy)">${escapeHtml(wk.weekLabel)}${deferred ? ` <span class="pill tie">deferred</span>` : ""}</h3>
        <span class="tiny" style="font-weight:700;color:var(--green)">${fmtMoney(wkTotal)}</span>
      </div>
      <p class="tiny muted" style="margin:0">Bracket winnings are paid the week after they are won; sidepots the same week.</p>
      ${catSection("bracket", wk.cats.bracket)}
      ${catSection("sidepot", wk.cats.sidepot)}
    </div>`;
  });

  if (e.refunds && e.refunds.length > 0) {
    html += `<div class="card"><h3 class="mt-0">Refunds</h3>
      <div class="scrollable-x"><table>
        <thead><tr><th>Bowler</th><th>Reason</th><th class="num">Amount</th><th class="center">Status</th></tr></thead><tbody>`;
    e.refunds.forEach(r => {
      html += `<tr>
        <td><strong>${escapeHtml(e.bowlers[r.bowlerId]?.name || "?")}</strong></td>
        <td class="tiny">${escapeHtml(r.reason)}</td>
        <td class="num">${fmtMoney(r.amount)}</td>
        <td class="center">${r.refundPaid ? `<span class="pill paid">paid</span>` : `<span class="pill unpaid">unpaid</span>`}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  }
  return html;
}

// Bowler-view History tab. Per-week breakdown mirrors the admin League
// History; season totals show win COUNTS instead of dollar amounts.
function renderBowlerHistory(e) {
  if (e.eventType !== "league") {
    return `<div class="empty"><h3>No History</h3><p class="muted">History is only tracked for league events.</p></div>`;
  }
  const ledger = e.ledger || [];
  if (ledger.length === 0) {
    return `<div class="card"><div class="empty">
      <h3>No History Yet</h3>
      <p class="muted">Bracket and sidepot winnings appear here once games are scored and weeks are finalized.</p>
    </div></div>`;
  }

  const statusPillFor = g => g.allPaid
    ? `<span class="pill paid">paid</span>`
    : g.anyPaid ? `<span class="pill tie">partial</span>`
                : `<span class="pill unpaid">unpaid</span>`;

  // Build week list for per-week breakdown
  const weeks = {};
  ledger.forEach(l => {
    if (!weeks[l.weekNum]) weeks[l.weekNum] = { weekNum: l.weekNum, weekLabel: l.weekLabel, entries: [] };
    weeks[l.weekNum].entries.push(l);
  });
  const weekList = Object.values(weeks).sort((a, b) => b.weekNum - a.weekNum);

  let html = `<div class="card">
    <h2 class="mt-0">League History</h2>
    <p class="tiny">Bracket and sidepot winnings per bowler, with paid status. ${weekList.length} week${weekList.length !== 1 ? "s" : ""} recorded.</p>
  </div>`;

  // ── Per-week breakdown ──
  weekList.forEach(wk => {
    const byBowler = {};
    wk.entries.forEach(l => {
      if (!byBowler[l.bowlerId]) byBowler[l.bowlerId] =
        { name: l.bowlerName, bracket: 0, sidepot: 0, total: 0, allPaid: true, anyPaid: false };
      const g = byBowler[l.bowlerId];
      if (l.category === "bracket") g.bracket += l.amount; else g.sidepot += l.amount;
      g.total += l.amount;
      if (l.paid) g.anyPaid = true; else g.allPaid = false;
    });
    const bowlers = Object.values(byBowler).sort((a, b) => b.total - a.total);
    const wkBracket = bowlers.reduce((s, b) => s + b.bracket, 0);
    const wkSidepot = bowlers.reduce((s, b) => s + b.sidepot, 0);
    const wkTotal = wkBracket + wkSidepot;

    html += `<div class="card">
      <div class="row between mb-1">
        <h3 class="mt-0" style="color:var(--navy)">${escapeHtml(wk.weekLabel)}</h3>
        <span style="font-size:13px;font-weight:700;color:var(--green)">${fmtMoney(wkTotal)}</span>
      </div>
      <div class="scrollable-x"><table>
        <thead><tr><th>Bowler</th><th class="num">Bracket</th><th class="num">Sidepot</th><th class="num">Total</th><th class="center">Status</th></tr></thead><tbody>`;
    bowlers.forEach(b => {
      html += `<tr>
        <td><strong>${escapeHtml(b.name)}</strong></td>
        <td class="num">${b.bracket ? fmtMoney(b.bracket) : "—"}</td>
        <td class="num">${b.sidepot ? fmtMoney(b.sidepot) : "—"}</td>
        <td class="num green bold">${fmtMoney(b.total)}</td>
        <td class="center">${statusPillFor(b)}</td>
      </tr>`;
    });
    html += `<tr style="border-top:2px solid var(--grey-300)">
      <td><strong>Week total</strong></td>
      <td class="num bold">${fmtMoney(wkBracket)}</td>
      <td class="num bold">${fmtMoney(wkSidepot)}</td>
      <td class="num bold">${fmtMoney(wkTotal)}</td><td></td>
    </tr></tbody></table></div></div>`;
  });

  return html;
}

          <label>Handicap high-series buy-in</label>

        </div>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn primary">Create Event</button>
        <a href="#home" class="btn secondary">Cancel</a>
      </div>
    </form>
  `;
  function recalc() {
    const fee = Number(document.getElementById("entryFee").value) || 0;
    const cut = Number(document.getElementById("houseCut").value) || 0;
    const first = Number(document.getElementById("firstPrize").value) || 0;
    const second = Number(document.getElementById("secondPrize").value) || 0;
    const pool = 8 * fee - cut;
    const total = first + second;
    const ok = Math.abs(total - pool) < 0.01;
    const el = document.getElementById("prize-validate");
    el.className = "alert " + (ok ? "success" : "error");
    el.innerHTML = `Prize math: 8 × ${fmtMoney(fee)} = ${fmtMoney(8*fee)} collected · minus ${fmtMoney(cut)} house cut = <strong>${fmtMoney(pool)}</strong> to bowlers per bracket. 1st + 2nd = ${fmtMoney(total)}. ${ok ? "✓ Balanced" : "✗ Must equal " + fmtMoney(pool)}`;
  }
  document.getElementById("new-event-form").addEventListener("input", recalc);
  recalc();
  document.getElementById("new-event-form").addEventListener("submit", ev => {
    ev.preventDefault();
    const fd = new FormData(ev.target);
    const d = Object.fromEntries(fd);
    d.offersScratch = fd.has("offersScratch");
    d.offersHandicap = fd.has("offersHandicap");
    if (!d.offersScratch && !d.offersHandicap) { alert("At least one bracket type must be offered."); return; }
    const fee = Number(d.bracketEntryFee), cut = Number(d.bracketHouseCutDollar);
    const first = Number(d.bracketFirstPlace), second = Number(d.bracketSecondPlace);
    const pool = 8 * fee - cut;
    if (Math.abs(first + second - pool) > 0.01) {
      alert("1st + 2nd must equal " + fmtMoney(pool) + " (the per-bracket prize pool).");
      return;
    }
    ["scratchSidepotFee","handicapSidepotFee","scratchHighSeriesFee","handicapHighSeriesFee"].forEach(k => {
      if (Number(d[k]) <= 0) d[k] = null;
    });
    const e = newEvent(d);
    e.status = "open";
    state.events[e.id] = e;
    saveState();
    go("event/" + e.id);
  });
}

function renderEvent(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  setHeader(e.name, "home", eventId, "overview");
  const t = eventTotals(e);
  const allBowlersList = Object.values(e.bowlers || {});
  const sortBowlers = (arr) => {
    const { col, dir } = rosterSort;
    return arr.slice().sort((a, b) => {
      let av = col === "name" ? a.name : col === "teamNumber" ? (a.teamNumber || "") : (a.lane || "");
      let bv = col === "name" ? b.name : col === "teamNumber" ? (b.teamNumber || "") : (b.lane || "");
      const r = String(av).localeCompare(String(bv), undefined, { numeric: true });
      return dir * (r || a.name.localeCompare(b.name));
    });
  };
  const bowlers = sortBowlers(allBowlersList);

  // Outstanding bracket payout banner (league only) — reads the persistent ledger
  const unpaidBracket = (e.ledger || []).filter(l => l.category === "bracket" && !l.paid);
  const unpaidBracketTotal = unpaidBracket.reduce((s, l) => s + l.amount, 0);
  const unpaidBracketBowlers = new Set(unpaidBracket.map(l => l.weekNum + "|" + l.bowlerId)).size;
  let html = "";
  if (e.eventType === "league" && unpaidBracket.length > 0) {
    html += `<div class="alert warning" style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>💰 <strong>${unpaidBracketBowlers} bracket payout${unpaidBracketBowlers > 1 ? "s" : ""} owed — ${fmtMoney(unpaidBracketTotal)}</strong></span>
      <a class="btn small" href="#event/${e.id}/payouts" style="background:var(--amber);color:var(--white);border:none">Pay Out ›</a>
    </div>`;
  }
  html += `<div class="card">
    <div class="row between mb-1">
      <div>
        <h2 class="mt-0">${escapeHtml(e.name)}</h2>
        <div class="tiny">${escapeHtml(e.date || "")} · ${statusPill(e.status)}</div>
      </div>
    </div>
    ${renderEntryTotals(e, t)}`;
  // Action buttons only — navigation lives in the subnav above.
  let overviewActions = "";
  if (e.status === "open") {
    overviewActions += `<a class="btn" href="#event/${e.id}/register">+ Add Bowler</a>`;
    overviewActions += `<a class="btn secondary" href="#event/${e.id}/import">⬆ Import Roster</a>`;
    if (t.paidCount > 0) overviewActions += `<button class="btn primary" id="form-brackets-btn">Form Brackets</button>`;
  }
  if (e.status === "finalized" && e.eventType === "league") {
    overviewActions += `<button class="btn secondary" id="start-week-btn" style="border-color:var(--green);color:var(--green)">↺ Start Next Week</button>`;
  }
  // Escape hatch: once brackets are formed or scoring has begun, the Add/entry
  // controls disappear. Let the admin drop back to "open" to add a late bracket
  // or sidepot without losing any scores or brackets already entered.
  if (e.status === "ready" || e.status === "scoring") {
    overviewActions += `<button class="btn secondary" id="reopen-entries-btn" style="border-color:var(--amber);color:var(--amber)">↩ Reopen for Entries</button>`;
  }
  // After reopening, jump back into scoring without re-forming brackets.
  if (e.status === "open" && Object.keys(e.bracketPools || {}).length > 0) {
    overviewActions += `<button class="btn primary" id="resume-scoring-btn">Resume Scoring &#8594;</button>`;
  }
  if (overviewActions) html += `<div class="btn-row">${overviewActions}</div>`;
  html += `</div>`;

  // Bowlers
  const unpaidBowlers = bowlers.filter(b => !b.paid);
  html += `<div class="card">
    <div class="row between"><h3 class="mt-0">Bowlers (${bowlers.length})</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        ${e.status === "open" && unpaidBowlers.length > 0 ? `<button class="btn small" id="mark-all-paid-btn" style="background:var(--green);border:none">✓ Mark All Paid (${unpaidBowlers.length})</button>` : ""}
        ${e.status === "open" ? `<a class="btn small secondary" href="#event/${e.id}/register">+ Add</a>` : ""}
        ${bowlers.length > 0 ? `<button class="btn small secondary" id="print-roster-btn">🖨 Roster</button>` : ""}
      </div>
    </div>`;
  if (bowlers.length === 0) {
    html += `<div class="empty"><p>No bowlers yet.</p>
      <div class="btn-row" style="justify-content:center">
        <a class="btn primary" href="#event/${e.id}/register">+ Add Bowler</a>
        <a class="btn secondary" href="#event/${e.id}/import">⬆ Import Roster</a>
      </div></div>`;
  } else {
    const sortArrow = col => rosterSort.col === col ? (rosterSort.dir > 0 ? " ↑" : " ↓") : "";
    const sortTh = (col, label) => `<th class="sort-th" data-col="${col}" style="cursor:pointer;user-select:none">${label}${sortArrow(col)}</th>`;
    html += `<div class="scrollable-x"><table>
      <thead><tr>
        ${sortTh("lane","Lane")}${sortTh("name","Bowler")}${sortTh("teamNumber","Team")}<th class="num">Avg</th>
        <th class="center">S Brk</th><th class="center">H Brk</th>
        <th class="center">Pots</th>
        <th class="num">Owed</th><th class="center">Paid</th>
      </tr></thead><tbody>`;
    bowlers.forEach(b => {
      const owed = calculateAmountOwed(e, b);
      const isOpen = e.status === "open";
      html += `<tr>
        <td>${b.lane ? `<span class="lane-badge">${escapeHtml(b.lane)}</span>` : ""}</td>
        <td><a href="#event/${e.id}/edit-bowler/${b.id}" style="color:var(--navy);text-decoration:none;font-weight:500">${escapeHtml(b.name)}</a></td>
        <td>${escapeHtml(b.teamNumber)}</td>
        <td class="num">${b.average == null ? '<span class="tiny red">—</span>' : b.average}</td>
        <td class="center">${isOpen && e.offersScratch
          ? `<input type="number" class="inline-brk" data-bid="${b.id}" data-field="scratchBrackets" min="0" max="${e.maxScratchEntriesPerBowler}" value="${b.scratchBrackets || 0}" style="width:46px;padding:3px 4px;font-size:13px;text-align:center">`
          : (b.scratchBrackets || "")}</td>
        <td class="center">${isOpen && e.offersHandicap
          ? `<input type="number" class="inline-brk" data-bid="${b.id}" data-field="handicapBrackets" min="0" max="${e.maxHandicapEntriesPerBowler}" value="${b.handicapBrackets || 0}" style="width:46px;padding:3px 4px;font-size:13px;text-align:center">`
          : (b.handicapBrackets || "")}</td>
        <td class="center tiny">${isOpen
          ? `<span style="display:inline-flex;gap:4px;align-items:center">
              ${e.scratchSidepotFee ? `<label title="Scratch game pot" style="display:inline-flex;align-items:center;gap:2px;cursor:pointer"><input type="checkbox" class="inline-pot" data-bid="${b.id}" data-field="sidepotScratch" ${b.sidepotScratch ? "checked" : ""}>Sg</label>` : ""}
              ${e.handicapSidepotFee ? `<label title="Handicap game pot" style="display:inline-flex;align-items:center;gap:2px;cursor:pointer"><input type="checkbox" class="inline-pot" data-bid="${b.id}" data-field="sidepotHandicap" ${b.sidepotHandicap ? "checked" : ""}>Hg</label>` : ""}
              ${e.scratchHighSeriesFee ? `<label title="Scratch series pot" style="display:inline-flex;align-items:center;gap:2px;cursor:pointer"><input type="checkbox" class="inline-pot" data-bid="${b.id}" data-field="highSeriesScratch" ${b.highSeriesScratch ? "checked" : ""}>Ss</label>` : ""}
              ${e.handicapHighSeriesFee ? `<label title="Handicap series pot" style="display:inline-flex;align-items:center;gap:2px;cursor:pointer"><input type="checkbox" class="inline-pot" data-bid="${b.id}" data-field="highSeriesHandicap" ${b.highSeriesHandicap ? "checked" : ""}>Hs</label>` : ""}
            </span>`
          : (() => { const p = []; if (b.sidepotScratch) p.push("Sg"); if (b.sidepotHandicap) p.push("Hg"); if (b.highSeriesScratch) p.push("Ss"); if (b.highSeriesHandicap) p.push("Hs"); return p.join(" ") || ""; })()}</td>
        <td class="num" id="owed-${b.id}">${fmtMoney(owed)}</td>
        <td class="center">${e.status === "open"
          ? `<input type="checkbox" class="paid-toggle" data-bid="${b.id}" ${b.paid ? "checked" : ""}>`
          : (b.paid ? '<span class="pill paid">paid</span>' : '<span class="pill unpaid">unpaid</span>')}
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    const missingAvg = bowlers.filter(b => b.paid && b.average == null && (b.handicapBrackets > 0 || b.sidepotHandicap || b.highSeriesHandicap));
    if (missingAvg.length > 0 && e.status === "open") {
      html += `<div class="alert warning mt-2">${missingAvg.length} paid bowler${missingAvg.length>1?"s":""} need average entered before scoring. Tap a name to edit.</div>`;
    }
  }
  html += `</div>`;

  // Event settings
  html += `<div class="card">
    <div class="row between"><h3 class="mt-0">Event Settings</h3>
      <a class="btn small secondary" href="#event/${e.id}/settings">Edit Settings</a>
    </div>
    <table>
      <tr><td>Type</td><td class="num">${e.eventType === "league" ? "League" : "Tournament"}</td></tr>
      <tr><td>Bracket fee</td><td class="num">${fmtMoney(e.bracketEntryFee)}</td></tr>
      <tr><td>House cut (per bracket of 8)</td><td class="num">${fmtMoney(e.bracketHouseCutDollar)}</td></tr>
      <tr><td>Prize pool per bracket of 8</td><td class="num">${fmtMoney(perBracketPrizePool(e))}</td></tr>
      <tr><td>1st place</td><td class="num">${fmtMoney(e.bracketFirstPlace)}</td></tr>
      <tr><td>2nd place</td><td class="num">${fmtMoney(e.bracketSecondPlace)}</td></tr>
      <tr><td>Games per session</td><td class="num">${e.gamesPerSession}</td></tr>
      <tr><td>Scratch high-game sidepot</td><td class="num">${e.scratchSidepotFee ? fmtMoney(e.scratchSidepotFee) + "/game" : "—"}</td></tr>
      <tr><td>Handicap high-game sidepot</td><td class="num">${e.handicapSidepotFee ? fmtMoney(e.handicapSidepotFee) + "/game" : "—"}</td></tr>
      <tr><td>Scratch high series</td><td class="num">${e.scratchHighSeriesFee ? fmtMoney(e.scratchHighSeriesFee) : "—"}</td></tr>
      <tr><td>Handicap high series</td><td class="num">${e.handicapHighSeriesFee ? fmtMoney(e.handicapHighSeriesFee) : "—"}</td></tr>
      <tr><td>Handicap formula</td><td class="num">(${e.handicapBase} − avg) × ${e.handicapPct.toFixed(2)}</td></tr>
    </table>
    <div class="btn-row">
      <button class="btn small danger" id="delete-event-btn">Delete Event</button>
    </div>
  </div>`;

  main.innerHTML = html;

  document.querySelectorAll(".sort-th").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (rosterSort.col === col) rosterSort.dir *= -1;
      else { rosterSort.col = col; rosterSort.dir = 1; }
      render();
    });
  });
  const markAllPaidBtn = document.getElementById("mark-all-paid-btn");
  if (markAllPaidBtn) {
    markAllPaidBtn.addEventListener("click", () => {
      const unpaid = Object.values(e.bowlers || {}).filter(b => !b.paid);
      if (unpaid.length === 0) return;
      if (!confirm(`Mark all ${unpaid.length} unpaid bowler${unpaid.length !== 1 ? "s" : ""} as paid?`)) return;
      unpaid.forEach(b => { b.paid = true; });
      saveEvent(eventId);
      render();
    });
  }

  document.querySelectorAll(".paid-toggle").forEach(cb => {
    cb.addEventListener("change", ev => {
      updateBowler(eventId, ev.target.dataset.bid, { paid: ev.target.checked });
      // In-place update — refresh the summary totals card only, no full page re-render
      const ev2 = getEvent(eventId);
      const t2 = eventTotals(ev2);
      const wrapper = document.getElementById("entry-totals-wrapper");
      if (wrapper) wrapper.outerHTML = renderEntryTotals(ev2, t2);
    });
  });
  // Refresh the summary cards + brackets-filled projection in place
  const refreshEntryTotals = () => {
    const ev2 = getEvent(eventId);
    const wrapper = document.getElementById("entry-totals-wrapper");
    if (ev2 && wrapper) wrapper.outerHTML = renderEntryTotals(ev2, eventTotals(ev2));
  };
  document.querySelectorAll(".inline-brk").forEach(inp => {
    inp.addEventListener("change", ev => {
      const bid = ev.target.dataset.bid;
      const field = ev.target.dataset.field;
      const val = Math.max(0, Number(ev.target.value) || 0);
      ev.target.value = val;
      updateBowler(eventId, bid, { [field]: val });
      const b = getEvent(eventId).bowlers[bid];
      const owedEl = document.getElementById("owed-" + bid);
      if (owedEl && b) owedEl.textContent = fmtMoney(calculateAmountOwed(getEvent(eventId), b));
      refreshEntryTotals();
    });
  });
  document.querySelectorAll(".inline-pot").forEach(cb => {
    cb.addEventListener("change", ev => {
      const bid = ev.target.dataset.bid;
      const field = ev.target.dataset.field;
      updateBowler(eventId, bid, { [field]: ev.target.checked });
      const b = getEvent(eventId).bowlers[bid];
      const owedEl = document.getElementById("owed-" + bid);
      if (owedEl && b) owedEl.textContent = fmtMoney(calculateAmountOwed(getEvent(eventId), b));
      refreshEntryTotals();
    });
  });
  const prBtn = document.getElementById("print-roster-btn");
  if (prBtn) prBtn.addEventListener("click", () => printRoster(eventId));
  const fb = document.getElementById("form-brackets-btn");
  if (fb) fb.addEventListener("click", () => {
    const unpaid = bowlers.filter(b => !b.paid && (b.scratchBrackets > 0 || b.handicapBrackets > 0 || b.sidepotScratch || b.sidepotHandicap || b.highSeriesScratch || b.highSeriesHandicap));
    if (unpaid.length > 0 && !confirm(`${unpaid.length} bowler(s) haven't paid. They won't be included. Continue?`)) return;
    const missingAvg = bowlers.filter(b => b.paid && b.average == null && (b.handicapBrackets > 0 || b.sidepotHandicap || b.highSeriesHandicap));
    if (missingAvg.length > 0) { alert(`${missingAvg.length} paid bowler(s) need an average for handicap. Edit them first.`); return; }
    formAllBrackets(eventId);
    render();
  });
  const del = document.getElementById("delete-event-btn");
  if (del) del.addEventListener("click", () => {
    if (confirm(`Delete "${e.name}"? This cannot be undone.`)) { deleteEvent(eventId); go("home"); }
  });
  const swBtn = document.getElementById("start-week-btn");
  if (swBtn) swBtn.addEventListener("click", () => {
    const unpaidBr = (e.ledger || []).filter(l => l.category === "bracket" && !l.paid);
    const unpaidTot = unpaidBr.reduce((s, l) => s + l.amount, 0);
    let msg = "Reset for next league week?\nBowler names, lanes, and averages are kept; scores and brackets clear.";
    if (unpaidBr.length > 0) {
      msg = `${fmtMoney(unpaidTot)} in bracket payouts are still unpaid. They carry forward and stay in the Payouts tab until you mark them paid.\n\n` + msg;
    }
    if (confirm(msg)) {
      resetLeagueWeek(eventId);
      go("event/" + eventId);
    }
  });

  // Reopen for Entries — revert status to "open" without wiping scores/brackets
  const reBtn = document.getElementById("reopen-entries-btn");
  if (reBtn) reBtn.addEventListener("click", () => {
    const anyScores = Object.values(e.scores || {}).some(s => s && Object.keys(s).length > 0);
    let msg = "Reopen this session for entries?\n\nThe event returns to the Open state so you can add or edit bowlers, brackets, and sidepots. Any scores and brackets already entered are kept — use “Resume Scoring” to continue afterward.";
    if (anyScores) {
      msg += "\n\n⚠ Scores have already been entered. Adding a sidepot entry is safe. If you RE-FORM brackets after adding a bracket entry, the existing bracket results will change.";
    }
    if (confirm(msg)) {
      e.status = "open";
      saveState();
      go("event/" + eventId);
    }
  });

  // Resume Scoring — return to scoring after reopening, no re-form needed
  const resBtn = document.getElementById("resume-scoring-btn");
  if (resBtn) resBtn.addEventListener("click", () => {
    e.status = "scoring";
    if (!e.currentGame || e.currentGame < 1) e.currentGame = 1;
    saveState();
    go("event/" + eventId + "/scoring");
  });
}

function renderEntryTotals(e, t) {
  // Per-bowler entry counts (paid + unpaid) drive the brackets-filled projection
  const scratchCounts = [], handicapCounts = [];
  Object.values(e.bowlers || {}).forEach(b => {
    if ((b.scratchBrackets || 0) > 0) scratchCounts.push(b.scratchBrackets);
    if ((b.handicapBrackets || 0) > 0) handicapCounts.push(b.handicapBrackets);
  });
  const fillLine = (label, counts) => {
    const s = bracketsFilledStats(counts);
    if (s.totalEntries === 0) return "";
    let txt = `<strong>${label}</strong> &mdash; ${s.totalEntries} entr${s.totalEntries === 1 ? "y" : "ies"} &middot; `
      + `<strong>${s.filled} bracket${s.filled === 1 ? "" : "s"} filled</strong>`;
    if (s.partial > 0) {
      txt += ` &middot; next bracket ${s.partial}/8 (${s.seatsToFill} more to fill)`;
    } else if (s.filled > 0) {
      txt += ` &middot; no partial bracket`;
    }
    if (s.stranded > 0) {
      txt += ` &middot; <span style="color:var(--red)">${s.stranded} entr${s.stranded === 1 ? "y" : "ies"} can&rsquo;t be placed (a bowler holds more entries than brackets)</span>`;
    }
    return `<div style="font-size:13px;color:var(--grey-900);margin:3px 0;line-height:1.4">${txt}</div>`;
  };
  const fillRows = [
    e.offersScratch  ? fillLine("Scratch", scratchCounts)   : "",
    e.offersHandicap ? fillLine("Handicap", handicapCounts) : ""
  ].filter(Boolean).join("");
  const bracketFillHtml = fillRows ? `<div style="margin-top:8px;background:var(--grey-50);border:1px solid var(--grey-300);border-radius:8px;padding:10px 12px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--grey-700);font-weight:600;margin-bottom:4px">Brackets Filled <span style="text-transform:none;font-weight:400;color:var(--grey-500)">&mdash; projected from all entries, paid or not</span></div>
      ${fillRows}
    </div>` : "";

  return `<div id="entry-totals-wrapper"><div class="summary-grid">
    <div class="summary-card">
      <div class="label">Bowlers</div>
      <div class="value">${t.bowlerCount}</div>
      <div class="sub">${t.paidCount} paid · ${t.unpaidCount} unpaid</div>
    </div>
    <div class="summary-card">
      <div class="label">Bracket Entries</div>
      <div class="value">${t.totalScratchBrackets + t.totalHandicapBrackets}</div>
      <div class="sub">${t.totalScratchBrackets} scr · ${t.totalHandicapBrackets} hcp</div>
    </div>
    <div class="summary-card">
      <div class="label">Sidepot Entries</div>
      <div class="value">${t.totalScratchSidepot + t.totalHandicapSidepot + t.totalScratchHS + t.totalHandicapHS}</div>
      <div class="sub">${t.totalScratchSidepot}sg · ${t.totalHandicapSidepot}hg · ${t.totalScratchHS}ss · ${t.totalHandicapHS}hs</div>
    </div>
    <div class="summary-card">
      <div class="label">Brackets Prize Pool</div>
      <div class="value green">${fmtMoney(t.bracketPrizeRevenue)}</div>
      <div class="sub">paid entries · house cut ${fmtMoney(t.houseCutTotal)}</div>
    </div>
    <div class="summary-card">
      <div class="label">Sidepots Prize Pool</div>
      <div class="value green">${fmtMoney(t.sidepotRevenue)}</div>
      <div class="sub">paid entries · incl. high series</div>
    </div>
  </div>${bracketFillHtml}</div>`;
}

    ${renderEntryTotals(e, t)}
    <form id="bowler-form" class="card">

          <input name="name" type="text" required value="${escapeHtml(b?.name || "")}">
        </div>

          <label>Average ${state.viewMode === "admin" ? "(admin)" : ""}</label>

      </div>
      <div class="field-row three">
        <div><label>Lane</label><input name="lane" type="text" value="${escapeHtml(b?.lane || "")}"></div>
        <div><label>Team #</label><input name="teamNumber" type="text" value="${escapeHtml(b?.teamNumber || "")}"></div>
        <div><label>Phone</label><input name="contactPhone" type="tel" value="${escapeHtml(b?.contactPhone || "")}"></div>
      </div>

      <h3>Brackets — $${e.bracketEntryFee}/entry · 1st ${fmtMoney(e.bracketFirstPlace)} / 2nd ${fmtMoney(e.bracketSecondPlace)}</h3>

Tyler V,185,1,1
Sarah M,172,1,1
Mike J,201,3,2

function parseCSV(text) {
  const lines = text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
  return lines.map(line => {
    const out = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (inQ) {
        if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
        else if (c === '"') inQ = false;
        else cur += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { out.push(cur); cur = ""; }
        else cur += c;
      }
    }
    out.push(cur);
    return out;
  }).filter(r => r.length > 0 && r.some(c => c !== ""));
}
