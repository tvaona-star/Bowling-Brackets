function renderBracketCard(event, pool) {
  const name = id => event.bowlers[id]?.name || "?";
  let html = `<div class="card">
    <h3 class="mt-0">${pool.competitionType[0].toUpperCase()+pool.competitionType.slice(1)} Bracket #${pool.poolNumber}
      <span class="tiny" style="font-weight:400"> &middot; 1st ${fmtMoney(pool.firstPrize)} / 2nd ${fmtMoney(pool.secondPrize)}</span>
    </h3>
    <div class="bracket">`;

  // Round 1 — 4 matchups, label separated from flex container so space-around centres only match boxes
  html += `<div class="bracket-round">
    <div class="bracket-round-label">Round 1 &middot; Game 1</div>
    <div class="bracket-matches">`;
  (pool.matchups[1] || []).forEach(m => { html += renderMatchupBox(m, name); });
  html += `</div></div>`;

  // Round 2 — 2 matchups, centred at 1/4 and 3/4 of column height
  html += `<div class="bracket-round">
    <div class="bracket-round-label">Round 2 &middot; Game 2</div>
    <div class="bracket-matches">`;
  (pool.matchups[2] || []).forEach(m => { html += renderMatchupBox(m, name); });
  html += `</div></div>`;

  // Final — 1 matchup, centred vertically
  html += `<div class="bracket-round">
    <div class="bracket-round-label">Final &middot; Game 3</div>
    <div class="bracket-matches r3">`;
  (pool.matchups[3] || []).forEach(m => { html += renderFinalMatchupBox(m, name, pool); });
  html += `</div></div>`;

  html += `</div></div>`;
  return html;
}

function renderMatchupBox(m, name) {
  if (!m || !m.bowlers || m.bowlers.length === 0) return "";
  let html = `<div class="bracket-match ${m.isTie ? "tie-active" : ""}">`;
  if (m.pending) {
    m.bowlers.forEach(bid => {
      html += `<div class="seat"><span class="name">${escapeHtml(name(bid))}</span><span class="num">—</span></div>`;
    });
  } else {
    m.scored.forEach(s => {
      const cls = m.advancers.includes(s.bid) ? "winner" : "loser";
      html += `<div class="seat ${cls}"><span class="name">${escapeHtml(name(s.bid))}</span><span class="num">${s.score}</span></div>`;
    });
    if (m.isTie) html += `<div class="tiny amber">Tie — all advance</div>`;
  }
  html += `</div>`;
  return html;
}

function renderFinalMatchupBox(m, name, pool) {
  if (!m || !m.bowlers || m.bowlers.length === 0) {
    return `<div class="bracket-match"><div class="seat muted">—</div></div>`;
  }
  let html = `<div class="bracket-match">`;
  if (m.pending) {
    m.bowlers.forEach(bid => {
      html += `<div class="seat"><span class="name">${escapeHtml(name(bid))}</span><span class="num">—</span></div>`;
    });
  } else {
    const firsts = m.firsts || [];
    const seconds = m.seconds || [];
    m.scored.forEach(s => {
      let cls = "loser";
      if (firsts.includes(s.bid)) cls = "winner";
      else if (seconds.includes(s.bid)) cls = "";
      html += `<div class="seat ${cls}"><span class="name">${escapeHtml(name(s.bid))}</span><span class="num">${s.score}</span></div>`;
    });
    if (firsts.length > 1) {
      const split = Math.round(((pool.firstPrize + pool.secondPrize) / firsts.length) * 100) / 100;
      html += `<div class="alert warning" style="font-size:12px;margin:8px 0 0">Tie at top — ${firsts.length}-way split ${fmtMoney(split)} each</div>`;
    } else if (firsts.length === 1) {
      html += `<div class="alert success" style="font-size:12px;margin:8px 0 0">&#127942; ${escapeHtml(name(firsts[0]))} — 1st ${fmtMoney(pool.firstPrize)}</div>`;
      if (seconds.length === 1) {
        html += `<div class="alert info" style="font-size:12px;margin:4px 0 0">&#129352; ${escapeHtml(name(seconds[0]))} — 2nd ${fmtMoney(pool.secondPrize)}</div>`;
      } else if (seconds.length > 1) {
        const split = Math.round((pool.secondPrize / seconds.length) * 100) / 100;
        html += `<div class="alert info" style="font-size:12px;margin:4px 0 0">2nd-place ${seconds.length}-way tie: ${fmtMoney(split)} each</div>`;
      }
    }
  }
  html += `</div>`;
  return html;
}

function renderScoring(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  setHeader("Score Entry", "event/" + eventId, eventId, "scoring");

  // Ensure status reflects scoring in progress — handles direct URL navigation
  // and cross-tab cases where status wasn't advanced through the button.
  // NEVER silently advance an "open" event just because the scoring screen was
  // opened — that used to lock admins out of adding late brackets/sidepots with
  // no way back. An "open" event is sent to the overview to form brackets first.
  if (e.status === "open") { go("event/" + eventId); return; }
  if (e.status === "ready") {
    e.status = "scoring";
    saveState();
  }

  // Initialize currentGame if not set
  if (!e.currentGame || e.currentGame < 1) { e.currentGame = 1; saveState(); }
  const cg = e.currentGame; // current active game (1, 2, 3, or 4 = all done)

  computeBracketResults(e);

  // All bowlers who participate in any capacity
  const allIds = new Set();
  Object.values(e.bracketPools || {}).forEach(p => p.seats.forEach(id => allIds.add(id)));
  Object.values(e.bowlers || {}).forEach(b => {
    if (b.paid && (b.sidepotScratch || b.sidepotHandicap || b.highSeriesScratch || b.highSeriesHandicap)) allIds.add(b.id);
  });
  const bowlers = Array.from(allIds).map(id => e.bowlers[id]).filter(Boolean)
    .sort((a, b) => (a.lane || "").localeCompare(b.lane || "") || a.name.localeCompare(b.name));

  // Build alive status map based only on SUBMITTED games (games before cg).
  // Temporarily hide current-game scores so live unsubmitted input does not grey out bowlers.
  const savedCurrentScores = {};
  if (cg <= 3) {
    Object.keys(e.scores).forEach(bid => {
      if (e.scores[bid] && e.scores[bid][cg] != null) {
        savedCurrentScores[bid] = e.scores[bid][cg];
        delete e.scores[bid][cg];
      }
    });
  }
  const aliveStatusMap = {};
  aliveListData(e).forEach(r => {
    if (!aliveStatusMap[r.bowlerId] || r.status === "alive" || r.status === "winner") {
      aliveStatusMap[r.bowlerId] = r.status;
    }
  });
  // Restore current-game scores and recompute bracket results for live display
  if (cg <= 3) {
    Object.entries(savedCurrentScores).forEach(([bid, score]) => {
      if (!e.scores[bid]) e.scores[bid] = {};
      e.scores[bid][cg] = score;
    });
    computeBracketResults(e);
  }

  // Is this bowler eliminated from all brackets and has no sidepot?
  const isOut = (b) => {
    const hasSidepot = b.paid && (b.sidepotScratch || b.sidepotHandicap || b.highSeriesScratch || b.highSeriesHandicap);
    if (hasSidepot) return false;
    const inBracket = Object.values(e.bracketPools || {}).some(p => p.seats.includes(b.id));
    if (!inBracket) return false;
    return aliveStatusMap[b.id] === "eliminated";
  };

  // Grid column count grows as games are submitted
  const pastCols = Math.min(cg - 1, 3); // how many prior-game read-only cols to show
  const showInput = cg <= 3;
  const totalCols = pastCols + (showInput ? 1 : 0);
  const gridStyle = `grid-template-columns: 1fr ${Array(totalCols).fill("70px").join(" ")}`;

  // Header labels
  const hdrCols = [...Array(pastCols).keys()].map(i => `<div class="num">G${i + 1}</div>`).join("");
  const hdrInput = showInput ? `<div class="num">G${cg}</div>` : "";

  let html = `<div class="card">
    <div class="row between"><h2 class="mt-0">Game Scores — ${cg <= 3 ? "Game " + cg : "All Done"}</h2>${statusPill(e.status)}</div>
    <p class="tiny">Enter scratch scores. Handicap computed automatically. Submit each game to advance brackets.</p>
    <div class="score-grid grid-header" style="${gridStyle}">
      <div>Bowler / Lane</div>${hdrCols}${hdrInput}
    </div>`;

  bowlers.forEach(b => {
    const s = e.scores[b.id] || {};
    const hcp = calculateHandicap(b.average, e.handicapBase, e.handicapPct);
    const out = isOut(b);
    const pastScoreCols = [...Array(pastCols).keys()].map(i => {
      const g = i + 1;
      const val = s[g] ?? "—";
      return `<div class="num" style="padding:7px 4px;font-size:14px;font-weight:600;${s[g] == null ? "color:var(--grey-500)" : ""}">${val}</div>`;
    }).join("");
    const inputCol = showInput
      ? `<input class="score-input" data-bid="${b.id}" data-g="${cg}" type="number" min="0" max="300" value="${s[cg] ?? ""}" ${out ? "tabindex=-1 disabled" : ""}>`
      : "";
    html += `<div class="score-grid" style="${out ? "opacity:0.35;" : ""}${gridStyle}">
      <div class="name">${escapeHtml(b.name)}${out ? ' <span class="tiny" style="color:var(--grey-500)">(out)</span>' : ""}
        <div class="hcp">${b.lane ? "lane " + escapeHtml(b.lane) + " &middot; " : ""}avg ${b.average ?? "—"} &middot; hcp ${hcp}</div>
      </div>
      ${pastScoreCols}${inputCol}
    </div>`;
  });
  html += `</div>`;

  // Submit / Back buttons — visible while cg ≤ 3
  if (showInput) {
    html += `<div class="card">
      <div class="btn-row">
        <button class="btn primary" style="flex:2" id="submit-game-btn">Submit Game ${cg} &amp; Advance Brackets &#8594;</button>
        ${cg > 1 ? `<button class="btn secondary" id="back-game-btn">&#8592; Edit Game ${cg - 1}</button>` : ""}
      </div>
    </div>`;
  }

  // Back button on finalize screen (go back to Game 3 entry)
  if (cg > 3) {
    html += `<div class="card" style="text-align:right">
      <button class="btn secondary small" id="back-game-btn">&#8592; Edit Game 3</button>
    </div>`;
  }

  // Alive list links
  html += `<div class="card">
    <h3 class="mt-0">Alive List</h3>
    <p class="tiny">Live bracket status — updates as games are submitted.</p>
    <div class="btn-row">
      <a class="btn small secondary" href="#event/${e.id}/alive">Open Full Alive List &#8594;</a>
      <button class="btn small secondary" id="print-alive-btn">&#128424; Print Alive / Matchups</button>
    </div>
  </div>`;

  // Finalize — only after all 3 games submitted
  if (cg > 3) {
    html += `<div class="card">
      <h3 class="mt-0">Finalize Session</h3>
      <p class="muted">All 3 games submitted. Lock results and compute final payouts.</p>
      <button class="btn primary full" id="finalize-btn">Finalize &amp; Compute Payouts</button>
    </div>`;
  }

  main.innerHTML = html;

  // Score input live update (sidepot stays live)
  document.querySelectorAll(".score-input").forEach(inp => {
    inp.addEventListener("input", ev => {
      const bid = ev.target.dataset.bid;
      const g = Number(ev.target.dataset.g);
      const val = ev.target.value.trim();
      if (val === "" || (Number(val) >= 0 && Number(val) <= 300)) {
        // noSave=true: keep in memory only; debounced save pushes to Firebase ~700ms after typing stops
        setScore(eventId, bid, g, val === "" ? null : Number(val), true);
        saveEventDebounced(eventId);
      }
    });
    inp.addEventListener("keydown", ev => { if (ev.key === "Enter") ev.target.blur(); });
  });

  // Submit Game N
  const subBtn = document.getElementById("submit-game-btn");
  if (subBtn) subBtn.addEventListener("click", () => {
    const ev2 = getEvent(eventId);
    computeBracketResults(ev2);
    const aliveMap2 = {};
    aliveListData(ev2).forEach(r => {
      if (!aliveMap2[r.bowlerId] || r.status === "alive") aliveMap2[r.bowlerId] = r.status;
    });
    const missing = bowlers.filter(b => {
      if (isOut(b)) return false; // already eliminated, no score needed
      const hasSidepot = b.paid && (b.sidepotScratch || b.sidepotHandicap || b.highSeriesScratch || b.highSeriesHandicap);
      const inBracket = Object.values(ev2.bracketPools || {}).some(p => (p.seats || []).includes(b.id));
      const needsScore = hasSidepot || (cg === 1 ? inBracket : aliveMap2[b.id] === "alive");
      return needsScore && (ev2.scores[b.id] || {})[cg] == null;
    });
    if (missing.length > 0) {
      const names = missing.slice(0, 3).map(b => b.name).join(", ");
      if (!confirm(`${missing.length} bowler(s) missing Game ${cg} score (${names}${missing.length > 3 ? "…" : ""}). Submit anyway?`)) return;
    }
    ev2.currentGame = cg + 1;
    syncSidepotLedger(ev2);   // resolved per-game sidepots become payable immediately
    saveEvent(eventId);
    render();
  });

  // Back to previous game
  const backBtn = document.getElementById("back-game-btn");
  if (backBtn) backBtn.addEventListener("click", () => {
    const ev3 = getEvent(eventId);
    ev3.currentGame = Math.max(1, (ev3.currentGame || 1) - 1);
    saveEvent(eventId);
    render();
  });

  const pab = document.getElementById("print-alive-btn");
  if (pab) pab.addEventListener("click", () => printAliveSnapshot(eventId));

  const finBtn = document.getElementById("finalize-btn");
  if (finBtn) finBtn.addEventListener("click", () => {
    finalizePayouts(eventId);
    go("event/" + eventId + "/payouts");
  });
}

function buildLiveSidepots(e) {
  let html = `<h3 class="mt-0">Sidepot Results (Live)</h3>`;
  const spOut = sidepotPerGameResults(e);
  let anyResults = false;
  Object.entries(spOut).forEach(([, sp]) => {
    if (sp.totalEntrants === 0) return;
    anyResults = true;
    html += `<h4 style="margin-top:8px;color:var(--navy)">${sp.label} — ${sp.totalEntrants} entries &middot; ${fmtMoney(sp.perGamePool)}/game pool</h4>`;
    for (let g = 1; g <= e.gamesPerSession; g++) {
      const r = sp.games[g];
      if (!r) html += `<div style="font-size:14px" class="muted">Game ${g}: not yet entered</div>`;
      else if (!r.allEntered) {
        const winners = r.winners.map(b => escapeHtml(e.bowlers[b]?.name || "?")).join(", ");
        html += `<div style="font-size:14px" class="amber">Game ${g}: leader so far — ${winners} @ ${r.topScore} (waiting on remaining bowlers)</div>`;
      } else {
        const winners = r.winners.map(b => escapeHtml(e.bowlers[b]?.name || "?")).join(", ");
        html += `<div style="font-size:14px" class="green"><strong>Game ${g}:</strong> ${winners} @ ${r.topScore} — ${fmtMoney(r.payout)}${r.winners.length > 1 ? " each (tie split)" : ""}</div>`;
      }
    }
  });
  const hs = highSeriesResults(e);
  Object.values(hs).forEach(r => {
    if (r.totalEntrants === 0) return;
    anyResults = true;
    html += `<h4 style="margin-top:8px;color:var(--navy)">${r.label} — ${r.totalEntrants} entries &middot; ${fmtMoney(r.pool)} pool</h4>`;
    if (r.locked) html += `<div style="font-size:14px" class="amber">&#128274; Locked until all 3 games entered</div>`;
    else {
      const winners = r.winners.map(b => escapeHtml(e.bowlers[b]?.name || "?")).join(", ");
      html += `<div style="font-size:14px" class="green"><strong>Series:</strong> ${winners} @ ${r.top} — ${fmtMoney(r.payout)}${r.winners.length > 1 ? " each (tie split)" : ""}</div>`;
    }
  });
  if (!anyResults) html += `<p class="muted">No sidepots offered or no entries.</p>`;
  return html;
}

function renderAliveList(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  setHeader("Alive List", "event/" + eventId, eventId, "alive");
  const rows = aliveListData(e);
  const totalAlive = rows.filter(r => r.status === "alive" || r.status === "winner").length;
  const totalElim = rows.filter(r => r.status === "eliminated").length;

  // Group entries by bowlerId
  const byBowler = {};
  rows.forEach(r => {
    if (!byBowler[r.bowlerId]) byBowler[r.bowlerId] = { name: r.name, lane: r.lane, team: r.team, alive: [], eliminated: [] };
    if (r.status === "alive" || r.status === "winner") byBowler[r.bowlerId].alive.push(r);
    else byBowler[r.bowlerId].eliminated.push(r);
  });

  // Alive section: bowlers with at least 1 alive bracket (only alive brackets shown here)
  const aliveBowlers = Object.entries(byBowler)
    .filter(([, g]) => g.alive.length > 0)
    .sort(([, a], [, b]) => a.name.localeCompare(b.name) || String(a.lane).localeCompare(String(b.lane)));

  // Eliminated section: ALL bowlers with any eliminated brackets (includes partially-alive bowlers)
  const elimBowlers = Object.entries(byBowler)
    .filter(([, g]) => g.eliminated.length > 0)
    .sort(([, a], [, b]) => a.name.localeCompare(b.name) || String(a.lane).localeCompare(String(b.lane)));

  // Single-line bracket entry: "SCR #1 · Game 2 · vs Jane · Ln 5 · Hcp 12"
  const renderBracketEntry = r => {
    const statusText = r.status === "winner"
      ? `<strong style="color:var(--green)">${escapeHtml(r.finalPosition)}</strong>`
      : r.status === "eliminated"
        ? `<span style="color:var(--red)">Out &middot; Game ${r.eliminatedRound}</span>`
        : `Game ${r.currentRound}`;
    const tieNote = (r.status === "alive" && r.tieGames && r.tieGames.length)
      ? ` &middot; <span style="color:var(--amber);font-weight:600">Tied Game${r.tieGames.length > 1 ? "s" : ""} ${r.tieGames.join(", ")}</span>`
      : "";
    const oppText = (r.opponents || []).map(o =>
      `vs ${escapeHtml(o.name)}${o.lane ? " &middot; Ln " + escapeHtml(String(o.lane)) : ""} &middot; Hcp ${o.hcp}`
    ).join(", ");
    return `<div style="margin:4px 0;font-size:12px;color:var(--grey-700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
      <span style="color:var(--blue);font-weight:500">${r.bracketLabel}</span>
      &middot; ${statusText}${tieNote}${oppText ? " &middot; " + oppText : ""}
    </div>`;
  };

  let html = `<div class="card">
    <div class="row between"><h2 class="mt-0">Alive — ${totalAlive}</h2>
      <a class="btn small secondary" href="#event/${e.id}/scoring">Score Entry</a></div>
    <p class="tiny">${rows.length} bracket entries total &middot; ${totalAlive} alive &middot; ${totalElim} eliminated</p>`;

  if (aliveBowlers.length === 0) {
    html += `<div class="empty"><p>No bowlers alive yet.</p></div>`;
  } else {
    aliveBowlers.forEach(([, g]) => {
      html += `<div style="border-bottom:1px solid var(--grey-300);padding:10px 6px">
        <div class="row between">
          <div style="display:flex;align-items:center;gap:8px">
            ${g.lane ? `<span class="lane-badge">${escapeHtml(g.lane)}</span>` : ""}
            <strong>${escapeHtml(g.name)}</strong>${g.team ? ` <span class="tiny">team ${escapeHtml(g.team)}</span>` : ""}
          </div>
          <span class="pill alive">Alive in ${g.alive.length}</span>
        </div>`;
      // Only alive brackets shown in the alive section
      g.alive.forEach(r => { html += renderBracketEntry(r); });
      html += `</div>`;
    });
  }
  html += `</div>`;

  html += `<div class="card"><h2 class="mt-0">Eliminated — ${elimBowlers.length}</h2>`;
  if (elimBowlers.length === 0) {
    html += `<div class="empty"><p>No bowlers eliminated yet.</p></div>`;
  } else {
    elimBowlers.forEach(([, g]) => {
      // If bowler also has alive brackets, flag them as partial
      const pillLabel = g.alive.length > 0
        ? `Out in ${g.eliminated.length}`
        : "Eliminated";
      const pillStyle = g.alive.length > 0
        ? `style="margin-left:auto;background:var(--orange,#e07b00);color:#fff"`
        : `style="margin-left:auto"`;
      html += `<div style="border-bottom:1px solid var(--grey-100);padding:8px 6px">
        <div style="display:flex;align-items:center;gap:8px">
          ${g.lane ? `<span class="lane-badge" style="background:var(--grey-500)">${escapeHtml(g.lane)}</span>` : ""}
          <span style="font-weight:500">${escapeHtml(g.name)}</span>
          <span class="pill eliminated" ${pillStyle}>${pillLabel}</span>
        </div>
        ${g.eliminated.map(r => renderBracketEntry(r)).join("")}
      </div>`;
    });
  }
  html += `</div>`;

  main.innerHTML = html;
}

function renderPayouts(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  setHeader("Payouts", "event/" + eventId, eventId, "payouts");
  const t = eventTotals(e);

  // The Payouts tab is the active settlement view: every week with open payouts
  // stays visible until the admin explicitly confirms all payments for that week
  // are complete using the per-week "Confirm Complete" button. Once confirmed,
  // the week is removed from this tab and lives only in the History tab.
  const ledger = e.ledger || [];
  const curWeek = currentWeekNum(e);
  const confirmed = e.confirmedPaymentWeeks || {};
  // Confirmation is tracked per week AND per category (bracket vs sidepot) so
  // each can be settled independently. Legacy data stored `true` for a whole
  // week — treat that as both categories confirmed.
  const isConfirmed = l => {
    const c = confirmed[l.weekNum];
    if (!c) return false;
    if (c === true) return true;
    return !!c[l.category];
  };
  const visible = ledger.filter(l => !isConfirmed(l));
  const totalWinnings  = visible.reduce((s, l) => s + l.amount, 0);
  const paidWinnings   = visible.filter(l => l.paid).reduce((s, l) => s + l.amount, 0);
  const totalRefunds   = e.refunds.reduce((s, r) => s + r.amount, 0);
  const unpaidRefunds  = e.refunds.filter(r => !r.refundPaid).reduce((s, r) => s + r.amount, 0);
  const outstanding    = (totalWinnings - paidWinnings) + unpaidRefunds;

  let html = `<div class="card">
    <h2 class="mt-0">Settlement Sheet</h2>
    <div class="summary-grid">
      <div class="summary-card"><div class="label">Collected</div><div class="value">${fmtMoney(t.paid)}</div></div>
      <div class="summary-card"><div class="label">Winnings</div><div class="value">${fmtMoney(totalWinnings)}</div></div>
      <div class="summary-card"><div class="label">Paid Out</div><div class="value green">${fmtMoney(paidWinnings)}</div></div>
      <div class="summary-card"><div class="label">Outstanding</div><div class="value" style="color:var(--amber)">${fmtMoney(outstanding)}</div></div>
    </div>
    <p class="tiny">House cut: ${Math.floor((t.paidScratchBrackets + t.paidHandicapBrackets) / 8)} bracket(s) &times; ${fmtMoney(e.bracketHouseCutDollar)} = ${fmtMoney(t.houseCutTotal)}${totalRefunds ? ` &middot; Refunds ${fmtMoney(totalRefunds)}` : ""}</p>
    <div class="btn-row">
      <button class="btn primary" id="export-csv-btn">Download CSV</button>
      <button class="btn secondary" id="print-btn">Print</button>
    </div>
  </div>`;

  // Grouped by week first (current week on top, deferred earlier weeks below),
  // then bracket / sidepot within each week. Each row carries one Paid checkbox
  // that settles that bowler's winnings of that category for that week —
  // bracket and sidepot settle independently.
  const weeks = {};
  visible.forEach(l => {
    if (!weeks[l.weekNum]) weeks[l.weekNum] =
      { weekNum: l.weekNum, weekLabel: l.weekLabel, cats: { bracket: [], sidepot: [] } };
    (weeks[l.weekNum].cats[l.category] || (weeks[l.weekNum].cats[l.category] = [])).push(l);
  });
  const weekList = Object.values(weeks).sort((a, b) => b.weekNum - a.weekNum);

  const catTitles = { bracket: "Bracket Payouts", sidepot: "Sidepot Payouts" };

  function catSection(wk, cat, entries) {
    if (!entries || entries.length === 0) return "";
    const byBowler = {};
    entries.forEach(l => {
      if (!byBowler[l.bowlerId]) byBowler[l.bowlerId] =
        { bowlerId: l.bowlerId, name: l.bowlerName, lane: l.lane, items: [], total: 0, allPaid: true };
      const g = byBowler[l.bowlerId];
      g.items.push(l);
      g.total += l.amount;
      if (!l.paid) g.allPaid = false;
    });
    const rows = Object.values(byBowler).sort((a, b) => a.name.localeCompare(b.name));
    const secTotal  = rows.reduce((x, r) => x + r.total, 0);
    const secUnpaid = rows.reduce((x, r) =>
      x + r.items.filter(i => !i.paid).reduce((y, i) => y + i.amount, 0), 0);
    let s = `<div class="row between mb-1" style="margin-top:14px">
      <h4 style="margin:0;color:var(--navy)">${catTitles[cat]}</h4>
      <span class="tiny" style="font-weight:700;color:${secUnpaid > 0 ? "var(--amber)" : "var(--green)"}">${secUnpaid > 0 ? fmtMoney(secUnpaid) + " owed" : "all paid"} &middot; ${fmtMoney(secTotal)}</span>
    </div>
    <div class="scrollable-x"><table>
      <thead><tr><th>Bowler</th><th>Lane</th><th>Winnings</th><th class="num">Amount</th><th class="center">Paid</th></tr></thead><tbody>`;
    rows.forEach(r => {
      const itemsHtml = r.items.map(i =>
        `<div class="tiny">${escapeHtml(i.label)} &mdash; ${fmtMoney(i.amount)}</div>`).join("");
      s += `<tr>
        <td><strong>${escapeHtml(r.name)}</strong></td>
        <td>${escapeHtml(r.lane || "")}</td>
        <td>${itemsHtml}</td>
        <td class="num green bold">${fmtMoney(r.total)}</td>
        <td class="center"><input type="checkbox" class="ledger-paid-toggle" data-week="${wk.weekNum}" data-bid="${r.bowlerId}" data-cat="${cat}" ${r.allPaid ? "checked" : ""}></td>
      </tr>`;
    });
    const allSecPaid = secUnpaid === 0;
    const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
    s += `</tbody></table></div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--grey-200);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      ${allSecPaid
        ? `<span class="tiny green" style="font-weight:600">✓ All ${cat} payments for this week are marked paid.</span>`
        : `<span class="tiny" style="color:var(--amber)">⚠ Mark all bowlers as paid before confirming.</span>`}
      <button class="btn small confirm-week-btn"
        data-week="${wk.weekNum}"
        data-cat="${cat}"
        data-weeklabel="${escapeHtml(wk.weekLabel)}"
        style="background:${allSecPaid ? "var(--green)" : "var(--grey-400)"};color:white;border:none;">
        ✓ Confirm ${escapeHtml(wk.weekLabel)} ${catLabel} Payments Complete
      </button>
    </div>`;
    return s;
  }

  if (weekList.length === 0) {
    html += `<div class="card"><p class="muted tiny">No payouts recorded yet.</p></div>`;
  }
  weekList.forEach(wk => {
    const deferred = wk.weekNum < curWeek;
    html += `<div class="card">
      <div class="row between mb-1">
        <h3 class="mt-0" style="color:var(--navy)">${escapeHtml(wk.weekLabel)}${deferred ? ` <span class="pill tie">deferred</span>` : ""}</h3>
      </div>
      ${catSection(wk, "bracket", wk.cats.bracket)}
      ${catSection(wk, "sidepot", wk.cats.sidepot)}
    </div>`;
  });

  if (e.refunds.length > 0) {
    html += `<div class="card"><h3 class="mt-0">Refunds</h3>
      <div class="scrollable-x"><table>
        <thead><tr><th>Bowler</th><th>Reason</th><th class="num">Amount</th><th class="center">Paid</th></tr></thead><tbody>`;
    e.refunds.forEach((r, idx) => {
      html += `<tr>
        <td><strong>${escapeHtml(e.bowlers[r.bowlerId]?.name || "?")}</strong></td>
        <td class="tiny">${escapeHtml(r.reason)}</td>
        <td class="num">${fmtMoney(r.amount)}</td>
        <td class="center"><input type="checkbox" class="refund-paid-toggle" data-idx="${idx}" ${r.refundPaid ? "checked" : ""}></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  }

  main.innerHTML = html;

  document.getElementById("export-csv-btn").addEventListener("click", () => {
    downloadCSV(`${e.name.replace(/\s+/g,"_")}_payouts.csv`, payoutCSV(e));
  });
  document.getElementById("print-btn").addEventListener("click", () => window.print());

  if (e.eventType === "league" && e.status === "finalized") {
    const nwBtn = document.createElement("button");
    nwBtn.className = "btn secondary";
    nwBtn.style.cssText = "border-color:var(--green);color:var(--green)";
    nwBtn.textContent = "↺ Start Next Week";
    document.querySelector(".btn-row").appendChild(nwBtn);
    nwBtn.addEventListener("click", () => {
      const unpaidBr = (e.ledger || []).filter(l => l.category === "bracket" && !l.paid);
      const unpaidTot = unpaidBr.reduce((s, l) => s + l.amount, 0);
      let msg = "Reset all entries and scores for next league week? Bowler names, lanes, and averages will be kept.";
      if (unpaidBr.length > 0) {
        msg = fmtMoney(unpaidTot) + " in bracket payouts are still unpaid — they carry forward and stay payable in this tab. " + msg;
      }
      if (confirm(msg)) {
        resetLeagueWeek(eventId);
        go("event/" + eventId);
      }
    });
  }

  document.querySelectorAll(".confirm-week-btn").forEach(btn => {
    btn.addEventListener("click", ev => {
      const wkNum   = Number(ev.currentTarget.dataset.week);
      const cat     = ev.currentTarget.dataset.cat;
      const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
      const wkLabel = ev.currentTarget.dataset.weeklabel || ("Week " + wkNum);
      const wkEntries = (e.ledger || []).filter(l => l.weekNum === wkNum && l.category === cat);
      const unpaidCount = wkEntries.filter(l => !l.paid).length;
      let msg = `Confirm all ${cat} payments for ${wkLabel} are complete?\n\nThe ${cat} payouts for this week will be removed from the Payouts tab. You can still view them in the History tab.`;
      if (unpaidCount > 0) {
        msg = `⚠ ${unpaidCount} ${cat} payment(s) are not yet marked as paid.\n\n` + msg;
      }
      if (!confirm(msg)) return;
      if (!e.confirmedPaymentWeeks) e.confirmedPaymentWeeks = {};
      let c = e.confirmedPaymentWeeks[wkNum];
      if (c === true) c = { bracket: true, sidepot: true };        // migrate legacy whole-week flag
      else if (typeof c !== "object" || c === null) c = {};
      c[cat] = true;
      e.confirmedPaymentWeeks[wkNum] = c;
      saveEvent(eventId);
      render();
    });
  });

  document.querySelectorAll(".ledger-paid-toggle").forEach(cb => {
    cb.addEventListener("change", ev => {
      const wk  = Number(ev.target.dataset.week);
      const bid = ev.target.dataset.bid;
      const cat = ev.target.dataset.cat;
      const ch  = ev.target.checked;
      (e.ledger || []).forEach(l => {
        if (l.weekNum === wk && l.bowlerId === bid && l.category === cat) {
          l.paid = ch;
          l.paidAt = ch ? Date.now() : null;
        }
      });
      saveEvent(eventId);
      render();
    });
  });

  document.querySelectorAll(".refund-paid-toggle").forEach(cb => {
    cb.addEventListener("change", ev => {
      const idx = Number(ev.target.dataset.idx);
      if (e.refunds[idx]) e.refunds[idx].refundPaid = ev.target.checked;
      saveEvent(eventId);
      render();
    });
  });
}

// Delete a finalized (archived) week from history. Removes its snapshot and
// ledger rows, then renumbers later weeks down by one so the week count stays
// contiguous — currentWeekNum is derived from weekHistory.length, so a gap
// would otherwise collide the live week with an archived one.
function deleteWeekFromHistory(eventId, weekNum) {
  const e = getEvent(eventId);
  if (!e) return;

  e.weekHistory = (e.weekHistory || []).filter(w => w.weekNum !== weekNum);
  e.ledger      = (e.ledger || []).filter(l => l.weekNum !== weekNum);

  // Shift every later week down by one
  e.weekHistory.forEach(w => { if (w.weekNum > weekNum) w.weekNum -= 1; });
  e.ledger.forEach(l => { if (l.weekNum > weekNum) l.weekNum -= 1; });

  // Removing a week from the timeline pulls the current session date back 7 days.
  // Do this BEFORE rebuilding labels so the live week's label uses the corrected date.
  if (e.date) {
    const d = new Date(e.date + "T12:00:00");
    d.setDate(d.getDate() - 7);
    e.date = d.toISOString().slice(0, 10);
  }

  // Rebuild each surviving ledger row's key + label from its corrected week
  const dateForWeek = wn => {
    const wk = (e.weekHistory || []).find(w => w.weekNum === wn);
    return wk ? (wk.date || "") : (e.date || "");
  };
  (e.ledger || []).forEach(l => {
    l.weekLabel = weekLabelFor(e, l.weekNum, dateForWeek(l.weekNum));
    l.key = ledgerKey(l.weekNum, l.bowlerId, l.label);
  });
  dedupeKeys(e.ledger || []);

  saveEvent(eventId);
}

function renderLeagueHistory(eventId) {
  const e = getEvent(eventId);
  if (!e || e.eventType !== "league") { go("event/" + eventId); return; }
  setHeader("League History", "event/" + eventId, eventId, "history");

  // History is driven by the persistent ledger (the single source of truth)
  // so deferred bracket winnings are included alongside sidepots — consistent
  // with the bowler History tab and the Payouts tab.
  const ledger = e.ledger || [];

  // Six display categories. Ledger entries carry both source and label, so the
  // same category mapping the Payouts tab uses works directly on them.
  const catDefs = [];
  if (e.offersHandicap)        catDefs.push({ key: "hcpBrkt",  label: "Hcp Brkt" });
  if (e.offersScratch)         catDefs.push({ key: "scBrkt",   label: "Sc Brkt" });
  if (e.handicapSidepotFee)    catDefs.push({ key: "hcpSP",    label: "Hcp Sidepot" });
  if (e.scratchSidepotFee)     catDefs.push({ key: "scSP",     label: "Sc Sidepot" });
  if (e.handicapHighSeriesFee) catDefs.push({ key: "hcpSer",   label: "Hcp Series" });
  if (e.scratchHighSeriesFee)  catDefs.push({ key: "scSer",    label: "Sc Series" });

  function payoutCat(l) {
    const t = l.label.toLowerCase();
    const isHcp = t.includes("handicap") || t.includes("hdcp");
    if (l.source === "bracket")    return isHcp ? "hcpBrkt" : "scBrkt";
    if (l.source === "sidepot")    return isHcp ? "hcpSP" : "scSP";
    if (l.source === "highseries") return isHcp ? "hcpSer" : "scSer";
    return null;
  }

  const statusPillFor = g => g.allPaid
    ? `<span class="pill paid">paid</span>`
    : g.anyPaid ? `<span class="pill tie">partial</span>`
                : `<span class="pill unpaid">unpaid</span>`;

  // Refunds are not tracked in the ledger — pull them per week from archived
  // week history, and from the live event for the current finalized week.
  const refundsByWeek = {};
  (e.weekHistory || []).forEach(w => {
    if (w.refunds && w.refunds.length) refundsByWeek[w.weekNum] = w.refunds;
  });
  if (e.status === "finalized" && e.refunds && e.refunds.length) {
    refundsByWeek[currentWeekNum(e)] = e.refunds;
  }

  // Assemble every week: any week with ledger entries, plus any archived week
  // (covers the rare week that had a refund but no winnings).
  const weeks = {};
  ledger.forEach(l => {
    if (!weeks[l.weekNum]) weeks[l.weekNum] =
      { weekNum: l.weekNum, weekLabel: l.weekLabel, entries: [] };
    weeks[l.weekNum].entries.push(l);
  });
  (e.weekHistory || []).forEach(w => {
    if (!weeks[w.weekNum]) weeks[w.weekNum] =
      { weekNum: w.weekNum, weekLabel: weekLabelFor(e, w.weekNum, w.date), entries: [] };
  });
  const weekList = Object.values(weeks).sort((a, b) => b.weekNum - a.weekNum);

  // Only finalized (archived) weeks can be deleted — the current live week is
  // managed via Reopen/Start Next Week, not the history tab.
  const archivedWeeks = new Set((e.weekHistory || []).map(w => w.weekNum));

  if (weekList.length === 0) {
    main.innerHTML = `<div class="card"><div class="empty">
      <h3>No History Yet</h3>
      <p class="muted">Bracket and sidepot winnings are recorded here once a week is finalized.</p>
    </div></div>`;
    return;
  }

  const grandTotals = {};
  catDefs.forEach(c => { grandTotals[c.key] = 0; });
  let grandWinnings = 0, grandPaid = 0, grandRefunds = 0;

  // First pass: accumulate grand totals and build week cards into indexed list
  const weekHtmlList = [];

  weekList.forEach(wk => {
    const weekRefunds = refundsByWeek[wk.weekNum] || [];
    const weekRefundTotal = weekRefunds.reduce((s, r) => s + r.amount, 0);
    const weekTotal = wk.entries.reduce((s, l) => s + l.amount, 0);
    const weekPaid  = wk.entries.filter(l => l.paid).reduce((s, l) => s + l.amount, 0);
    grandWinnings += weekTotal;
    grandPaid     += weekPaid;
    grandRefunds  += weekRefundTotal;

    // Per-bowler breakdown for this week
    const byBowler = {};
    wk.entries.forEach(l => {
      if (!byBowler[l.bowlerId]) byBowler[l.bowlerId] =
        { name: l.bowlerName, cats: {}, total: 0, allPaid: true, anyPaid: false };
      const g = byBowler[l.bowlerId];
      const cat = payoutCat(l);
      if (cat) {
        g.cats[cat] = (g.cats[cat] || 0) + l.amount;
        grandTotals[cat] = (grandTotals[cat] || 0) + l.amount;
      }
      g.total += l.amount;
      if (l.paid) g.anyPaid = true; else g.allPaid = false;
    });
    const refundByBowler = {};
    weekRefunds.forEach(r => { refundByBowler[r.bowlerId] = (refundByBowler[r.bowlerId] || 0) + r.amount; });
    const hasRefunds = Object.keys(refundByBowler).length > 0;

    // Every bowler who won or was refunded this week
    const ids = [...new Set([
      ...Object.keys(byBowler),
      ...weekRefunds.map(r => r.bowlerId)
    ])];

    const isArchived = archivedWeeks.has(wk.weekNum);
    let wkHtml = `<div class="card">
      <div class="row between mb-1">
        <h3 class="mt-0" style="color:var(--navy)">${escapeHtml(wk.weekLabel)}</h3>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:13px;font-weight:700;color:var(--green)">${fmtMoney(weekTotal + weekRefundTotal)}</span>
          ${isArchived ? `<button class="btn small danger delete-week-btn" data-week="${wk.weekNum}" data-label="${escapeHtml(wk.weekLabel)}" style="padding:4px 8px;min-height:28px;font-size:12px">🗑 Delete Week</button>` : ""}
        </div>
      </div>`;

    if (ids.length === 0) {
      wkHtml += `<p class="muted tiny">No payouts recorded for this week.</p>`;
    } else {
      wkHtml += `<div class="scrollable-x"><table>
        <thead><tr>
          <th>Bowler</th>
          ${catDefs.map(c => `<th class="num">${c.label}</th>`).join("")}
          ${hasRefunds ? `<th class="num">Refund</th>` : ""}
          <th class="num">Total</th>
          <th class="center">Status</th>
        </tr></thead><tbody>`;
      ids.forEach(bid => {
        const g = byBowler[bid];
        const bowler = e.bowlers[bid];
        const name = g ? g.name : (bowler ? bowler.name : "?");
        const won = g ? g.total : 0;
        const refunded = refundByBowler[bid] || 0;
        wkHtml += `<tr>
          <td><strong>${escapeHtml(name)}</strong></td>
          ${catDefs.map(c => {
            const amt = g ? (g.cats[c.key] || 0) : 0;
            return `<td class="num">${amt ? fmtMoney(amt) : "—"}</td>`;
          }).join("")}
          ${hasRefunds ? `<td class="num">${refunded ? fmtMoney(refunded) : "—"}</td>` : ""}
          <td class="num green bold">${fmtMoney(won + refunded)}</td>
          <td class="center">${g ? statusPillFor(g) : "—"}</td>
        </tr>`;
      });
      wkHtml += `</tbody></table></div>`;
    }
    wkHtml += `</div>`;
    weekHtmlList.push(wkHtml);
  });

  // Assembly: latest week first, then older weeks
  let html = (weekHtmlList[0] || "") + weekHtmlList.slice(1).join("");

  main.innerHTML = html;

  // Delete Week — remove an incorrect finalized week and renumber the rest
  document.querySelectorAll(".delete-week-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const wn = Number(btn.dataset.week);
      const label = btn.dataset.label || ("Week " + wn);
      const msg = `Delete "${label}" from history?\n\nThis permanently removes that week's recorded payouts and renumbers the remaining weeks so your week count is correct. The current session date shifts back 7 days to stay aligned.\n\nThis cannot be undone.`;
      if (confirm(msg)) {
        deleteWeekFromHistory(eventId, wn);
        render();
      }
    });
  });
}



function renderSidepots(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  setHeader("Sidepots", "event/" + eventId, eventId, "sidepots");
  computeBracketResults(e);

  const hasSidepots = e.scratchSidepotFee || e.handicapSidepotFee || e.scratchHighSeriesFee || e.handicapHighSeriesFee;
  if (!hasSidepots) {
    main.innerHTML = `<div class="empty"><h3>No Sidepots Configured</h3><p class="muted">No sidepots are set up for this event. Go to Edit Settings to add them.</p></div>`;
    return;
  }

  // Live results summary (reuses existing helper)
  let html = `<div class="card"><h2 class="mt-0">Sidepot Results — Live</h2>${buildLiveSidepots(e)}</div>`;

  // Reset sort default to last submitted game when admin first views this event's sidepots.
  if (sidepotSort.eid !== e.id) {
    const lg = lastSubmittedGame(e);
    sidepotSort = { eid: e.id, sptype: "handicap", game: lg || 1 };
  }

  // Detailed standings table per sidepot type
  const buildStandings = (label, bowlers, type) => {
    if (bowlers.length === 0) return "";
    const games = e.gamesPerSession;
    const sortGame = sidepotSort.sptype === type ? sidepotSort.game : sidepotSort.game;

    const rows = bowlers.map(b => {
      const scores = [];
      for (let g = 1; g <= games; g++) scores.push(getGameScore(e, b.id, g, type));
      const total = scores.reduce((s, v) => s + (v || 0), 0);
      return { b, scores, total };
    }).sort((a, bv) => {
      if (sortGame === 0) return bv.total - a.total;
      const aVal = a.scores[sortGame - 1] ?? -1;
      const bVal = bv.scores[sortGame - 1] ?? -1;
      return bVal - aVal;
    });

    const hdrCols = [...Array(games).keys()].map(i => {
      const g = i + 1;
      const active = sidepotSort.sptype === type && sidepotSort.game === g;
      return `<th class="num" data-sp-eid="${e.id}" data-sp-type="${type}" data-sp-game="${g}"
        style="cursor:pointer;user-select:none;color:${active ? "var(--blue)" : "inherit"};white-space:nowrap">
        G${g}${active ? " ▼" : ""}
      </th>`;
    }).join("");

    const totalActive = sidepotSort.sptype === type && sidepotSort.game === 0;
    const totalHdr = `<th class="num" data-sp-eid="${e.id}" data-sp-type="${type}" data-sp-game="0"
      style="cursor:pointer;user-select:none;font-weight:700;white-space:nowrap;
      color:${totalActive ? "var(--blue)" : "inherit"};border-left:1px solid var(--grey-200)">
      Total${totalActive ? " ▼" : ""}
    </th>`;

    const bodyRows = rows.map((row, i) => {
      const isTotalActive = sidepotSort.sptype === type && sidepotSort.game === 0;
      const hasAnyScore = row.scores.some(v => v != null);
      const cells = row.scores.map((v, gi) => {
        const active = sidepotSort.sptype === type && sidepotSort.game === gi + 1;
        return `<td class="num" style="color:${active ? "var(--blue)" : "inherit"};font-weight:${v != null ? "600" : "400"}">${v != null ? v : "—"}</td>`;
      }).join("");
      return `<tr>
        <td><span class="tiny muted">${i + 1}.</span> ${escapeHtml(row.b.name)}${row.b.lane ? ` <span class="tiny muted">Ln ${escapeHtml(row.b.lane)}</span>` : ""}</td>
        ${cells}
        <td class="num bold" style="color:${isTotalActive ? "var(--blue)" : "inherit"};border-left:1px solid var(--grey-200)">${hasAnyScore ? row.total : "—"}</td>
      </tr>`;
    }).join("");

    return `<div class="card">
      <h3 class="mt-0">${label} Standings</h3>
      <p class="tiny muted">${bowlers.length} entrant${bowlers.length !== 1 ? "s" : ""} · ${type === "handicap" ? "includes handicap adjustment" : "scratch scores only"} · tap a column to sort</p>
      <div class="scrollable-x"><table>
        <thead><tr><th>Bowler</th>${hdrCols}${totalHdr}</tr></thead>
        <tbody>${bodyRows}</tbody>
      </table></div>
    </div>`;
  };

  const buildHSStandings = (label, bowlers, type) => {
    if (bowlers.length === 0) return "";
    const games = e.gamesPerSession;
    const rows = bowlers.map(b => {
      const scores = [];
      for (let g = 1; g <= games; g++) scores.push(getGameScore(e, b.id, g, type));
      const total = scores.reduce((s, v) => s + (v || 0), 0);
      const complete = scores.every(v => v != null);
      return { b, scores, total, complete };
    }).sort((a, bv) => bv.total - a.total);

    const hdrCols = [...Array(games).keys()].map(i => `<th class="num">G${i + 1}</th>`).join("");
    const bodyRows = rows.map((row, i) => {
      const cells = row.scores.map(v => `<td class="num">${v != null ? v : "—"}</td>`).join("");
      return `<tr>
        <td><span class="tiny muted">${i + 1}.</span> ${escapeHtml(row.b.name)}</td>
        ${cells}
        <td class="num bold${row.complete ? "" : " muted"}">${row.total || "—"}</td>
      </tr>`;
    }).join("");

    return `<div class="card">
      <h3 class="mt-0">${label} Standings</h3>
      <p class="tiny muted">${bowlers.length} entrant${bowlers.length !== 1 ? "s" : ""} · locked until all games entered · ${type === "handicap" ? "includes handicap" : "scratch"}</p>
      <div class="scrollable-x"><table>
        <thead><tr><th>Bowler</th>${hdrCols}<th class="num">Series</th></tr></thead>
        <tbody>${bodyRows}</tbody>
      </table></div>
    </div>`;
  };

  if (e.handicapSidepotFee) html += buildStandings("Handicap High-Game Sidepot",
    Object.values(e.bowlers || {}).filter(b => b.paid && b.sidepotHandicap), "handicap");
  if (e.scratchSidepotFee) html += buildStandings("Scratch High-Game Sidepot",
    Object.values(e.bowlers || {}).filter(b => b.paid && b.sidepotScratch), "scratch");
  if (e.handicapHighSeriesFee) html += buildHSStandings("Handicap High Series",
    Object.values(e.bowlers || {}).filter(b => b.paid && b.highSeriesHandicap), "handicap");
  if (e.scratchHighSeriesFee) html += buildHSStandings("Scratch High Series",
    Object.values(e.bowlers || {}).filter(b => b.paid && b.highSeriesScratch), "scratch");

  main.innerHTML = html;
}

function renderResults(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  // Results open up once Game 1 is submitted; before that there is nothing to show.
  const liveScoring = e.status === "scoring" && (e.currentGame || 1) > 1;
  if (e.status !== "finalized" && !liveScoring) { go("event/" + eventId); return; }
  setHeader("Results", "event/" + eventId, eventId, "results");
  computeBracketResults(e);

  const pools = Object.values(e.bracketPools || {}).sort((a, b) =>
    a.competitionType.localeCompare(b.competitionType) || a.poolNumber - b.poolNumber);

  let html = `<div class="card">
    <div class="row between">
      <div>
        <h2 class="mt-0">${e.status === "finalized" ? "Final Results" : "Live Results"}</h2>
        <div class="tiny">${escapeHtml(e.date || "")} · ${pools.length} bracket${pools.length !== 1 ? "s" : ""}</div>
      </div>
      ${statusPill(e.status)}
    </div>
    <div class="btn-row">
      <button class="btn small secondary" id="print-results-btn">&#128424; Print Alive &amp; Brackets</button>
    </div>
  </div>`;

  // Sidepot & high series results — table layout, shown before bracket winners
  const spOut = sidepotPerGameResults(e);
  const hs = highSeriesResults(e);
  const anySpResults = Object.values(spOut).some(sp => sp.totalEntrants > 0);
  const anyHsResults = Object.values(hs).some(r => r.totalEntrants > 0);

  if (anySpResults || anyHsResults) {
    let spRows = "";
    Object.entries(spOut).forEach(([, sp]) => {
      if (sp.totalEntrants === 0) return;
      for (let g = 1; g <= e.gamesPerSession; g++) {
        const r = sp.games[g];
        if (!r || !r.allEntered) {
          spRows += `<tr>
            <td><strong>${escapeHtml(sp.label)}</strong></td>
            <td class="center">G${g}</td>
            <td colspan="3" class="muted">Not finalized</td>
          </tr>`;
        } else {
          const names = r.winners.map(bid => escapeHtml(e.bowlers[bid]?.name || "?")).join(", ");
          spRows += `<tr>
            <td><strong>${escapeHtml(sp.label)}</strong></td>
            <td class="center">G${g}</td>
            <td>${names}${r.winners.length > 1 ? ' <span class="muted">(tie)</span>' : ""}</td>
            <td class="num">${r.topScore}</td>
            <td class="num">${fmtMoney(r.payout)}${r.winners.length > 1 ? " ea" : ""}</td>
          </tr>`;
        }
      }
    });
    Object.values(hs).forEach(r => {
      if (r.totalEntrants === 0) return;
      if (r.locked) {
        spRows += `<tr>
          <td><strong>${escapeHtml(r.label)}</strong></td>
          <td class="center">Series</td>
          <td colspan="3" class="muted">Not finalized</td>
        </tr>`;
      } else {
        const names = r.winners.map(bid => escapeHtml(e.bowlers[bid]?.name || "?")).join(", ");
        spRows += `<tr>
          <td><strong>${escapeHtml(r.label)}</strong></td>
          <td class="center">Series</td>
          <td>${names}${r.winners.length > 1 ? ' <span class="muted">(tie)</span>' : ""}</td>
          <td class="num">${r.top}</td>
          <td class="num">${fmtMoney(r.payout)}${r.winners.length > 1 ? " ea" : ""}</td>
        </tr>`;
      }
    });
    html += `<div class="card">
      <h3 class="mt-0">Sidepot &amp; Series Results</h3>
      <div class="scrollable-x"><table>
        <thead><tr><th>Sidepot</th><th class="center">Game</th><th>Winner(s)</th><th class="num">Score</th><th class="num">Payout</th></tr></thead>
        <tbody>${spRows}</tbody>
      </table></div>
    </div>`;
  }

  // Bracket winners summary table
  html += `<div class="card">
    <h3 class="mt-0">Bracket Winners</h3>
    <div class="scrollable-x"><table>
      <thead><tr><th>Bracket</th><th>1st Place</th><th class="num">Prize</th><th>2nd Place</th><th class="num">Prize</th></tr></thead>
      <tbody>`;
  pools.forEach(p => {
    const firstNames = p.firstPlace.map(bid => e.bowlers[bid]?.name).filter(Boolean).join(", ");
    const secondNames = p.secondPlace.map(bid => e.bowlers[bid]?.name).filter(Boolean).join(", ");
    const firstAmt = p.firstPlace.length === 1 ? e.bracketFirstPlace
      : p.firstPlace.length > 1 ? (e.bracketFirstPlace + e.bracketSecondPlace) / p.firstPlace.length : 0;
    const secondAmt = p.firstPlace.length === 1 && p.secondPlace.length > 0
      ? e.bracketSecondPlace / p.secondPlace.length : 0;
    const typeLabel = p.competitionType[0].toUpperCase() + p.competitionType.slice(1);
    html += `<tr>
      <td><strong>${typeLabel} #${p.poolNumber}</strong></td>
      <td>${escapeHtml(firstNames) || '<span class="muted">—</span>'}</td>
      <td class="num">${firstNames ? fmtMoney(firstAmt) + (p.firstPlace.length > 1 ? " ea" : "") : "—"}</td>
      <td>${escapeHtml(secondNames) || '<span class="muted">—</span>'}</td>
      <td class="num">${secondNames ? fmtMoney(secondAmt) + (p.secondPlace.length > 1 ? " ea" : "") : "—"}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  main.innerHTML = html;
  document.getElementById("print-results-btn")?.addEventListener("click", () => printAliveSnapshot(eventId));
}

// ---------- Usage dashboard (admin) ----------
// Reads bbsp/metrics/bowlerViews (written by logBowlerView) and charts
// visits over a scrollable window. View modes: day / week / month / year.
let usageMode = "week";   // current view mode
let usageAnchor = null;   // Date — last day of the visible window
let usageData = null;     // cached bowlerViews snapshot for this visit

function usageSeries() {
  // Build [{label, count}] for the current mode/anchor.
  const data = usageData || {};
  const out = [];
  const a = new Date(usageAnchor.getFullYear(), usageAnchor.getMonth(), usageAnchor.getDate());
  if (usageMode === "year") {
    // 12 monthly totals ending at the anchor's month
    for (let i = 11; i >= 0; i--) {
      const m = new Date(a.getFullYear(), a.getMonth() - i, 1);
      const prefix = m.getFullYear() + "-" + String(m.getMonth() + 1).padStart(2, "0");
      let sum = 0;
      Object.keys(data).forEach(k => { if (k.startsWith(prefix)) sum += Number(data[k]) || 0; });
      out.push({ label: m.toLocaleDateString(undefined, { month: "short", year: "2-digit" }), count: sum });
    }
  } else {
    const days = usageMode === "day" ? 1 : usageMode === "week" ? 7 : 30;
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(a.getFullYear(), a.getMonth(), a.getDate() - i);
      out.push({ label: (d.getMonth() + 1) + "/" + d.getDate(), count: Number(data[localDayKey(d)]) || 0 });
    }
  }
  return out;
}

function usageChartSVG(series) {
  const W = 640, H = 260, padL = 46, padR = 16, padT = 16, padB = 38;
  const iw = W - padL - padR, ih = H - padT - padB;
  const max = Math.max(1, ...series.map(p => p.count));
  const x = i => series.length === 1 ? padL + iw / 2 : padL + (i * iw) / (series.length - 1);
  const y = v => padT + ih - (v / max) * ih;
  let grid = "", labels = "";
  const yTicks = Math.min(4, max);
  for (let t = 0; t <= yTicks; t++) {
    const v = (max * t) / yTicks;
    const yy = y(v);
    grid += `<line x1="${padL}" y1="${yy}" x2="${W - padR}" y2="${yy}" stroke="var(--grey-300)" stroke-width="1"/>`;
    labels += `<text x="${padL - 8}" y="${yy + 4}" text-anchor="end" font-size="11" fill="var(--grey-700)">${Math.round(v)}</text>`;
  }
  const step = Math.ceil(series.length / 10); // thin x labels so they don't overlap
  series.forEach((p, i) => {
    if (i % step !== 0 && i !== series.length - 1) return;
    labels += `<text x="${x(i)}" y="${H - padB + 18}" text-anchor="middle" font-size="11" fill="var(--grey-700)">${p.label}</text>`;
  });
  const pts = series.map((p, i) => `${x(i)},${y(p.count)}`).join(" ");
  const dots = series.map((p, i) =>
    `<circle cx="${x(i)}" cy="${y(p.count)}" r="3.5" fill="var(--blue)"><title>${p.label}: ${p.count}</title></circle>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:${W}px;display:block" role="img" aria-label="Bowler view visits">
    ${grid}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${H - padB}" stroke="var(--grey-500)"/>
    <line x1="${padL}" y1="${H - padB}" x2="${W - padR}" y2="${H - padB}" stroke="var(--grey-500)"/>
    ${series.length > 1 ? `<polyline points="${pts}" fill="none" stroke="var(--blue)" stroke-width="2"/>` : ""}
    ${dots}
    ${labels}
    <text x="13" y="${padT + ih / 2}" font-size="11" fill="var(--grey-700)" text-anchor="middle" transform="rotate(-90 13 ${padT + ih / 2})">Visits</text>
  </svg>`;
}

function renderUsage(eventId) {
  const e = getEvent(eventId);
  if (!e) { go("home"); return; }
  setHeader("Usage", "event/" + eventId, eventId, "usage");
  if (!usageAnchor) usageAnchor = new Date();
  main.innerHTML = `<div class="empty"><p class="muted">Loading usage data…</p></div>`;
  get(ref(db, "bbsp/metrics/bowlerViews")).then(snap => {
    usageData = snap.val() || {};
    drawUsage(eventId);
  }).catch(err => {
    main.innerHTML = `<div class="empty"><h3>Couldn't load usage data</h3><p class="muted">${escapeHtml(String(err))}</p></div>`;
  });
}

function drawUsage(eventId) {
  const total = Number((usageData || {}).total) || 0;
  const series = usageSeries();
  const windowTotal = series.reduce((s, p) => s + p.count, 0);
  const rangeLabel = series.length === 1 ? series[0].label
    : series[0].label + " – " + series[series.length - 1].label;
  const modes = ["day", "week", "month", "year"];
  const stepLabel = usageMode === "month" ? "one month" : usageMode === "year" ? "one year" : "one day";
  main.innerHTML = `
    <div class="card" style="margin-bottom:8px;padding:12px 16px">
      <div class="row between" style="flex-wrap:wrap;gap:16px">
        <div>
          <div class="muted" style="font-size:12px">Total Bowler View Visits (all time)</div>
          <div style="font-size:28px;font-weight:700;color:var(--navy)">${total}</div>
        </div>
        <div>
          <div class="muted" style="font-size:12px">Visits shown (${rangeLabel})</div>
          <div style="font-size:28px;font-weight:700;color:var(--navy)">${windowTotal}</div>
        </div>
      </div>
    </div>
    <div class="card" style="padding:12px 16px">
      <div class="row between" style="flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div style="display:flex;gap:6px">
          ${modes.map(m =>
            `<button class="btn small${usageMode === m ? "" : " secondary"}" data-usage-mode="${m}">${m[0].toUpperCase() + m.slice(1)}</button>`
          ).join("")}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn small secondary" id="usage-back" title="Back ${stepLabel}">◀</button>
          <span class="muted" style="font-size:13px;min-width:90px;text-align:center">${rangeLabel}</span>
          <button class="btn small secondary" id="usage-fwd" title="Forward ${stepLabel}">▶</button>
        </div>
      </div>
      ${usageChartSVG(series)}
      <p class="muted" style="font-size:12px;margin-top:8px">
        One visit = one browser session opening Bowler View. ◀ ▶ move ${stepLabel} at a time.
      </p>
    </div>`;
  main.querySelectorAll("[data-usage-mode]").forEach(b =>
    b.addEventListener("click", () => { usageMode = b.dataset.usageMode; drawUsage(eventId); }));
  const shift = dir => {
    const a = usageAnchor;
    let next;
    if (usageMode === "month")      next = new Date(a.getFullYear(), a.getMonth() + dir, a.getDate());
    else if (usageMode === "year")  next = new Date(a.getFullYear() + dir, a.getMonth(), a.getDate());
    else                            next = new Date(a.getFullYear(), a.getMonth(), a.getDate() + dir);
    const today = new Date();
    if (next > today) next = today; // can't scroll into the future
    usageAnchor = next;
    drawUsage(eventId);
  };
  document.getElementById("usage-back").addEventListener("click", () => shift(-1));
  document.getElementById("usage-fwd").addEventListener("click", () => shift(1));
}

function render() {
  const r = getRoute();

  // Bowler mode — restricted routing
  if (state.viewMode === "bowler") {
    if (r.name === "home") return renderBowlerHome();
    if (r.name === "event") return renderBowlerEvent(r.eventId);
    // All other routes redirect to bowler home
    return renderBowlerHome();
  }

  // Admin mode — full routing
  if (r.name === "home") return renderHome();
  if (r.name === "new") return renderNewEvent();
  if (r.name === "event") return renderEvent(r.eventId);
  if (r.name === "register") return renderBowlerEdit(r.eventId, null);
  if (r.name === "edit-bowler") return renderBowlerEdit(r.eventId, r.extra);
  if (r.name === "brackets") return renderBrackets(r.eventId);
  if (r.name === "scoring") return renderScoring(r.eventId);
  if (r.name === "alive") return renderAliveList(r.eventId);
  if (r.name === "sidepots") return renderSidepots(r.eventId);
  if (r.name === "results") return renderResults(r.eventId);
  if (r.name === "payouts") return renderPayouts(r.eventId);
  if (r.name === "import") return renderImport(r.eventId);
  if (r.name === "settings") return renderEditSettings(r.eventId);
  if (r.name === "history") return renderLeagueHistory(r.eventId);
  if (r.name === "usage") return renderUsage(r.eventId);
  go("home");
}

window.addEventListener("hashchange", render);

// ---------- Sidepot sort — delegated listener ----------
// Uses data-sp-eid / data-sp-type / data-sp-game on each header <th>.
// One listener on document handles all clicks and survives innerHTML re-renders.
// (Script is type="module" so functions are not on window — inline onclick won't reach them.)
document.addEventListener("click", evt => {
  const btn = evt.target.closest("[data-sp-type]");
  if (!btn) return;
  const sptype = btn.dataset.spType;
  const game   = Number(btn.dataset.spGame);
  const eid    = btn.dataset.spEid;
  if (!sptype || !eid) return;
  sidepotSort = { eid, sptype, game };
  const bowlerContent = document.getElementById("bowler-tab-content");
  if (bowlerContent) {
    const ev = getEvent(eid);
    if (ev) bowlerContent.innerHTML = renderBowlerTabContent(ev, bowlerActiveTab);
  } else {
    renderSidepots(eid);
  }
});

// Firebase stores empty objects {} and arrays [] as null.
// This function restores every field that could be nulled so the rest of the app
// never has to defensive-check individual accesses.
function repairFirebaseState() {
  if (!state.events) state.events = {};
  if (state.adminPassword === undefined) state.adminPassword = "";
  if (state.adminPasswordHashed === undefined) state.adminPasswordHashed = false;
  Object.values(state.events).forEach(e => {
    if (!e.bowlers)       e.bowlers       = {};
    if (!e.scores)        e.scores        = {};
    if (!e.bracketPools)  e.bracketPools  = {};
    if (!e.refunds)       e.refunds       = [];
    if (!e.payouts)                e.payouts                = [];
    if (!e.weekHistory)            e.weekHistory            = [];
    if (!e.ledger)                 e.ledger                 = [];
    if (!e.confirmedPaymentWeeks)  e.confirmedPaymentWeeks  = {};
    Object.values(e.bracketPools).forEach(pool => {
      if (!pool.seats)        pool.seats        = [];
      if (!pool.firstPlace)   pool.firstPlace   = [];
      if (!pool.secondPlace)  pool.secondPlace  = [];
      if (!pool.matchups)     pool.matchups     = {};
      [1, 2, 3].forEach(rnd => {
        if (!pool.matchups[rnd]) pool.matchups[rnd] = [];
        pool.matchups[rnd].forEach(m => {
          if (!m.bowlers)   m.bowlers   = [];
          if (!m.advancers) m.advancers = [];
          if (!m.scored)    m.scored    = [];
        });
      });
    });
    Object.values(e.bowlers).forEach(b => {
      if (!b.scratchBracketIds)  b.scratchBracketIds  = [];
      if (!b.handicapBracketIds) b.handicapBracketIds = [];
    });
    e.weekHistory.forEach(week => {
      if (!week.refunds)       week.refunds       = [];
      if (!week.payouts)       week.payouts       = [];
      if (!week.scores)        week.scores        = {};
      if (!week.bowlers)       week.bowlers       = {};
      if (!week.bracketPools)  week.bracketPools  = {};
    });
    // Normalize old long-form bracket/sidepot labels to abbreviations
    const abbrev = s => typeof s === "string"
      ? s.replace(/\bHandicap Bracket #/g, "HDCP BRKT #").replace(/\bScratch Bracket #/g, "SCR BRKT #")
         .replace(/\b(HDCP|SCR) Bkt #/g, "$1 BRKT #")
         .replace(/\bHandicap high game\b/gi, "HDCP HG").replace(/\bScratch high game\b/gi, "SCR HG")
         .replace(/\bHandicap high series\b/gi, "HDCP HS").replace(/\bScratch high series\b/gi, "SCR HS")
      : s;
    e.ledger.forEach(l => { l.label = abbrev(l.label); l.key = abbrev(l.key); });
    e.payouts.forEach(p => { p.label = abbrev(p.label); });
    (e.deferredPayouts || []).forEach(p => { p.label = abbrev(p.label); });
    e.weekHistory.forEach(week => {
      (week.payouts || []).forEach(p => { p.label = abbrev(p.label); });
      (week.deferredPayouts || []).forEach(p => { p.label = abbrev(p.label); });
    });
  });
}

// Real-time sync from Firebase — fires immediately on load, then on every save
onValue(stateRef, (snapshot) => {
  const fresh = snapshot.val();
  const myViewMode = sessionStorage.getItem(VM_KEY) || "bowler";
  if (fresh) {
    Object.assign(state, fresh);
    repairFirebaseState();
  }
  state.viewMode = myViewMode;
  const onScoringPage = myViewMode === "admin" && getRoute().name === "scoring";
  if (!onScoringPage) render();
});

btnBowler.addEventListener("click", () => {
  if (state.viewMode === "bowler") return;
  state.viewMode = "bowler";
  logBowlerView();
  sessionStorage.setItem(VM_KEY, "bowler");
  location.hash = "";
  render();
});

btnAdmin.addEventListener("click", () => {
  if (state.viewMode === "admin") return;
  if (state.adminPassword) {
    showAdminPasswordPrompt(() => {
      state.viewMode = "admin";
      sessionStorage.setItem(VM_KEY, "admin");
      render();
    });
  } else {
    state.viewMode = "admin";
    sessionStorage.setItem(VM_KEY, "admin");
    render();
  }
});

// Initial render handled by onValue above
</script>
