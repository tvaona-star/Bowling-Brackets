<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bowling Brackets & Sidepots</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --navy: #1F3864;
    --blue: #2E74B5;
    --light-blue: #D5E8F0;
    --green: #2E7D32;
    --red: #C62828;
    --amber: #F57F17;
    --grey-900: #1A1A1A;
    --grey-700: #595959;
    --grey-500: #999;
    --grey-300: #DDD;
    --grey-100: #F5F5F5;
    --grey-50: #FAFAFA;
    --white: #FFF;
    --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--grey-900);
    background: var(--grey-100);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  #app { min-height: 100vh; display: flex; flex-direction: column; }
  /* Sticky wrapper keeps header + banner + subnav glued together so they
     never overlap regardless of header height (fixes subnav clipping). */
  .topbar { position: sticky; top: 0; z-index: 10; flex-shrink: 0; }
  header {
    background: var(--navy);
    color: var(--white);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  header .back {
    background: none; border: none; color: var(--white);
    font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 4px;
  }
  header .back:active { background: rgba(255,255,255,0.15); }
  /* Segmented Admin/Bowler toggle */
  .view-toggle {
    display: flex; background: rgba(255,255,255,0.15); border-radius: 20px;
    padding: 3px; gap: 0; flex-shrink: 0;
  }
  .view-btn {
    background: none; color: rgba(255,255,255,0.7);
    border: none; padding: 5px 13px; border-radius: 17px;
    font-size: 12px; cursor: pointer; font-weight: 600;
    transition: background 0.15s, color 0.15s; white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .view-btn.active {
    background: var(--white); color: var(--navy);
  }
  /* Event sub-navigation bar */
  .event-subnav {
    background: var(--navy); border-top: 1px solid rgba(255,255,255,0.12);
    display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
    flex-shrink: 0;
  }
  .event-subnav a {
    color: rgba(255,255,255,0.6); text-decoration: none;
    padding: 9px 14px; font-size: 12px; font-weight: 600;
    white-space: nowrap; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .event-subnav a:hover { color: rgba(255,255,255,0.9); }
  .event-subnav a.active {
    color: var(--white); border-bottom-color: var(--white);
  }
  .event-subnav a.disabled {
    opacity: 0.3; pointer-events: none;
  }
  main { flex: 1; padding: 16px; max-width: 760px; margin: 0 auto; width: 100%; }
  h2 { font-size: 20px; margin-bottom: 12px; color: var(--navy); }
  h3 { font-size: 16px; margin: 16px 0 8px; color: var(--grey-700); }
  p { margin-bottom: 12px; }
  .muted { color: var(--grey-700); font-size: 13px; }
  .tiny { font-size: 12px; color: var(--grey-500); }
  .card {
    background: var(--white); border-radius: 8px; padding: 16px;
    margin-bottom: 12px; box-shadow: var(--shadow);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .row.between { justify-content: space-between; }
  .row.wrap { flex-wrap: wrap; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .gap-sm { gap: 6px; }
  .gap-lg { gap: 20px; }
  label {
    display: block; font-size: 13px; color: var(--grey-700);
    margin-bottom: 4px; font-weight: 500;
  }
  input[type="text"], input[type="number"], input[type="email"], input[type="tel"], input[type="date"], input[type="file"], select, textarea {
    width: 100%; padding: 11px 12px; border: 1px solid var(--grey-300);
    border-radius: 6px; font-size: 16px; font-family: inherit;
    background: var(--white); color: var(--grey-900);
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(46,116,181,0.15);
  }
  input.small { padding: 7px 10px; font-size: 14px; }
  .field-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;
  }
  .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field { margin-bottom: 12px; }
  .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
  .checkbox-row input { width: auto; }
  button.btn, a.btn, label.btn {
    background: var(--blue); color: var(--white); border: none;
    padding: 12px 18px; border-radius: 6px; font-size: 15px; font-weight: 600;
    cursor: pointer; text-align: center; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    min-height: 44px; transition: background 0.1s;
  }
  button.btn:active, a.btn:active { background: #1A5A8F; }
  button.btn.primary, a.btn.primary { background: var(--navy); }
  button.btn.secondary, a.btn.secondary {
    background: var(--white); color: var(--navy); border: 1px solid var(--navy);
  }
  button.btn.danger, a.btn.danger { background: var(--red); }
  button.btn.small, a.btn.small { padding: 7px 12px; font-size: 13px; min-height: 32px; }
  button.btn.full, a.btn.full { width: 100%; }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pill.draft { background: #EEE; color: var(--grey-700); }
  .pill.open { background: #E3F2FD; color: var(--blue); }
  .pill.ready { background: #FFF3E0; color: var(--amber); }
  .pill.scoring { background: #FFF3E0; color: var(--amber); }
  .pill.finalized { background: #E8F5E9; color: var(--green); }
  .pill.paid { background: #E8F5E9; color: var(--green); }
  .pill.unpaid { background: #FFEBEE; color: var(--red); }
  .pill.alive { background: #E8F5E9; color: var(--green); }
  .pill.eliminated { background: #FFEBEE; color: var(--red); }
  .pill.tie { background: #FFF3E0; color: var(--amber); }
  .pill.winner { background: #FFF9C4; color: #8B6B00; }
  .pill.deferred { background: #EDE7F6; color: #4527A0; }
  .pill.pending  { background: #FFF3E0; color: #BF360C; }
  .pill.week     { background: #E3F2FD; color: #0D47A1; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--grey-300); vertical-align: top; }
  th { background: var(--grey-50); font-weight: 600; color: var(--grey-700); font-size: 12px; text-transform: uppercase; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.center, th.center { text-align: center; }
  .alert {
    padding: 12px; border-radius: 6px; margin-bottom: 12px; font-size: 14px;
  }
  .alert.info { background: #E3F2FD; color: #0D47A1; }
  .alert.warning { background: #FFF8E1; color: #E65100; }
  .alert.success { background: #E8F5E9; color: #1B5E20; }
  .alert.error { background: #FFEBEE; color: #B71C1C; }
  .summary-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px;
  }
  .summary-card {
    background: var(--white); border: 1px solid var(--grey-300);
    border-radius: 6px; padding: 10px; text-align: center;
  }
  .summary-card .label { font-size: 11px; color: var(--grey-700); text-transform: uppercase; letter-spacing: 0.5px; }
  .summary-card .value { font-size: 22px; font-weight: 700; color: var(--navy); margin-top: 4px; line-height: 1.1; }
  .summary-card .sub { font-size: 11px; color: var(--grey-500); margin-top: 2px; }
  @media (min-width: 600px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .bracket { display: flex; gap: 20px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 8px 0; align-items: stretch; }
  .bracket-round { display: flex; flex-direction: column; min-width: 160px; }
  .bracket-round-label {
    font-size: 11px; color: var(--grey-500); text-transform: uppercase;
    font-weight: 600; letter-spacing: 0.5px; margin-bottom: 8px; flex-shrink: 0; padding: 0 2px;
  }
  .bracket-matches {
    display: flex; flex-direction: column; flex: 1;
    justify-content: space-around; gap: 8px;
  }
  .bracket-matches.r3 { justify-content: center; }
  .bracket-match {
    background: var(--grey-50); border: 1px solid var(--grey-300);
    border-radius: 6px; padding: 6px 10px; font-size: 13px;
  }
  .bracket-match .seat {
    display: flex; justify-content: space-between; padding: 3px 0;
  }
  .bracket-match .seat.winner { font-weight: 700; color: var(--green); }
  .bracket-match .seat.loser { color: var(--grey-500); text-decoration: line-through; }
  .bracket-match .seat .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
  .bracket-match.tie-active { background: #FFF3E0; border-color: var(--amber); }
  .score-grid {
    display: grid; grid-template-columns: 1fr 70px 70px 70px;
    gap: 4px; align-items: center; font-size: 14px;
    padding: 6px 0; border-bottom: 1px solid var(--grey-100);
  }
  .score-grid > input { padding: 7px 6px; text-align: center; font-size: 15px; }
  .score-grid > .name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
  .score-grid .hcp { font-size: 11px; color: var(--grey-500); font-weight: 400; }
  .grid-header { color: var(--grey-700); font-size: 11px; text-transform: uppercase; font-weight: 600; }
  .nav-tabs {
    display: flex; gap: 4px; margin-bottom: 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; padding-bottom: 4px;
  }
  .nav-tabs button {
    background: var(--white); border: 1px solid var(--grey-300); color: var(--grey-700);
    padding: 8px 14px; border-radius: 18px; font-size: 13px; cursor: pointer;
    white-space: nowrap; font-weight: 500;
  }
  .nav-tabs button.active {
    background: var(--navy); color: var(--white); border-color: var(--navy);
  }
  .alive-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 10px 6px;
    border-bottom: 1px solid var(--grey-100);
  }
  .alive-row strong { font-size: 15px; }
  .alive-row .meta { font-size: 12px; color: var(--grey-700); }
  .alive-row .lane-badge {
    background: var(--navy); color: var(--white);
    border-radius: 6px; padding: 4px 8px; font-weight: 700;
    font-size: 12px; min-width: 36px; text-align: center;
  }
  .alive-row .opp { font-size: 12px; color: var(--blue); margin-top: 2px; }
  .scrollable-x { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .empty { text-align: center; padding: 40px 20px; color: var(--grey-500); }
  .empty h3 { color: var(--grey-700); margin-bottom: 8px; }
  .text-right { text-align: right; }
  .bold { font-weight: 700; }
  .green { color: var(--green); }
  .red { color: var(--red); }
  .navy { color: var(--navy); }
  .amber { color: var(--amber); }
  .mt-0 { margin-top: 0; }
  .mt-1 { margin-top: 8px; }
  .mt-2 { margin-top: 16px; }
  .mb-1 { margin-bottom: 8px; }
  .mb-2 { margin-bottom: 16px; }
  @media print {
    header, .no-print { display: none; }
    main { max-width: none; padding: 0; }
    .card { box-shadow: none; border: 1px solid var(--grey-300); }
  }
  /* Bowler entry gate */
  .entry-gate {
    max-width: 420px; margin: 60px auto 0; text-align: center;
  }
  .entry-gate .gate-logo {
    font-size: 48px; margin-bottom: 16px;
  }
  .entry-gate h2 { color: var(--navy); margin-bottom: 6px; }
  .entry-gate p { color: var(--grey-700); font-size: 14px; margin-bottom: 20px; }
  .entry-gate .gate-form { text-align: left; }
  .entry-gate .gate-error {
    color: var(--red); font-size: 13px; margin-top: 8px; text-align: center;
  }
  /* Bowler tab bar */
  .bowler-tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px;
  }
  .bowler-tabs button {
    background: var(--white); border: 1px solid var(--grey-300); color: var(--grey-700);
    padding: 8px 14px; border-radius: 18px; font-size: 13px; cursor: pointer;
    white-space: nowrap; font-weight: 500; flex-shrink: 0;
  }
  .bowler-tabs button.active {
    background: var(--navy); color: var(--white); border-color: var(--navy);
  }
  /* Read-only badge */
  .readonly-banner {
    background: #E3F2FD; border-left: 3px solid var(--blue);
    padding: 8px 12px; border-radius: 0 6px 6px 0;
    font-size: 12px; color: #0D47A1; margin-bottom: 12px;
  }
  /* Admin password modal overlay */
  .pw-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .pw-modal {
    background: var(--white); border-radius: 10px; padding: 24px;
    width: 90%; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .pw-modal h3 { margin-bottom: 8px; color: var(--navy); }
  .pw-modal p { font-size: 13px; color: var(--grey-700); margin-bottom: 16px; }
  .pw-modal .btn-row { margin-top: 16px; }
  /* Offline banner — sits between header and subnav in normal flow */
  #offline-banner {
    background: var(--amber); color: var(--white);
    text-align: center; padding: 6px 16px; font-size: 13px; font-weight: 600;
    display: none; flex-shrink: 0;
  }
  #offline-banner.show { display: flex; align-items: center; justify-content: center; gap: 8px; }
  #offline-banner .sync-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--white);
    animation: pulse-dot 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }
  #offline-banner.online-pending { background: var(--blue); }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  /* Display mode — full-width bracket view for tablet/TV */
  .display-mode main { max-width: 100% !important; padding: 8px 6px; }
  .display-mode .bracket-round { min-width: 210px; }
  .display-mode .bracket-match { font-size: 16px; padding: 10px 14px; }
  .display-mode .bracket-match .seat .name { max-width: none; }
  .display-mode .bracket-round-label { font-size: 13px; letter-spacing: 0.5px; }
  .display-mode .bracket { gap: 16px; }
  .display-mode .card { padding: 14px; margin-bottom: 10px; }
  .display-mode .card h3 { font-size: 17px; }
  /* In landscape on tablet/larger screens, hide chrome for true TV display */
  @media (min-width: 600px) {
    .display-mode header { display: none !important; }
    .display-mode .event-subnav { top: 0 !important; }
    .display-mode .readonly-banner { display: none; }
  }
  /* Floating exit-display-mode button */
  #display-exit-btn {
    position: fixed; bottom: 18px; right: 18px;
    background: rgba(31,56,100,0.85); color: var(--white);
    border: none; border-radius: 24px; padding: 10px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 50;
    backdrop-filter: blur(4px); display: none;
  }
  .display-mode #display-exit-btn { display: flex; align-items: center; gap: 6px; }
</style>

<body>
<div id="app">
  <div class="topbar">
    <header>
      <button class="back" id="back-btn" style="display:none">&larr;</button>
      <h1 id="title">Bowling Brackets</h1>
      <div class="view-toggle">
        <button class="view-btn" id="btn-admin">Admin</button>
        <button class="view-btn" id="btn-bowler">Bowler</button>
      </div>
    </header>
    <div id="offline-banner">
      <span class="sync-dot"></span>
      <span id="offline-msg">Offline — changes saved locally</span>
    </div>
    <nav id="event-subnav" class="event-subnav" style="display:none"></nav>
  </div>
  <main id="main"></main>
</div>
<button id="display-exit-btn">✕ Exit Display Mode</button>

<script type="module">
"use strict";
/* =========================================================================
 * Bowling Brackets & Sidepots Platform — MVP v2 (single-file build)
 * ========================================================================= */

// ---------- Firebase ----------
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, increment } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvg9bSEVVBHHCOKRqJ1MrNjvJlXsyfXV0",
  authDomain: "bowling-74149.firebaseapp.com",
  databaseURL: "https://bowling-74149-default-rtdb.firebaseio.com",
  projectId: "bowling-74149",
  storageBucket: "bowling-74149.firebasestorage.app",
  messagingSenderId: "969606977843",
  appId: "1:969606977843:web:42a6b95f6692ac4c4d0646"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);
const stateRef = ref(db, "bbsp/state");
const connectedRef = ref(db, ".info/connected");

// ---------- Usage metrics ----------
// Bowler-view visits are logged to bbsp/metrics/bowlerViews (separate from
// bbsp/state so they never ride along with state saves/restores):
//   { "YYYY-MM-DD": <count>, ..., "total": <count> }
// One log per browser tab session — refreshes and tab-hops don't re-count.
function localDayKey(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

function logBowlerView() {
  if (sessionStorage.getItem("bbsp_bvLogged")) return; // once per tab session
  sessionStorage.setItem("bbsp_bvLogged", "1");
  update(ref(db, "bbsp/metrics/bowlerViews"), {
    [localDayKey(new Date())]: increment(1),
    total: increment(1)
  }).catch(err => console.error("Metrics write failed:", err));
}

// ---------- Offline / local cache ----------
const LOCAL_CACHE_KEY  = "bbsp_cache";    // last known good state
const LOCAL_PENDING_KEY = "bbsp_pending"; // changes made while offline
let isOnline = false;
let hasPendingSync = false;

const offlineBanner = document.getElementById("offline-banner");
const offlineMsg    = document.getElementById("offline-msg");

function updateConnectionBanner() {
  if (isOnline && !hasPendingSync) {
    offlineBanner.classList.remove("show", "online-pending");
  } else if (isOnline && hasPendingSync) {
    offlineBanner.className = "show online-pending";
    offlineMsg.textContent = "Reconnected — syncing changes…";
  } else {
    offlineBanner.className = "show";
    offlineMsg.textContent = "Offline — changes saved locally";
  }
}

// Track when we went offline so we can detect conflicting server writes on reconnect
let offlineAt = null;

function pushPendingState(pendingStr) {
  try {
    const pendingState = JSON.parse(pendingStr);
    set(stateRef, pendingState)
      .then(() => {
        localStorage.removeItem(LOCAL_PENDING_KEY);
        hasPendingSync = false;
        updateConnectionBanner();
      })
      .catch(() => { hasPendingSync = false; updateConnectionBanner(); });
  } catch (_) {
    localStorage.removeItem(LOCAL_PENDING_KEY);
    hasPendingSync = false;
    updateConnectionBanner();
  }
}

onValue(connectedRef, snap => {
  const wasOffline = !isOnline;
  isOnline = snap.val() === true;

  if (!isOnline) {
    offlineAt = Date.now(); // record when we lost connection
    updateConnectionBanner();
    return;
  }

  if (isOnline && wasOffline) {
    const pendingStr = localStorage.getItem(LOCAL_PENDING_KEY);
    if (!pendingStr) { updateConnectionBanner(); return; }

    hasPendingSync = true;
    updateConnectionBanner();

    // Before pushing, check if Firebase has newer changes from another device
    get(stateRef).then(snapshot => {
      const serverState = snapshot.val();
      const serverNewer = serverState && serverState.lastModified
        && offlineAt && serverState.lastModified > offlineAt;

      if (serverNewer) {
        const keepLocal = confirm(
          "Another device saved changes while you were offline.\n\n" +
          "OK → Keep YOUR offline changes (overwrites server)\n" +
          "Cancel → Use SERVER version (your offline changes are discarded)"
        );
        if (!keepLocal) {
          // Discard local pending — onValue(stateRef) will load the server version
          localStorage.removeItem(LOCAL_PENDING_KEY);
          hasPendingSync = false;
          updateConnectionBanner();
          return;
        }
      }

      pushPendingState(pendingStr);
    }).catch(() => {
      // Can't read server — push pending anyway (safe default, preserves local work)
      pushPendingState(pendingStr);
    });
  } else {
    updateConnectionBanner();
  }
});

// ---------- Storage ----------
const VM_KEY = "bbsp_viewMode"; // tab-specific — stored in sessionStorage

function saveState() {
  sessionStorage.setItem(VM_KEY, state.viewMode);
  const toSave = Object.assign({}, state);
  delete toSave.viewMode;
  toSave.lastModified = Date.now(); // used for offline conflict detection

  // Always cache locally so the app can survive a full offline restart
  try { localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(toSave)); } catch (_) {}

  if (!isOnline) {
    // Queue for sync when connection returns
    try { localStorage.setItem(LOCAL_PENDING_KEY, JSON.stringify(toSave)); } catch (_) {}
    return;
  }

  set(stateRef, toSave).catch(err => {
    console.error("Firebase save error:", err);
    // If Firebase rejects the write, store as pending
    try { localStorage.setItem(LOCAL_PENDING_KEY, JSON.stringify(toSave)); } catch (_) {}
  });
}

// Granular event-level save — writes only one event to Firebase instead of the full state.
// Use for high-frequency, event-scoped operations (score entry, bowler edits, paid toggles).
// Falls back to saveState() for global changes (new event, delete, admin password).
function saveEvent(eventId) {
  sessionStorage.setItem(VM_KEY, state.viewMode);
  const toSave = Object.assign({}, state);
  delete toSave.viewMode;
  toSave.lastModified = Date.now();

  // Always update the full local cache for offline fallback
  try { localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(toSave)); } catch (_) {}

  if (!isOnline) {
    try { localStorage.setItem(LOCAL_PENDING_KEY, JSON.stringify(toSave)); } catch (_) {}
    return;
  }

  const e = getEvent(eventId);
  if (!e) { saveState(); return; } // safety fallback

  // Multi-path update: write the event node + bump top-level lastModified in one round-trip
  const updates = {};
  updates[`events/${eventId}`] = e;
  updates["lastModified"] = toSave.lastModified;
  update(stateRef, updates).catch(err => {
    console.error("Firebase event save error:", err);
    try { localStorage.setItem(LOCAL_PENDING_KEY, JSON.stringify(toSave)); } catch (_) {}
  });
}

// Debounced save — used by score inputs so Firebase is written ~700ms after
// the admin stops typing rather than on every keystroke.
let _scoreSaveTimer = null;
function saveStateDebounced() {

  _scoreSaveTimer = setTimeout(() => saveState(), 700);

const _saveEventTimers = {};

function uid(prefix = "id") { return prefix + "_" + Math.random().toString(36).slice(2, 10); }
function fmtMoney(v) { return "$" + (Math.round(Number(v || 0) * 100) / 100).toFixed(2); }
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ---------- Password hashing (Web Crypto SHA-256) ----------
// Passwords are hashed before storage. state.adminPasswordHashed = true flags the new format.
// Legacy plaintext passwords (adminPasswordHashed === false/undefined) still work until reset.
async function hashPassword(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

// ---------- Amount owed ----------
function calculateAmountOwed(event, b) {
  let total = 0;
  total += (b.scratchBrackets || 0) * event.bracketEntryFee;
  total += (b.handicapBrackets || 0) * event.bracketEntryFee;
  if (b.sidepotScratch && event.scratchSidepotFee) total += event.scratchSidepotFee * event.gamesPerSession;
  if (b.sidepotHandicap && event.handicapSidepotFee) total += event.handicapSidepotFee * event.gamesPerSession;
  if (b.highSeriesScratch && event.scratchHighSeriesFee) total += event.scratchHighSeriesFee;
  if (b.highSeriesHandicap && event.handicapHighSeriesFee) total += event.handicapHighSeriesFee;
  return total;
}

function eventTotals(event) {
  const bs = Object.values(event.bowlers || {});
  let owed = 0, paid = 0, paidCount = 0;
  let totalScratchBrackets = 0, totalHandicapBrackets = 0;
  let totalScratchSidepot = 0, totalHandicapSidepot = 0;
  let totalScratchHS = 0, totalHandicapHS = 0;
  bs.forEach(b => {
    const o = calculateAmountOwed(event, b);
    owed += o;
    if (b.paid) { paid += o; paidCount++; }
    totalScratchBrackets += b.scratchBrackets || 0;
    totalHandicapBrackets += b.handicapBrackets || 0;
    if (b.sidepotScratch) totalScratchSidepot++;
    if (b.sidepotHandicap) totalHandicapSidepot++;
    if (b.highSeriesScratch) totalScratchHS++;
    if (b.highSeriesHandicap) totalHandicapHS++;
  });
  // Prize pool generated (paid entries only)
  const paidBowlers = bs.filter(b => b.paid);
  let paidScratchBrackets = 0, paidHandicapBrackets = 0;
  let paidScratchSidepot = 0, paidHandicapSidepot = 0;
  let paidScratchHS = 0, paidHandicapHS = 0;
  paidBowlers.forEach(b => {
    paidScratchBrackets += b.scratchBrackets || 0;
    paidHandicapBrackets += b.handicapBrackets || 0;
    if (b.sidepotScratch) paidScratchSidepot++;
    if (b.sidepotHandicap) paidHandicapSidepot++;
    if (b.highSeriesScratch) paidScratchHS++;
    if (b.highSeriesHandicap) paidHandicapHS++;
  });
  const totalPaidBracketEntries = paidScratchBrackets + paidHandicapBrackets;
  const completeBrackets = Math.floor(totalPaidBracketEntries / 8);
  const houseCutTotal = completeBrackets * event.bracketHouseCutDollar;
  const bracketPrizeRevenue = totalPaidBracketEntries * event.bracketEntryFee - houseCutTotal;
  const sidepotRevenue =
    (paidScratchSidepot * (event.scratchSidepotFee || 0) * event.gamesPerSession) +
    (paidHandicapSidepot * (event.handicapSidepotFee || 0) * event.gamesPerSession) +
    (paidScratchHS * (event.scratchHighSeriesFee || 0)) +
    (paidHandicapHS * (event.handicapHighSeriesFee || 0));
  return {
    bowlerCount: bs.length,
    paidCount,
    unpaidCount: bs.length - paidCount,
    owed, paid,
    totalScratchBrackets, totalHandicapBrackets,
    totalScratchSidepot, totalHandicapSidepot,
    totalScratchHS, totalHandicapHS,
    paidScratchBrackets, paidHandicapBrackets,
    paidScratchSidepot, paidHandicapSidepot,
    paidScratchHS, paidHandicapHS,
    bracketPrizeRevenue, sidepotRevenue, houseCutTotal,
    totalPrizePoolGenerated: bracketPrizeRevenue + sidepotRevenue
  };
}

// ---------- Brackets-filled projection ----------
// Given the per-bowler entry counts for ONE bracket type, work out how many
// complete brackets of 8 those entries fill. A bracket of 8 needs 8 distinct
// bowlers, so a single bowler can occupy at most one seat per bracket. A bowler
// holding more entries than there are brackets has the surplus stranded — those
// entries cannot count toward a filled bracket.
//
//   filled  = largest B where  sum(min(count, B)) >= 8 * B
//   partial = seats the next (incomplete) bracket can take, 0–7
//   stranded= entries that cannot be seated at all (over-allocated bowlers)
function bracketsFilledStats(counts) {
  const list = (counts || []).filter(c => c > 0);
  const totalEntries = list.reduce((s, c) => s + c, 0);
  let filled = 0;
  while (true) {
    const next = filled + 1;
    const placeable = list.reduce((s, c) => s + Math.min(c, next), 0);
    if (placeable >= 8 * next) filled = next; else break;
  }
  const placeableNext = list.reduce((s, c) => s + Math.min(c, filled + 1), 0);
  const partial = Math.max(0, Math.min(8, placeableNext - 8 * filled));
  const seated = 8 * filled + partial;
  const stranded = Math.max(0, totalEntries - seated);
  return { totalEntries, filled, partial, seatsToFill: partial > 0 ? 8 - partial : 0, stranded };
}

// ---------- Handicap ----------
function calculateHandicap(avg, base, pct) {
  if (avg == null || isNaN(avg)) return 0;
  return Math.max(0, Math.floor((base - avg) * pct));
}

function getGameScore(event, bowlerId, gameNum, competitionType) {
  const raw = (event.scores[bowlerId] || {})[gameNum];
  if (raw == null) return null;
  if (competitionType === "handicap") {
    const b = event.bowlers[bowlerId];
    if (!b) return raw;
    const hcp = calculateHandicap(b.average, event.handicapBase, event.handicapPct);
    return raw + hcp;
  }
  return raw;
}

// ---------- Round-1 anti-repeat helpers ----------
function r1PairKey(a, b) { return a < b ? `${a}||${b}` : `${b}||${a}`; }

function countR1Repeats(seats, seenPairs) {
  let c = 0;
  for (let i = 0; i < seats.length; i += 2) {
    if (seats[i] && seats[i + 1] && seenPairs.has(r1PairKey(seats[i], seats[i + 1]))) c++;
  }
  return c;
}

function optimizeR1Seats(seats, seenPairs) {
  let best = [...seats], score = countR1Repeats(best, seenPairs);
  if (score === 0) return best;
  for (let t = 0; t < 300; t++) {
    const trial = shuffle([...seats]);
    const s = countR1Repeats(trial, seenPairs);
    if (s < score) { best = trial; score = s; if (s === 0) break; }
  }
  return best;
}

// ---------- Bracket formation ----------
function formBracketsForType(event, competitionType) {
  const entries = [];
  Object.values(event.bowlers || {}).forEach(b => {
    if (!b.paid) return;
    const count = competitionType === "scratch" ? b.scratchBrackets : b.handicapBrackets;
    for (let i = 0; i < count; i++) entries.push({ bowlerId: b.id });
  });

  if (entries.length < 8) {
    entries.forEach(e => {
      event.refunds.push({
        id: uid("ref"),
        bowlerId: e.bowlerId,
        reason: `${competitionType} bracket — below 8 entries (cancelled)`,
        amount: event.bracketEntryFee,
        refundPaid: false
      });
    });
    return [];
  }

  const N = Math.floor(entries.length / 8);
  const perBowler = {};
  entries.forEach(e => { perBowler[e.bowlerId] = (perBowler[e.bowlerId] || 0) + 1; });

  // Cap entries per bowler at N
  const finalEntries = [];
  const placement = {};
  Object.entries(perBowler).forEach(([bowlerId, count]) => {
    const allowed = Math.min(count, N);
    for (let i = 0; i < allowed; i++) finalEntries.push({ bowlerId });
    placement[bowlerId] = allowed;
    const excess = count - allowed;
    for (let i = 0; i < excess; i++) {
      event.refunds.push({
        id: uid("ref"),
        bowlerId,
        reason: `${competitionType} bracket — over-allocation`,
        amount: event.bracketEntryFee,
        refundPaid: false
      });
    }
  });

  const N2 = Math.floor(finalEntries.length / 8);
  while (finalEntries.length > N2 * 8) {
    const dropped = finalEntries.pop();
    placement[dropped.bowlerId]--;
    event.refunds.push({
      id: uid("ref"),
      bowlerId: dropped.bowlerId,
      reason: `${competitionType} bracket — leftover`,
      amount: event.bracketEntryFee,
      refundPaid: false
    });
  }

  // Distribute into N2 brackets
  const buckets = Array.from({ length: N2 }, () => []);
  const sortedBowlers = shuffle(Object.entries(placement).filter(([,c]) => c > 0).map(([bid]) => bid));
  sortedBowlers.forEach(bid => {
    const count = placement[bid];
    const idxs = buckets.map((b, i) => i).sort((a, b) => buckets[a].length - buckets[b].length);
    for (let i = 0; i < count; i++) buckets[idxs[i]].push(bid);
  });

  const pools = [];
  const seenR1Pairs = new Set(); // track R1 matchups across all brackets of this type
  buckets.forEach((seats, idx) => {
    // Optimize seat order to minimize R1 repeat matchups vs prior brackets
    const optimized = optimizeR1Seats(shuffle(seats), seenR1Pairs);
    // Record the R1 pairs produced by this bracket's ordering
    for (let i = 0; i < optimized.length; i += 2) {
      if (optimized[i] && optimized[i + 1]) seenR1Pairs.add(r1PairKey(optimized[i], optimized[i + 1]));
    }
    const pool = {
      id: uid("pool"),
      competitionType,
      poolNumber: idx + 1,
      seats: optimized,
      matchups: {},        // { 1: [...], 2: [...], 3: [...] }
      firstPlace: [],      // bowler ids (1+ in case of tie at top)
      secondPlace: [],     // bowler ids
      firstPrize: event.bracketFirstPlace,
      secondPrize: event.bracketSecondPlace
    };
    event.bracketPools[pool.id] = pool;
    pools.push(pool);
  });
  return pools;
}

function formAllBrackets(eventId) {
  const e = getEvent(eventId);
  if (!e) return;
  e.bracketPools = {};
  e.refunds = e.refunds.filter(r => r.reason && r.reason.includes("admin override"));
  if (e.offersScratch) formBracketsForType(e, "scratch");
  if (e.offersHandicap) formBracketsForType(e, "handicap");
  e.status = "ready";
  saveState();
}

// ---------- Score entry ----------
// noSave: pass true when called from live score inputs — scores are saved on Submit Game,
// not on every keystroke, to prevent Firebase onValue re-rendering the page mid-type.
function setScore(eventId, bowlerId, gameNum, value, noSave) {
  const e = getEvent(eventId);
  if (!e) return;
  if (!e.scores[bowlerId]) e.scores[bowlerId] = {};
  if (value === "" || value == null) {
    delete e.scores[bowlerId][gameNum];
  } else {

    if (!isNaN(n) && n >= 0 && n <= 300) {
      e.scores[bowlerId][gameNum] = n;
    }

}

// ---------- Matchup resolution (with tie advancement) ----------
function computeMatchup(event, bowlerIds, gameNum, competitionType) {
  if (!bowlerIds || bowlerIds.length === 0) return { bowlers: [], advancers: [], pending: false };
  const scored = bowlerIds.map(bid => ({ bid, score: getGameScore(event, bid, gameNum, competitionType) }));
  const pending = scored.some(s => s.score == null);
  if (pending) return { bowlers: bowlerIds, advancers: [], pending: true, scored };
  const sorted = scored.slice().sort((a, b) => b.score - a.score);
  const top = sorted[0].score;
  const advancers = sorted.filter(s => s.score === top).map(s => s.bid);
  const isTie = advancers.length > 1;
  return { bowlers: bowlerIds, advancers, pending: false, scored: sorted, topScore: top, isTie };
}

function computeBracketResults(event) {
  Object.values(event.bracketPools || {}).forEach(pool => {
    pool.matchups = { 1: [], 2: [], 3: [] };
    pool.firstPlace = [];
    pool.secondPlace = [];

    // Round 1 — 4 matchups, Game 1
    const r1 = [
      pool.seats.slice(0, 2),
      pool.seats.slice(2, 4),
      pool.seats.slice(4, 6),
      pool.seats.slice(6, 8)
    ];
    pool.matchups[1] = r1.map(m => computeMatchup(event, m, 1, pool.competitionType));

    // Round 2 — 2 matchups, combine R1 advancers, Game 2
    const r2_groups = [
      [...(pool.matchups[1][0].advancers || []), ...(pool.matchups[1][1].advancers || [])],
      [...(pool.matchups[1][2].advancers || []), ...(pool.matchups[1][3].advancers || [])]
    ];
    pool.matchups[2] = r2_groups.map(group => {
      if (group.length === 0 || pool.matchups[1].some(m => m.pending)) {
        return { bowlers: group, advancers: [], pending: true };
      }
      return computeMatchup(event, group, 2, pool.competitionType);
    });

    // Round 3 — 1 matchup, combine R2 advancers, Game 3
    const r3_group = [
      ...(pool.matchups[2][0].advancers || []),
      ...(pool.matchups[2][1].advancers || [])
    ];
    if (r3_group.length === 0 || pool.matchups[2].some(m => m.pending)) {
      pool.matchups[3] = [{ bowlers: r3_group, advancers: [], pending: true }];
    } else {
      const scored = r3_group.map(bid => ({ bid, score: getGameScore(event, bid, 3, pool.competitionType) }));
      const allIn = scored.every(s => s.score != null);
      if (!allIn) {
        pool.matchups[3] = [{ bowlers: r3_group, advancers: [], pending: true, scored }];
      } else {
        const sorted = scored.slice().sort((a, b) => b.score - a.score);
        const top = sorted[0].score;
        const firsts = sorted.filter(s => s.score === top).map(s => s.bid);
        let seconds = [];
        if (firsts.length === 1) {
          const remaining = sorted.filter(s => s.score < top);
          if (remaining.length > 0) {
            const second = remaining[0].score;
            seconds = remaining.filter(s => s.score === second).map(s => s.bid);
          }
        }
        pool.matchups[3] = [{
          bowlers: r3_group, advancers: firsts, pending: false, scored: sorted,
          topScore: top, isTie: firsts.length > 1, firsts, seconds
        }];
        pool.firstPlace = firsts;
        pool.secondPlace = seconds;
      }
    }
  });
}

// ---------- Sidepot per-game results ----------
function sidepotPerGameResults(event) {
  // Returns: { sidepotKey: { gameNum: { winners: [bid], score: n, payout: n, totalEntries: n } } }
  const out = {};
  const sidepots = [];
  if (event.scratchSidepotFee) sidepots.push({ key: "scratchPerGame", type: "scratch", fee: event.scratchSidepotFee, label: "Scratch high game", short: "SCR HG" });
  if (event.handicapSidepotFee) sidepots.push({ key: "handicapPerGame", type: "handicap", fee: event.handicapSidepotFee, label: "Handicap high game", short: "HDCP HG" });
  sidepots.forEach(sp => {
    const entrants = Object.values(event.bowlers || {}).filter(b => b.paid && (sp.type === "scratch" ? b.sidepotScratch : b.sidepotHandicap));
    const pool = entrants.length * sp.fee;
    out[sp.key] = { label: sp.label, short: sp.short, type: sp.type, fee: sp.fee, totalEntrants: entrants.length, perGamePool: pool, games: {} };
    for (let g = 1; g <= event.gamesPerSession; g++) {
      const scored = entrants.map(b => ({ bid: b.id, score: getGameScore(event, b.id, g, sp.type) }))
                             .filter(s => s.score != null);
      if (scored.length === 0) continue;
      const top = Math.max(...scored.map(s => s.score));
      const winners = scored.filter(s => s.score === top).map(s => s.bid);
      const allIn = scored.length === entrants.length;
      const payout = winners.length > 0 ? Math.round((pool / winners.length) * 100) / 100 : 0;
      out[sp.key].games[g] = { winners, topScore: top, payout, allEntered: allIn };
    }
  });
  return out;
}

// High series sidepot results (locked until all games entered)
function highSeriesResults(event) {
  const out = {};
  const pots = [];
  if (event.scratchHighSeriesFee) pots.push({ key: "scratchHS", type: "scratch", fee: event.scratchHighSeriesFee, label: "Scratch high series", short: "SCR HS" });
  if (event.handicapHighSeriesFee) pots.push({ key: "handicapHS", type: "handicap", fee: event.handicapHighSeriesFee, label: "Handicap high series", short: "HDCP HS" });
  pots.forEach(sp => {
    const entrants = Object.values(event.bowlers || {}).filter(b => b.paid && (sp.type === "scratch" ? b.highSeriesScratch : b.highSeriesHandicap));
    const pool = entrants.length * sp.fee;
    const scored = entrants.map(b => {
      const g1 = getGameScore(event, b.id, 1, sp.type);
      const g2 = getGameScore(event, b.id, 2, sp.type);
      const g3 = getGameScore(event, b.id, 3, sp.type);
      const total = (g1 || 0) + (g2 || 0) + (g3 || 0);
      const complete = g1 != null && g2 != null && g3 != null;
      return { bid: b.id, total, complete };
    });
    const locked = scored.some(s => !s.complete);
    let winners = [], top = null, payout = 0;
    if (!locked && scored.length > 0) {
      top = Math.max(...scored.map(s => s.total));
      winners = scored.filter(s => s.total === top).map(s => s.bid);
      payout = winners.length > 0 ? Math.round((pool / winners.length) * 100) / 100 : 0;
    }
    out[sp.key] = { label: sp.label, short: sp.short, type: sp.type, fee: sp.fee, totalEntrants: entrants.length, pool, locked, winners, top, payout };
  });
  return out;
}

// ---------- Payouts ----------
function computePayouts(event) {
  const payouts = [];
  // For league events, bracket payouts are deferred to the following week
  const isLeague = event.eventType === "league";
  const bracketPayouts = [];

  // Bracket payouts (1st and 2nd)
  Object.values(event.bracketPools || {}).forEach(pool => {
    const firstPrize = event.bracketFirstPlace || 0;
    const secondPrize = event.bracketSecondPlace || 0;
    const totalPool = firstPrize + secondPrize;
    const labelPrefix = `${pool.competitionType === "handicap" ? "HDCP" : "SCR"} BRKT #${pool.poolNumber}`;

    if (pool.firstPlace.length === 0) return; // not yet decided

    if (pool.firstPlace.length === 1 && pool.secondPlace.length >= 1) {
      bracketPayouts.push({
        id: uid("po"), bowlerId: pool.firstPlace[0],
        source: "bracket", label: `${labelPrefix} — 1st place`,
        amount: firstPrize, paidOut: false
      });
      const secondShare = Math.round((secondPrize / pool.secondPlace.length) * 100) / 100;
      pool.secondPlace.forEach(bid => {
        bracketPayouts.push({
          id: uid("po"), bowlerId: bid,
          source: "bracket",
          label: `${labelPrefix} — 2nd place${pool.secondPlace.length > 1 ? ' (tie split)' : ''}`,
          amount: secondShare, paidOut: false
        });
      });
    } else if (pool.firstPlace.length > 1) {
      const share = Math.round((totalPool / pool.firstPlace.length) * 100) / 100;
      pool.firstPlace.forEach(bid => {
        bracketPayouts.push({
          id: uid("po"), bowlerId: bid,
          source: "bracket",
          label: `${labelPrefix} — tie at top, split 1st+2nd`,
          amount: share, paidOut: false
        });
      });
    } else if (pool.firstPlace.length === 1 && pool.secondPlace.length === 0) {
      bracketPayouts.push({
        id: uid("po"), bowlerId: pool.firstPlace[0],
        source: "bracket", label: `${labelPrefix} — 1st place (no 2nd)`,
        amount: firstPrize, paidOut: false
      });
    }
  });

  // Route bracket payouts: league → deferredPayouts; tournament → payouts (tonight)
  if (isLeague) {
    // Tag each deferred payout with the week date so it stays identifiable
    const weekTag = event.date || ("Week " + ((event.weekHistory || []).length + 1));
    bracketPayouts.forEach(p => { p.weekTag = weekTag; });
    event.deferredPayouts = bracketPayouts;
  } else {
    bracketPayouts.forEach(p => payouts.push(p));
  }

  // Sidepot per-game payouts
  const spGames = sidepotPerGameResults(event);
  Object.entries(spGames).forEach(([key, spOut]) => {
    Object.entries(spOut.games).forEach(([g, r]) => {
      r.winners.forEach(bid => {
        payouts.push({
          id: uid("po"), bowlerId: bid,
          source: "sidepot",
          label: `${spOut.short} — Game ${g} (high ${r.topScore})${r.winners.length > 1 ? ' (tie split)' : ''}`,
          amount: r.payout, paidOut: false
        });
      });
    });
  });

  // High series payouts
  const hs = highSeriesResults(event);
  Object.values(hs).forEach(r => {
    if (r.locked) return;
    r.winners.forEach(bid => {
      payouts.push({
        id: uid("po"), bowlerId: bid,
        source: "highseries",
        label: `${r.short} — series ${r.top}${r.winners.length > 1 ? ' (tie split)' : ''}`,
        amount: r.payout, paidOut: false
      });
    });
  });

  event.payouts = payouts;
}

function finalizePayouts(eventId) {
  const e = getEvent(eventId);
  if (!e) return;
  computeBracketResults(e);
  computePayouts(e);
  syncSidepotLedger(e);   // capture any per-game / series winnings
  syncBracketLedger(e);   // add this week's bracket winnings
  e.status = "finalized";
  saveState();
}

/* =========================================================================
 * Payout Ledger
 * -------------------------------------------------------------------------
 * event.ledger is a persistent list of every payout obligation. It is the
 * single source of truth for the Payouts tab and the League History tab.
 *  - Sidepot winnings are added when each game is submitted (per-game) and
 *    when game 3 is submitted (high series).
 *  - Bracket winnings are added when a week is finalized.
 *  - Entries persist across league-week resets and carry forward until paid.
 * Each entry: { id, key, weekNum, weekLabel, eventName, bowlerId, bowlerName,
 *   lane, category("bracket"|"sidepot"), source, label, amount, paid, paidAt }
 * ========================================================================= */
function currentWeekNum(event) {
  return (event.weekHistory ? event.weekHistory.length : 0) + 1;
}
function fmtWeekDate(d) {
  if (!d) return "";
  try {
    return new Date(d + "T12:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  } catch (_) { return d; }
}
function weekLabelFor(event, weekNum, dateStr) {
  if (event.eventType === "league") {
    const d = fmtWeekDate(dateStr);
    return "Week " + weekNum + (d ? " — " + d : "");
  }
  return fmtWeekDate(dateStr) || event.name || "Event";
}
function ledgerKey(weekNum, bowlerId, label) {
  return weekNum + "||" + bowlerId + "||" + label;
}
function dedupeKeys(entries) {
  const seen = {};
  entries.forEach(en => {
    if (seen[en.key] != null) { seen[en.key]++; en.key = en.key + " #" + seen[en.key]; }
    else seen[en.key] = 1;
  });
  return entries;
}
function makeLedgerEntry(event, weekNum, weekLabel, bowlerId, b, category, source, label, amount) {
  return {
    id: uid("led"),
    key: ledgerKey(weekNum, bowlerId, label),
    weekNum, weekLabel,
    eventName: event.name,
    bowlerId,
    bowlerName: b ? b.name : "?",
    lane: b ? (b.lane || "") : "",
    category, source, label,
    amount,
    paid: false,
    paidAt: null,
    createdAt: Date.now()
  };
}
// Merge a freshly computed set of entries into the ledger for one week+category.
// Keeps already-paid entries untouched; refreshes unpaid ones; drops unpaid
// entries that no longer apply (e.g. a corrected score changed the winner).
function reconcileLedger(event, weekNum, category, fresh) {
  if (!event.ledger) event.ledger = [];
  const freshByKey = {};
  fresh.forEach(f => { freshByKey[f.key] = f; });
  event.ledger = event.ledger.filter(l => {
    if (l.weekNum === weekNum && l.category === category && !l.paid && !freshByKey[l.key]) return false;
    return true;
  });
  const have = {};
  event.ledger.forEach(l => {
    if (l.weekNum === weekNum && l.category === category) {
      have[l.key] = l;
      if (!l.paid && freshByKey[l.key]) {
        l.amount = freshByKey[l.key].amount;
        l.weekLabel = freshByKey[l.key].weekLabel;
        l.bowlerName = freshByKey[l.key].bowlerName;
        l.lane = freshByKey[l.key].lane;
      }
    }
  });
  fresh.forEach(f => { if (!have[f.key]) { event.ledger.push(f); have[f.key] = f; } });
}
// Add per-game + high-series sidepot winnings for the current week.
function syncSidepotLedger(event) {
  if (!event.ledger) event.ledger = [];
  const weekNum = currentWeekNum(event);
  const weekLabel = weekLabelFor(event, weekNum, event.date);
  const fresh = [];
  const spGames = sidepotPerGameResults(event);
  Object.values(spGames).forEach(spOut => {
    Object.entries(spOut.games).forEach(([g, r]) => {
      // A game's sidepot enters the ledger once that game has been submitted
      // (currentGame has advanced past it) — submitting a game is the admin's
      // "this game is complete" signal. Fully-entered games still qualify too,
      // so the finalize-time sync is unaffected. The old allEntered-only gate
      // withheld the payout whenever a single entrant's score was missing.
      if (Number(g) >= (event.currentGame || 1) && !r.allEntered) return;
      r.winners.forEach(bid => {
        const b = event.bowlers[bid];
        const label = `${spOut.short} — Game ${g} (high ${r.topScore})${r.winners.length > 1 ? " (tie split)" : ""}`;
        fresh.push(makeLedgerEntry(event, weekNum, weekLabel, bid, b, "sidepot", "sidepot", label, r.payout));
      });
    });
  });
  const hs = highSeriesResults(event);
  Object.values(hs).forEach(r => {
    if (r.locked || r.totalEntrants === 0) return;
    r.winners.forEach(bid => {
      const b = event.bowlers[bid];
      const label = `${r.short} — series ${r.top}${r.winners.length > 1 ? " (tie split)" : ""}`;
      fresh.push(makeLedgerEntry(event, weekNum, weekLabel, bid, b, "sidepot", "highseries", label, r.payout));
    });
  });
  dedupeKeys(fresh);
  reconcileLedger(event, weekNum, "sidepot", fresh);
}
// Add bracket winnings for the current week. Call after computePayouts().
function syncBracketLedger(event) {
  if (!event.ledger) event.ledger = [];
  const weekNum = currentWeekNum(event);
  const weekLabel = weekLabelFor(event, weekNum, event.date);
  const bracketSrc = event.eventType === "league"
    ? (event.deferredPayouts || [])
    : (event.payouts || []).filter(p => p.source === "bracket");
  const fresh = bracketSrc.map(p => {
    const b = event.bowlers[p.bowlerId];
    return makeLedgerEntry(event, weekNum, weekLabel, p.bowlerId, b, "bracket", "bracket", p.label, p.amount);
  });
  dedupeKeys(fresh);
  reconcileLedger(event, weekNum, "bracket", fresh);
}
// Group unpaid ledger entries to one row per bowler per week.
function groupLedger(entries) {
  const groups = {};
  entries.forEach(l => {
    const k = l.weekNum + "|" + l.bowlerId;
    if (!groups[k]) groups[k] = {
      weekNum: l.weekNum, weekLabel: l.weekLabel, eventName: l.eventName,
      bowlerId: l.bowlerId, bowlerName: l.bowlerName, lane: l.lane, items: [], total: 0
    };
    groups[k].items.push(l);
    groups[k].total += l.amount;
  });
  return Object.values(groups).sort((a, b) =>
    b.weekNum - a.weekNum || a.bowlerName.localeCompare(b.bowlerName));
}
// One-time migration: build the ledger from existing week history + any
// current finalized week so prior data appears in the new tabs.
function migrateLedger(event) {
  const entries = [];
  const fromPayout = (weekNum, weekLabel, p, category) => {
    const b = event.bowlers[p.bowlerId];
    entries.push({
      id: uid("led"),
      key: ledgerKey(weekNum, p.bowlerId, p.label),
      weekNum, weekLabel,
      eventName: event.name,
      bowlerId: p.bowlerId,
      bowlerName: b ? b.name : (p.bowlerName || "?"),
      lane: b ? (b.lane || "") : "",
      category,
      source: p.source || category,
      label: p.label,
      amount: p.amount,
      paid: !!p.paidOut,
      paidAt: p.paidOut ? Date.now() : null,
      createdAt: p.createdAt || Date.now()
    });
  };
  (event.weekHistory || []).forEach(week => {
    const wLabel = weekLabelFor(event, week.weekNum, week.date);
    (week.deferredPayouts || []).forEach(p => fromPayout(week.weekNum, wLabel, p, "bracket"));
    (week.payouts || []).forEach(p =>
      fromPayout(week.weekNum, wLabel, p, p.source === "bracket" ? "bracket" : "sidepot"));
  });
  if (event.status === "finalized") {
    const wNum = currentWeekNum(event);
    const wLabel = weekLabelFor(event, wNum, event.date);
    (event.deferredPayouts || []).forEach(p => fromPayout(wNum, wLabel, p, "bracket"));
    (event.payouts || []).forEach(p =>
      fromPayout(wNum, wLabel, p, p.source === "bracket" ? "bracket" : "sidepot"));
  }
  dedupeKeys(entries);
  event.ledger = entries;
}

// ---------- CSV/XLSX import ----------
function parseRosterRows(rows) {
  // Expect headers: name, average, lane, team (case-insensitive, flexible)
  if (!rows || rows.length === 0) return { errors: ["File is empty"], bowlers: [] };
  const header = rows[0].map(h => String(h || "").trim().toLowerCase());
  const colIdx = {
    name: header.findIndex(h => h.includes("name")),
    average: header.findIndex(h => h.startsWith("avg") || h.includes("average")),
    lane: header.findIndex(h => h.includes("lane")),
    team: header.findIndex(h => h.includes("team"))
  };
  const errors = [];
  if (colIdx.name === -1) errors.push("Missing required column: name");
  if (errors.length > 0) return { errors, bowlers: [] };

  const bowlers = [];
  const seenNames = new Set();
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length === 0) continue;
    const name = String(row[colIdx.name] || "").trim();
    if (!name) continue;
    if (seenNames.has(name.toLowerCase())) {
      errors.push(`Row ${i + 1}: duplicate name "${name}" — kept first, skipped duplicate`);
      continue;
    }
    seenNames.add(name.toLowerCase());
    const avgRaw = colIdx.average !== -1 ? row[colIdx.average] : null;
    const avg = avgRaw != null && avgRaw !== "" ? Number(avgRaw) : null;
    if (avgRaw != null && avgRaw !== "" && isNaN(avg)) {
      errors.push(`Row ${i + 1} (${name}): average "${avgRaw}" is not a number — set to blank`);
    }
    bowlers.push({
      name,
      average: avg != null && !isNaN(avg) ? avg : null,
      lane: colIdx.lane !== -1 ? String(row[colIdx.lane] || "").trim() : "",
      teamNumber: colIdx.team !== -1 ? String(row[colIdx.team] || "").trim() : ""
    });
  }
  return { errors, bowlers };
}

function importRosterRows(eventId, parsed) {
  const e = getEvent(eventId);
  if (!e) return;
  const existingByName = {};
  Object.values(e.bowlers || {}).forEach(b => { existingByName[b.name.toLowerCase()] = b; });
  let added = 0, updated = 0;
  parsed.bowlers.forEach(p => {
    const existing = existingByName[p.name.toLowerCase()];
    if (existing) {
      // Update lane, average, and team if provided in the import
      const updates = {};
      if (p.lane !== undefined && p.lane !== "") updates.lane = p.lane;
      if (p.average !== null && p.average !== undefined) updates.average = p.average;
      if (p.teamNumber !== undefined && p.teamNumber !== "") updates.teamNumber = p.teamNumber;
      if (Object.keys(updates).length > 0) {
        updateBowler(eventId, existing.id, updates);
        updated++;
      }
      return;
    }
    addBowler(eventId, {
      name: p.name,
      average: p.average,
      lane: p.lane,
      teamNumber: p.teamNumber
    });
    added++;
  });
  return { added, updated };
}

// ---------- Alive List computation ----------
function aliveListData(event) {
  computeBracketResults(event);
  const rows = []; // each row: {bowlerId, name, lane, team, bracketLabel, status, opponents, eliminationRound}
  Object.values(event.bracketPools || {}).forEach(pool => {
    const allBowlers = pool.seats;
    allBowlers.forEach((bid, seatIdx) => {
      const b = event.bowlers[bid];
      if (!b) return;
      // Determine status for this seat
      // We track per-seat (one seat = one bracket entry)
      let status = "alive", currentRound = 1, opponents = [], eliminatedRound = null, finalPosition = null;
      // Game numbers where this bowler advanced via a tie (both bowlers moved on)
      const tieGames = [];

      // R1 result
      const r1MatchIdx = Math.floor(seatIdx / 2);
      const r1m = pool.matchups[1] ? pool.matchups[1][r1MatchIdx] : null;
      if (!r1m) { return; }
      const oppObj = x => { const o = event.bowlers[x]; return { id: x, name: o?.name || "?", lane: o?.lane || "", hcp: calculateHandicap(o?.average, event.handicapBase, event.handicapPct) }; };
      opponents = r1m.bowlers.filter(x => x !== bid).map(oppObj);
      if (r1m.pending) { status = "alive"; currentRound = 1; }
      else if (!r1m.advancers.includes(bid)) { status = "eliminated"; eliminatedRound = 1; }
      else {
        // Advanced to R2 — note a tie in Game 1 if the matchup ended level
        if (r1m.isTie) tieGames.push(1);
        const r2Idx = Math.floor(r1MatchIdx / 2);
        const r2m = pool.matchups[2] ? pool.matchups[2][r2Idx] : null;
        if (!r2m || r2m.pending) {
          status = "alive"; currentRound = 2;
          opponents = (r2m?.bowlers || []).filter(x => x !== bid).map(oppObj);
        } else if (!r2m.advancers.includes(bid)) {
          status = "eliminated"; eliminatedRound = 2;
          opponents = (r2m.bowlers || []).filter(x => x !== bid).map(oppObj);
        } else {
          // Advanced to R3 — note a tie in Game 2 if the matchup ended level
          if (r2m.isTie) tieGames.push(2);
          // R3
          const r3m = pool.matchups[3] ? pool.matchups[3][0] : null;
          if (!r3m || r3m.pending) {
            status = "alive"; currentRound = 3;
            opponents = (r3m?.bowlers || []).filter(x => x !== bid).map(oppObj);
          } else {
            // Game 3 resolved — always reflect the Game 3 opponent (the bowler
            // advanced through Game 2, so `opponents` still held the Game 1
            // matchup). Set it here so winners AND eliminated entries show the
            // current/final-game opponent, never reverting to Game 1.
            opponents = (r3m.bowlers || []).filter(x => x !== bid).map(oppObj);
            if (r3m.firsts && r3m.firsts.includes(bid)) {
              status = "winner";
              finalPosition = r3m.firsts.length > 1 ? "Tied 1st" : "1st place";
            } else if (r3m.seconds && r3m.seconds.includes(bid)) {
              status = "winner";
              finalPosition = r3m.seconds.length > 1 ? "Tied 2nd" : "2nd place";
            } else {
              status = "eliminated"; eliminatedRound = 3;
            }
          }
        }
      }

      rows.push({
        bowlerId: bid,
        name: b.name,
        lane: b.lane,
        team: b.teamNumber,
        bracketLabel: `${pool.competitionType === "handicap" ? "HDCP" : "SCR"} #${pool.poolNumber}`,
        seatIndex: seatIdx + 1,
        currentRound,
        status,
        eliminatedRound,
        finalPosition,
        // Only flag a tie from the game just completed — a game-1 tie is
        // relevant while bowling game 2, but not once the entry reaches game 3
        tieGames: status === "alive" ? tieGames.filter(g => g === currentRound - 1) : [],
        opponents
      });
    });
  });
  return rows;
}

// ---------- CSV export ----------
function payoutCSV(event) {
  // Export from the ledger so league bracket winnings (deferred to the
  // following week) are included alongside same-week sidepot winnings.
  const ledger = event.ledger || [];
  const rows = [["Week", "Category", "Bowler", "Description", "Amount", "Paid"]];
  ledger.slice().sort((a, b) =>
    a.weekNum - b.weekNum ||
    a.category.localeCompare(b.category) ||
    String(a.bowlerName).localeCompare(String(b.bowlerName))
  ).forEach(l => {
    rows.push([
      l.weekLabel,
      l.category === "bracket" ? "Bracket" : "Sidepot",
      l.bowlerName,
      l.label,
      fmtMoney(l.amount),
      l.paid ? "Yes" : "No"
    ]);
  });
  event.refunds.forEach(r => {
    const name = event.bowlers[r.bowlerId]?.name || "?";
    rows.push(["", "Refund", name, r.reason, fmtMoney(r.amount), r.refundPaid ? "Yes" : "No"]);
  });
  rows.push([]);
  rows.push(["Per-Bowler Summary"]);
  rows.push(["Bowler", "Lane", "Team", "Bracket Won", "Sidepot Won", "Refunded", "Paid Out", "Outstanding"]);
  Object.values(event.bowlers || {}).forEach(b => {
    const led = ledger.filter(l => l.bowlerId === b.id);
    const bracketWon = led.filter(l => l.category === "bracket").reduce((s, l) => s + l.amount, 0);
    const sidepotWon = led.filter(l => l.category === "sidepot").reduce((s, l) => s + l.amount, 0);
    const refunded = event.refunds.filter(r => r.bowlerId === b.id).reduce((s, r) => s + r.amount, 0);
    if (bracketWon + sidepotWon + refunded === 0) return;
    const paidOut = led.filter(l => l.paid).reduce((s, l) => s + l.amount, 0)
      + event.refunds.filter(r => r.bowlerId === b.id && r.refundPaid).reduce((s, r) => s + r.amount, 0);
    const outstanding = bracketWon + sidepotWon + refunded - paidOut;
    rows.push([b.name, b.lane || "", b.teamNumber || "",
      fmtMoney(bracketWon), fmtMoney(sidepotWon), fmtMoney(refunded),
      fmtMoney(paidOut), fmtMoney(outstanding)]);
  });
  const t = eventTotals(event);
  rows.push([]);
  rows.push(["House Cut (Brackets, flat per entry)", "", "", "", fmtMoney(t.houseCutTotal)]);
  return rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
}

function downloadCSV(filename, csv) {
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

// ---------- JSON Backup / Restore ----------
function downloadBackup() {
  const toExport = Object.assign({}, state);
  delete toExport.viewMode; // transient UI state — not persisted in Firebase
  const json = JSON.stringify(toExport, null, 2);
  const blob = new Blob([json], { type: "application/json;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `bowling_backup_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

function restoreFromBackup(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    let parsed;
    try { parsed = JSON.parse(ev.target.result); }
    catch (_) { alert("Invalid backup file — could not parse JSON."); return; }
    if (!parsed || typeof parsed !== "object" || !parsed.events) {
      alert("Invalid backup file — missing expected data structure (no events key).");
      return;
    }
    if (!confirm(
      "Restore this backup?\n\nThis will OVERWRITE all current data in Firebase with the backup contents.\n\nThis cannot be undone."
    )) return;
    const vm = state.viewMode; // preserve current admin/bowler view mode
    Object.assign(state, parsed);
    state.viewMode = vm;
    repairFirebaseState(); // fill any missing fields introduced by newer app versions
    saveState();
    render();
  };
  reader.readAsText(file);
}

// ---------- Print helpers ----------
function printRoster(eventId) {
  const e = getEvent(eventId);
  if (!e) return;

function printScoreSheet(eventId) {
  const e = getEvent(eventId);
  if (!e) return;
  const bracketIds = new Set();
  Object.values(e.bracketPools || {}).forEach(p => p.seats.forEach(id => bracketIds.add(id)));
  Object.values(e.bowlers || {}).forEach(b => {
    if (b.paid && (b.sidepotScratch || b.sidepotHandicap || b.highSeriesScratch || b.highSeriesHandicap)) bracketIds.add(b.id);
  });
  const bowlers = Array.from(bracketIds).map(id => e.bowlers[id]).filter(Boolean)
    .sort((a, b) => (a.lane || "").localeCompare(b.lane || "") || a.name.localeCompare(b.name));
  const bowlerBrackets = {};
  Object.values(e.bracketPools || {}).forEach(pool => {
    pool.seats.forEach(bid => {
      if (!bowlerBrackets[bid]) bowlerBrackets[bid] = [];
      const label = `${pool.competitionType[0].toUpperCase()+pool.competitionType.slice(1)} #${pool.poolNumber}`;
      if (!bowlerBrackets[bid].includes(label)) bowlerBrackets[bid].push(label);
    });
  });
  const rows = bowlers.map(b => {
    const hcp = calculateHandicap(b.average, e.handicapBase, e.handicapPct);
    return `<tr>
      <td>${escapeHtml(b.lane || "")}</td>
      <td>${escapeHtml(b.name)}</td>
      <td>${b.average ?? "—"}</td>
      <td>${hcp}</td>
      <td class="sc"></td><td class="sc"></td><td class="sc"></td>
    </tr>`;
  }).join("");
  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(e.name)} — Score Sheet</title>
    <style>body{font-family:sans-serif;font-size:12px}h2{font-size:15px;margin-bottom:4px}.sub{font-size:11px;color:#666;margin-bottom:10px}
    table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:5px 7px;text-align:left}
    th{background:#f0f0f0;font-weight:700;font-size:11px;text-transform:uppercase}td.sc{min-width:65px}</style></head>
    <body><h2>${escapeHtml(e.name)} — Score Sheet</h2>
    <div class="sub">${escapeHtml(e.date || "")} · ${bowlers.length} entrants · sorted by lane</div>
    <table><thead><tr><th>Lane</th><th>Name</th><th>Avg</th><th>Hcp</th><th>Game 1</th><th>Game 2</th><th>Game 3</th></tr></thead>
    <tbody>${rows}</tbody></table></body></html>`);
  win.document.close();
  win.print();
}

// ---------- Print alive snapshot ----------
function printAliveSnapshot(eventId) {
  const e = getEvent(eventId);
  if (!e) return;
  computeBracketResults(e);
  const rows = aliveListData(e);
  const byBowler = {};
  rows.forEach(r => {
    if (!byBowler[r.bowlerId]) byBowler[r.bowlerId] = { name: r.name, lane: r.lane, alive: [], eliminated: [] };
    if (r.status === "alive" || r.status === "winner") byBowler[r.bowlerId].alive.push(r);
    else byBowler[r.bowlerId].eliminated.push(r);
  });

  // ── Page 1: Alive list ──
  const aliveRows = Object.values(byBowler).filter(g => g.alive.length > 0)
    .sort((a, b) => a.name.localeCompare(b.name) || String(a.lane).localeCompare(String(b.lane)));
  let aliveHtml = aliveRows.map(g => {
    const entries = g.alive.map(r => {
      const oppText = (r.opponents || []).map(o => `${o.name}${o.lane ? " Ln"+o.lane : ""} Hcp${o.hcp}`).join(", ") || "—";
      const rnd = r.status === "winner" ? r.finalPosition : `Game ${r.currentRound}`;
      const tie = (r.status === "alive" && r.tieGames && r.tieGames.length) ? ` · Tied Game${r.tieGames.length > 1 ? "s" : ""} ${r.tieGames.join(", ")}` : "";
      return `<div style="margin-left:12px;font-size:11px;color:#555">${r.bracketLabel} · ${rnd}${tie} · vs ${oppText}</div>`;
    }).join("");
    return `<tr><td style="white-space:nowrap">${escapeHtml(g.lane||"")}</td><td><strong>${escapeHtml(g.name)}</strong>${entries}</td></tr>`;
  }).join("");

  // ── Page 2: Visual bracket matchups ──
  const pools = Object.values(e.bracketPools || {}).sort((a, b) =>
    a.competitionType.localeCompare(b.competitionType) || a.poolNumber - b.poolNumber);
  const bname = id => escapeHtml(e.bowlers[id]?.name || "?");

  let bracketHtml = "";
  pools.forEach(pool => {
    const typeLabel = pool.competitionType[0].toUpperCase() + pool.competitionType.slice(1);
    bracketHtml += `<div style="margin-bottom:24px;page-break-inside:avoid">
      <h3 style="margin:0 0 8px;font-size:13px;color:#1F3864">${typeLabel} Bracket #${pool.poolNumber}
        <span style="font-weight:400;font-size:11px;color:#666"> · 1st $${pool.firstPrize} / 2nd $${pool.secondPrize}</span>
      </h3>
      <div style="display:flex;gap:16px;align-items:flex-start">`;

    const roundLabels = ["Round 1 · G1", "Round 2 · G2", "Final · G3"];
    [1, 2, 3].forEach((rnd, ri) => {
      const matchups = pool.matchups[rnd] || [];
      if (!matchups.length) return;
      bracketHtml += `<div style="min-width:150px">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#666;margin-bottom:6px">${roundLabels[ri]}</div>`;
      matchups.forEach(m => {
        bracketHtml += `<div style="border:1px solid #ccc;border-radius:5px;padding:5px 8px;margin-bottom:8px;background:#fafafa;font-size:12px">`;
        if (!m || !m.bowlers || m.bowlers.length === 0) {
          bracketHtml += `<div style="color:#999">TBD</div><div style="color:#999">TBD</div>`;
        } else if (m.pending) {
          m.bowlers.forEach(bid => {
            bracketHtml += `<div style="padding:2px 0;display:flex;justify-content:space-between"><span>${bname(bid)}</span><span style="color:#999">—</span></div>`;
          });
        } else {
          (m.scored || []).forEach(s => {
            const isWinner = m.advancers && m.advancers.includes(s.bid);
            const style = isWinner
              ? "font-weight:700;color:#2E7D32"
              : "color:#999;text-decoration:line-through";
            bracketHtml += `<div style="padding:2px 0;display:flex;justify-content:space-between;${style}"><span>${bname(s.bid)}</span><span>${s.score}</span></div>`;
          });
          // Final round: show 1st/2nd
          if (rnd === 3 && m.firsts && m.firsts.length > 0) {
            if (m.firsts.length > 1) {
              bracketHtml += `<div style="font-size:10px;color:#E65100;margin-top:3px">Tie — split 1st+2nd</div>`;
            } else {
              bracketHtml += `<div style="font-size:10px;color:#2E7D32;margin-top:3px">🏆 ${bname(m.firsts[0])} — 1st</div>`;
              if (m.seconds && m.seconds.length > 0) {
                bracketHtml += `<div style="font-size:10px;color:#1565C0">🥈 ${bname(m.seconds[0])} — 2nd</div>`;
              }
            }
          }
        }
        bracketHtml += `</div>`;
      });
      bracketHtml += `</div>`;
    });
    bracketHtml += `</div></div>`;
  });

  const win = window.open("", "_blank");
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(e.name)} — Alive &amp; Brackets</title>
    <style>
      body{font-family:sans-serif;font-size:12px;margin:16px}
      h2{font-size:15px;margin-bottom:4px}h3{font-size:13px;margin:12px 0 6px}
      .sub{font-size:11px;color:#666;margin-bottom:10px}
      table{width:100%;border-collapse:collapse}
      th,td{border:1px solid #ccc;padding:5px 7px;vertical-align:top}
      th{background:#f0f0f0;font-weight:700;font-size:11px;text-transform:uppercase}
      .page-break{page-break-before:always;padding-top:16px}
      @media print{.page-break{page-break-before:always}}
    </style></head>
    <body>
      <h2>${escapeHtml(e.name)} — Alive List</h2>
      <div class="sub">${escapeHtml(e.date||"")} · Printed ${new Date().toLocaleTimeString()} · ${aliveRows.length} bowlers alive</div>
      <table><thead><tr><th>Ln</th><th>Bowler / Bracket Status</th></tr></thead><tbody>${aliveHtml || "<tr><td colspan='2' style='color:#999;text-align:center'>No bowlers alive yet</td></tr>"}</tbody></table>

      <div class="page-break">
        <h2>${escapeHtml(e.name)} — Bracket Matchups</h2>
        <div class="sub">${escapeHtml(e.date||"")} · Printed ${new Date().toLocaleTimeString()}</div>
        ${bracketHtml || "<p style='color:#999'>No brackets formed yet.</p>"}
      </div>
    </body></html>`);
  win.document.close();
  win.print();
}
